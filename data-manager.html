<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JLPT Data Manager</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0c0e14;
      --bg-card: #141620;
      --bg-input: #1a1d2e;
      --bg-hover: #1e2235;
      --border: #252840;
      --border-focus: #6366f1;
      --text-primary: #e2e4ed;
      --text-secondary: #8b8fa3;
      --text-muted: #5c5f73;
      --accent: #6366f1;
      --accent-hover: #7577f5;
      --emerald: #10b981;
      --amber: #f59e0b;
      --red: #ef4444;
      --rose: #f43f5e;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Noto Sans JP', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }
    
    .mono { font-family: 'JetBrains Mono', monospace; }
    
    /* Layout */
    .app-header {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .app-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .app-title .icon { font-size: 20px; }
    .app-title .sub { color: var(--text-muted); font-weight: 400; font-size: 12px; }
    
    .tab-bar {
      display: flex;
      gap: 4px;
    }
    
    .tab-btn {
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-secondary);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    
    .tab-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
    .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
    
    .main-content {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px;
    }
    
    /* Cards */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 16px;
    }
    
    .card-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .card-body { padding: 20px; }
    
    .card-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.3px;
      color: var(--text-secondary);
    }
    
    /* Buttons */
    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.15s;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-emerald { background: rgba(16,185,129,0.15); color: var(--emerald); border-color: rgba(16,185,129,0.3); }
    .btn-emerald:hover { background: rgba(16,185,129,0.25); }
    .btn-amber { background: rgba(245,158,11,0.15); color: var(--amber); border-color: rgba(245,158,11,0.3); }
    .btn-amber:hover { background: rgba(245,158,11,0.25); }
    .btn-red { background: rgba(239,68,68,0.15); color: var(--red); border-color: rgba(239,68,68,0.3); }
    .btn-red:hover { background: rgba(239,68,68,0.25); }
    .btn-ghost { background: transparent; color: var(--text-secondary); border-color: var(--border); }
    .btn-ghost:hover { background: var(--bg-hover); color: var(--text-primary); }
    .btn-sm { padding: 4px 10px; font-size: 11px; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    
    /* Inputs */
    input, textarea, select {
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      width: 100%;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--border-focus);
    }
    
    textarea { resize: vertical; }
    
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    /* Tags */
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 500;
      border: 1px solid;
    }
    
    .tag-grammar { background: rgba(245,158,11,0.1); color: var(--amber); border-color: rgba(245,158,11,0.2); }
    .tag-vocab { background: rgba(99,102,241,0.1); color: var(--accent); border-color: rgba(99,102,241,0.2); }
    .tag-default { background: rgba(139,143,163,0.1); color: var(--text-secondary); border-color: var(--border); }
    
    .tag .remove {
      cursor: pointer;
      opacity: 0.5;
      font-size: 13px;
      line-height: 1;
    }
    .tag .remove:hover { opacity: 1; }
    
    /* Badge */
    .badge {
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.3px;
      border: 1px solid;
    }
    
    .badge-unverified { background: rgba(245,158,11,0.1); color: var(--amber); border-color: rgba(245,158,11,0.2); }
    .badge-verified { background: rgba(16,185,129,0.1); color: var(--emerald); border-color: rgba(16,185,129,0.2); }
    .badge-rejected { background: rgba(239,68,68,0.1); color: var(--red); border-color: rgba(239,68,68,0.2); }
    
    /* Sentence item */
    .sent-item {
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 10px;
      transition: border-color 0.15s;
    }
    
    .sent-item:hover { border-color: rgba(99,102,241,0.3); }
    .sent-item.resolved { opacity: 0.5; border-color: rgba(16,185,129,0.2); }
    
    .sent-text { font-size: 15px; line-height: 1.7; margin-bottom: 6px; }
    .sent-text .hl { color: var(--accent); font-weight: 700; background: rgba(99,102,241,0.1); padding: 0 2px; border-radius: 3px; }
    .sent-meaning { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
    .sent-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-size: 11px; color: var(--text-muted); }
    
    /* Alert item */
    .alert-item {
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 10px;
      border-left: 3px solid var(--amber);
    }
    
    .alert-item.resolved { border-left-color: var(--emerald); opacity: 0.6; }
    
    .alert-kanji {
      font-size: 28px;
      font-weight: 700;
      margin-right: 16px;
    }
    
    /* Filters bar */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      align-items: center;
    }
    
    .filter-bar select, .filter-bar input {
      width: auto;
      min-width: 120px;
    }
    
    /* Stats row */
    .stats-row {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .stat-card {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      text-align: center;
    }
    
    .stat-num { font-size: 24px; font-weight: 700; }
    .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    
    /* Pagination */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px 0;
    }
    
    /* Word edit row */
    .edit-row {
      display: grid;
      grid-template-columns: 100px 150px 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    
    .edit-row:last-child { border-bottom: none; }
    
    /* Loading */
    .loading { text-align: center; padding: 40px; color: var(--text-muted); }
    
    /* Flex utilities */
    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .items-center { align-items: center; }
    .items-start { align-items: flex-start; }
    .justify-between { justify-content: space-between; }
    .gap-2 { gap: 8px; }
    .gap-3 { gap: 12px; }
    .gap-4 { gap: 16px; }
    .flex-1 { flex: 1; }
    .flex-wrap { flex-wrap: wrap; }
    .mt-2 { margin-top: 8px; }
    .mt-3 { margin-top: 12px; }
    .mb-2 { margin-bottom: 8px; }
    .mb-3 { margin-bottom: 12px; }
    .hidden { display: none !important; }
    
    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      z-index: 9999;
      animation: fadeInUp 0.25s ease-out;
    }
    
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .toast-success { background: rgba(16,185,129,0.15); color: var(--emerald); border: 1px solid rgba(16,185,129,0.3); }
    .toast-error { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    // ========== CONFIG ==========
    const SUPABASE_URL = 'https://ulgrfumbwjovbjzjiems.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVsZ3JmdW1id2pvdmJqemppZW1zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjczNzIyNjcsImV4cCI6MjA4Mjk0ODI2N30.ix5Vh4Y3GXNbQbzVtTD_WSko0L3cr5q_eCnTuDEMh7M';
    const ADMIN_USER_ID = 'd469efb7-f9e1-4b49-8b14-75a42b4d22e0';
    
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    // ========== STATE ==========
    const state = {
      user: null,
      authChecked: false,
      tab: 'sentences',    // sentences, bulk, story-flags, word-flags
      loading: true,
      
      // Data pools
      sentences: [],
      words: [],
      goiWords: [],  // from japanese_vocabulary
      storyAlerts: [],
      wordAlerts: [],
      stories: [],
      storyGroups: [],
      
      // Sentence tab
      sentFilter: 'unverified',
      sentSource: 'all',
      sentSearch: '',
      sentPage: 0,
      
      // AI Review
      aiEnabled: false,
      aiReviewing: false,
      aiResults: null,
      
      // Bulk tab
      bulkInput: '',
      bulkSource: 'manual',
      bulkLevel: '',
      bulkParsed: null,
      bulkSaving: false,
      bulkMsg: '',
      
      // Flags
      flagFilter: 'open', // open, resolved, all
      flagPage: 0,
    };
    
    // ========== HELPERS ==========
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    
    function isKanji(c) {
      const code = c.codePointAt(0);
      return (code >= 0x4E00 && code <= 0x9FFF) || (code >= 0x3400 && code <= 0x4DBF);
    }
    
    function extractKanjiStem(word) {
      if (!word) return '';
      const chars = [...word];
      if (!chars.some(isKanji)) return word;
      let stem = '';
      for (const c of chars) { if (isKanji(c)) stem += c; else break; }
      return stem || word;
    }
    
    function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
    
    function tagClass(tag) {
      if (tag.startsWith('grammar')) return 'tag-grammar';
      if (tag.startsWith('vocab')) return 'tag-vocab';
      return 'tag-default';
    }
    
    function toast(msg, type = 'success') {
      const el = document.createElement('div');
      el.className = `toast toast-${type}`;
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }
    
    // Build word lookup for detection (searches BOTH unified and goi tables)
    function buildStemMap() {
      const map = {};
      const addWord = (w, source) => {
        const kanji = w.kanji || w.raw || '';
        if (!kanji) return;
        
        const entry = { ...w, _source: source, kanji };
        
        // Always try full word match
        if (!map[kanji]) map[kanji] = [];
        // Avoid duplicates (same kanji from both tables)
        if (!map[kanji].some(e => e.kanji === kanji && e._source === source)) {
          map[kanji].push(entry);
        }
        
        // For compound kanji (2+ chars), also add the stem
        const stem = extractKanjiStem(kanji);
        if (stem && stem.length >= 2 && stem !== kanji) {
          if (!map[stem]) map[stem] = [];
          if (!map[stem].some(e => e.kanji === kanji && e._source === source)) {
            map[stem].push(entry);
          }
        }
      };
      
      state.words.forEach(w => addWord(w, 'unified'));
      state.goiWords.forEach(w => addWord(w, 'goi'));
      return map;
    }
    
    function detectWords(sentence, stemMap, sortedStems) {
      const found = [];
      const seen = new Set();
      for (const stem of sortedStems) {
        if (sentence.includes(stem)) {
          // For single-char stems that got in via full word match,
          // verify it's not part of a larger compound in the sentence
          if ([...stem].length === 1) {
            const idx = sentence.indexOf(stem);
            const charBefore = idx > 0 ? sentence[idx - 1] : '';
            const charAfter = idx + stem.length < sentence.length ? sentence[idx + stem.length] : '';
            // Skip if surrounded by other kanji (it's part of a compound)
            if (isKanji(charBefore) || isKanji(charAfter)) continue;
          }
          for (const w of stemMap[stem]) {
            if (!seen.has(w.id)) { seen.add(w.id); found.push(w); }
          }
        }
      }
      return found;
    }
    
    function highlightWords(sentence, detectedWords) {
      if (!detectedWords?.length) return escapeHtml(sentence);
      const stems = [...new Set(detectedWords.map(w => extractKanjiStem(w.kanji)).filter(Boolean))].sort((a,b) => b.length - a.length);
      if (!stems.length) return escapeHtml(sentence);
      const pattern = new RegExp(`(${stems.map(escapeRegex).join('|')})`, 'g');
      return sentence.split(pattern).map(part =>
        stems.includes(part) ? `<span class="hl">${escapeHtml(part)}</span>` : escapeHtml(part)
      ).join('');
    }
    
    // ========== DATA LOADING ==========
    async function loadPaginated(table, select = '*', orderCol = 'id') {
      let all = [], page = 0;
      while (true) {
        const { data, error } = await sb.from(table).select(select).order(orderCol).range(page * 1000, (page + 1) * 1000 - 1);
        if (error) { console.error(`Load ${table}:`, error); break; }
        if (!data?.length) break;
        all = all.concat(data);
        if (data.length < 1000) break;
        page++;
      }
      return all;
    }
    
    async function loadAll() {
      state.loading = true; render();
      const [sentences, words, goiWords, storyAlerts, wordAlerts, stories, storyGroups] = await Promise.all([
        loadPaginated('japanese_unified_sentences'),
        loadPaginated('japanese_unified_words'),
        loadPaginated('japanese_vocabulary'),
        loadPaginated('japanese_story_alerts'),
        loadPaginated('japanese_word_alerts'),
        loadPaginated('japanese_kanji_stories'),
        loadPaginated('japanese_kanji_story_groups'),
      ]);
      state.sentences = sentences;
      state.words = words;
      state.goiWords = goiWords;
      state.storyAlerts = storyAlerts;
      state.wordAlerts = wordAlerts;
      state.stories = stories;
      state.storyGroups = storyGroups;
      state.loading = false;
      render();
    }
    
    // ========== DATA OPERATIONS ==========
    async function updateSentence(id, updates) {
      const { error } = await sb.from('japanese_unified_sentences').update(updates).eq('id', id);
      if (error) { toast('Update failed: ' + error.message, 'error'); return false; }
      const s = state.sentences.find(s => s.id === id);
      if (s) Object.assign(s, updates);
      return true;
    }
    
    async function updateWord(id, updates) {
      const { error } = await sb.from('japanese_unified_words').update(updates).eq('id', id);
      if (error) { toast('Update failed: ' + error.message, 'error'); return false; }
      const w = state.words.find(w => w.id === id);
      if (w) Object.assign(w, updates);
      return true;
    }
    
    async function updateStory(kanji, updates) {
      const { error } = await sb.from('japanese_kanji_stories').update(updates).eq('kanji', kanji);
      if (error) { toast('Story update failed: ' + error.message, 'error'); return false; }
      const s = state.stories.find(s => s.kanji === kanji);
      if (s) Object.assign(s, updates);
      return true;
    }
    
    async function resolveAlert(table, id) {
      const { error } = await sb.from(table).update({ resolved: true, resolved_at: new Date().toISOString() }).eq('id', id);
      if (error) { toast('Resolve failed: ' + error.message, 'error'); return false; }
      return true;
    }
    
    async function addTag(sentenceId, tag) {
      const s = state.sentences.find(s => s.id === sentenceId);
      if (!s) return;
      const tags = [...(s.tags || [])];
      if (tags.includes(tag)) return;
      tags.push(tag);
      if (await updateSentence(sentenceId, { tags })) { toast(`Tag "${tag}" added`); render(); }
    }
    
    async function removeTag(sentenceId, tag) {
      const s = state.sentences.find(s => s.id === sentenceId);
      if (!s) return;
      const tags = (s.tags || []).filter(t => t !== tag);
      if (await updateSentence(sentenceId, { tags })) { toast('Tag removed'); render(); }
    }
    
    async function verifySentence(id, status) {
      if (await updateSentence(id, { verified: status })) {
        toast(status === 'verified' ? '✓ Verified' : status === 'rejected' ? '✗ Rejected' : '↩ Unverified');
        render();
      }
    }
    
    async function updateGoiWord(id, updates) {
      const { error } = await sb.from('japanese_vocabulary').update(updates).eq('id', id);
      if (error) { toast('Goi update failed: ' + error.message, 'error'); return false; }
      const w = state.goiWords.find(w => w.id === id);
      if (w) Object.assign(w, updates);
      return true;
    }
    
    // Export sentences as JSON for AI review
    function exportSentencesForReview() {
      const toExport = state.sentences
        .filter(s => (s.verified || 'unverified') === 'unverified')
        .map(s => ({
          id: s.id,
          sentence: s.sentence,
          meaning_en: s.meaning_en || '',
          source: s.source || '',
          jlpt_level: s.jlpt_level || '',
          tags: s.tags || [],
        }));
      
      const blob = new Blob([JSON.stringify(toExport, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `sentences_review_${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
      toast(`Exported ${toExport.length} sentences`);
    }
    
    // Import AI review results (JSON)
    async function importAIReview() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json';
      input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        try {
          const text = await file.text();
          const results = JSON.parse(text);
          if (!Array.isArray(results)) { toast('Invalid JSON: expected array', 'error'); return; }
          
          let updated = 0;
          for (const r of results) {
            if (!r.id) continue;
            const updates = {};
            if (r.verified) updates.verified = r.verified;
            if (r.tags) updates.tags = r.tags;
            if (r.meaning_en) updates.meaning_en = r.meaning_en;
            if (r.corrected_sentence) updates.sentence = r.corrected_sentence;
            
            if (Object.keys(updates).length > 0) {
              const ok = await updateSentence(r.id, updates);
              if (ok) updated++;
            }
          }
          toast(`Imported: ${updated}/${results.length} sentences updated`);
          render();
        } catch (err) {
          toast('Import error: ' + err.message, 'error');
        }
      };
      input.click();
    }
    
    // AI Review via Anthropic API (Option B)
    async function aiReviewBatch() {
      const unverified = state.sentences
        .filter(s => (s.verified || 'unverified') === 'unverified')
        .slice(0, 15); // batch of 15
      
      if (unverified.length === 0) { toast('No unverified sentences', 'error'); return; }
      
      state.aiReviewing = true;
      state.aiResults = null;
      render();
      
      const sentenceList = unverified.map(s => 
        `ID:${s.id} | ${s.sentence} | ${s.meaning_en || '(no translation)'}`
      ).join('\n');
      
      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 4000,
            system: `You are a Japanese language expert reviewing sentences for a JLPT study app. For each sentence, evaluate:
1. Grammar correctness (is it natural Japanese?)
2. Suggest tags (grammar:てform, grammar:passive, vocab, etc.)
3. If meaning_en is wrong or missing, provide correct translation
4. Rate difficulty 1-3 (1=easy, 3=hard)
5. verdict: "verified", "rejected", or "needs_edit"
6. If needs_edit, provide corrected_sentence

Respond ONLY with a JSON array, no markdown. Each element: {"id": number, "verdict": string, "tags": string[], "meaning_en": string, "difficulty": number, "corrected_sentence": string|null, "notes": string}`,
            messages: [{ role: 'user', content: `Review these Japanese sentences:\n\n${sentenceList}` }]
          })
        });
        
        const data = await response.json();
        const text = data.content?.map(c => c.text || '').join('') || '';
        const clean = text.replace(/```json|```/g, '').trim();
        state.aiResults = JSON.parse(clean);
        state.aiReviewing = false;
        render();
        toast(`AI reviewed ${state.aiResults.length} sentences`);
      } catch (err) {
        state.aiReviewing = false;
        render();
        toast('AI review failed: ' + err.message, 'error');
      }
    }
    
    // Apply a single AI review result
    async function applyAIResult(resultIdx) {
      const r = state.aiResults?.[resultIdx];
      if (!r) return;
      const updates = {};
      if (r.verdict === 'verified' || r.verdict === 'rejected') updates.verified = r.verdict;
      if (r.tags?.length) updates.tags = r.tags;
      if (r.meaning_en) updates.meaning_en = r.meaning_en;
      if (r.difficulty) updates.difficulty = r.difficulty;
      if (r.corrected_sentence) updates.sentence = r.corrected_sentence;
      
      if (Object.keys(updates).length > 0 && await updateSentence(r.id, updates)) {
        r._applied = true;
        toast('Applied!');
        render();
      }
    }
    
    // ========== BULK OPERATIONS ==========
    function parseBulk() {
      const text = document.getElementById('bulkInput')?.value?.trim();
      if (!text) { toast('Paste sentences first', 'error'); return; }
      state.bulkInput = text;
      state.bulkSource = document.getElementById('bulkSource')?.value || 'manual';
      state.bulkLevel = document.getElementById('bulkLevel')?.value || '';
      
      const stemMap = buildStemMap();
      const sortedStems = Object.keys(stemMap).sort((a,b) => b.length - a.length);
      const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
      
      state.bulkParsed = lines.map(line => ({
        sentence: line,
        detectedWords: detectWords(line, stemMap, sortedStems),
        linked: false,
      }));
      state.bulkMsg = '';
      render();
      toast(`Parsed ${lines.length} sentences`);
    }
    
    async function bulkSaveAll() {
      if (!state.bulkParsed?.length) return;
      state.bulkSaving = true; render();
      
      const source = state.bulkSource || 'manual';
      const level = state.bulkLevel || null;
      const rows = state.bulkParsed.map(p => ({
        sentence: p.sentence,
        source,
        jlpt_level: level,
        verified: 'unverified',
        difficulty: 1,
      }));
      
      const { data: inserted, error } = await sb.from('japanese_unified_sentences').insert(rows).select();
      if (error) { toast('Insert failed: ' + error.message, 'error'); state.bulkSaving = false; render(); return; }
      
      // Build links (only for unified words — goi-only words can't be linked to word_sentences table)
      const links = [];
      inserted.forEach((s, i) => {
        const parsed = state.bulkParsed[i];
        if (!parsed) return;
        parsed.detectedWords.forEach(w => {
          let unifiedId = null;
          if (w._source === 'unified') {
            unifiedId = w.id;
          } else {
            // Goi word — try to find matching unified word by kanji
            const match = state.words.find(uw => uw.kanji === w.kanji);
            if (match) unifiedId = match.id;
          }
          if (unifiedId) links.push({ word_id: unifiedId, sentence_id: s.id, rating: null });
        });
        parsed.linked = true;
        state.sentences.push(s);
      });
      
      let linkedCount = 0;
      const goiOnlyCount = inserted.reduce((acc, s, i) => {
        const parsed = state.bulkParsed[i];
        return acc + (parsed?.detectedWords.filter(w => w._source === 'goi' && !state.words.find(uw => uw.kanji === w.kanji)).length || 0);
      }, 0);
      
      if (links.length > 0) {
        const { data: linkData, error: linkErr } = await sb.from('japanese_unified_word_sentences').insert(links).select();
        if (!linkErr && linkData) linkedCount = linkData.length;
      }
      
      state.bulkSaving = false;
      state.bulkMsg = `✅ ${inserted.length} sentences saved, ${linkedCount} word links created${goiOnlyCount > 0 ? ` (${goiOnlyCount} goi-only words skipped — not in unified table)` : ''}`;
      render();
      toast(state.bulkMsg);
    }

                  <!-- Current story data -->
                  ${story ? `
                    <div style="font-size: 12px; margin-bottom: 10px; padding: 10px; background: var(--bg-input); border-radius: 8px; border: 1px solid var(--border);">
                      <div style="color:var(--text-muted); margin-bottom: 4px;">CURRENT STORY DATA:</div>
                      <div><strong>Meaning:</strong> ${escapeHtml(story.meaning || '')}</div>
                      <div><strong>Story:</strong> ${escapeHtml(story.story || '(empty)')}</div>
                      <div><strong>On:</strong> ${escapeHtml(story.onyomi || '')} · <strong>Kun:</strong> ${escapeHtml(story.kunyomi || '')}</div>
                    </div>
                    
                    <!-- Edit fields -->
                    <div class="flex gap-2 mb-2">
                      <div class="flex-1">
                        <label>Meaning</label>
                        <input type="text" data-story-edit-meaning="${escapeHtml(alert.kanji)}" value="${escapeHtml(story.meaning || '')}">
                      </div>
                    </div>
                    <div class="flex gap-2 mb-2">
                      <div class="flex-1">
                        <label>Onyomi</label>
                        <input type="text" data-story-edit-onyomi="${escapeHtml(alert.kanji)}" value="${escapeHtml(story.onyomi || '')}">
                      </div>
                      <div class="flex-1">
                        <label>Kunyomi</label>
                        <input type="text" data-story-edit-kunyomi="${escapeHtml(alert.kanji)}" value="${escapeHtml(story.kunyomi || '')}">
                      </div>
                    </div>
                    <div class="mb-2">
                      <label>Story</label>
                      <textarea rows="2" data-story-edit-story="${escapeHtml(alert.kanji)}">${escapeHtml(story.story || '')}</textarea>
                    </div>
                    <div class="flex gap-2">
                      <button class="btn btn-sm btn-primary" data-save-story="${escapeHtml(alert.kanji)}" data-alert-id="${alert.id}">💾 Save & Resolve</button>
                      ${!alert.resolved ? `<button class="btn btn-sm btn-ghost" data-resolve-story="${alert.id}">Skip (Resolve)</button>` : ''}
                    </div>
                  ` : `
                    <div style="font-size:12px; color:var(--text-muted);">No story found for this kanji</div>
                    ${!alert.resolved ? `<button class="btn btn-sm btn-ghost mt-2" data-resolve-story="${alert.id}">Resolve</button>` : ''}
                  `}
                </div>
              </div>
            </div>
          `;
        }).join('')}
        
        ${totalPages > 1 ? `
          <div class="pagination">
            <button class="btn btn-sm btn-ghost" id="flagPrev" ${page===0?'disabled':''}>← Prev</button>
            <span style="font-size:12px; color:var(--text-muted);">${page+1} / ${totalPages}</span>
            <button class="btn btn-sm btn-ghost" id="flagNext" ${page>=totalPages-1?'disabled':''}>Next →</button>
          </div>
        ` : ''}
      `;
    }
    
    // ========== WORD FLAGS TAB ==========
    function renderWordFlagsTab() {
      let items = state.wordAlerts;
      if (state.flagFilter === 'open') items = items.filter(a => !a.resolved);
      else if (state.flagFilter === 'resolved') items = items.filter(a => a.resolved);
      items = items.sort((a,b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));
      
      const page = state.flagPage;
      const pageSize = 20;
      const totalPages = Math.ceil(items.length / pageSize);
      const pageItems = items.slice(page * pageSize, (page + 1) * pageSize);
      
      return `
        <div class="stats-row">
          <div class="stat-card"><div class="stat-num" style="color:var(--amber)">${state.wordAlerts.filter(a=>!a.resolved).length}</div><div class="stat-label">Open</div></div>
          <div class="stat-card"><div class="stat-num" style="color:var(--emerald)">${state.wordAlerts.filter(a=>a.resolved).length}</div><div class="stat-label">Resolved</div></div>
        </div>
        
        <div class="filter-bar">
          ${['open', 'resolved', 'all'].map(f => `
            <button class="btn btn-sm ${state.flagFilter === f ? 'btn-primary' : 'btn-ghost'}" data-flag-filter="${f}">${f.charAt(0).toUpperCase()+f.slice(1)}</button>
          `).join('')}
        </div>
        
        ${pageItems.map(alert => {
          // Find the word in BOTH unified and vocabulary tables
          const unifiedWord = state.words.find(w => w.kanji === alert.kanji);
          const goiWord = state.goiWords.find(w => (w.kanji || w.raw) === alert.kanji);
          const hasAny = unifiedWord || goiWord;
          
          return `
            <div class="alert-item ${alert.resolved ? 'resolved' : ''}">
              <div class="flex items-start gap-4">
                <div class="alert-kanji">${escapeHtml(alert.kanji || '')}</div>
                <div class="flex-1">
                  <div class="flex items-center gap-2 mb-2">
                    <span class="badge badge-${alert.resolved ? 'verified' : 'unverified'}">${alert.alert_type || 'issue'}</span>
                    <span style="font-size:11px; color:var(--text-muted);">${alert.source || ''} · ${new Date(alert.created_at).toLocaleDateString()}</span>
                  </div>
                  
                  <!-- Reported data -->
                  <div style="font-size:12px; margin-bottom: 8px; padding: 8px 12px; background:rgba(245,158,11,0.06); border-radius: 8px; border: 1px solid rgba(245,158,11,0.15);">
                    <div style="color:var(--amber);">REPORTED:</div>
                    <div>Hiragana: <strong>${escapeHtml(alert.hiragana || '(none)')}</strong></div>
                    <div>Meaning: <strong>${escapeHtml(alert.meaning || '(none)')}</strong></div>
                    ${alert.comment ? `<div style="margin-top:4px; color:var(--text-secondary);">"${escapeHtml(alert.comment)}"</div>` : ''}
                  </div>
                  
                  ${unifiedWord ? `
                    <!-- Unified table edit -->
                    <div style="font-size:11px; color:var(--accent); margin-bottom:6px; font-weight:600;">📘 UNIFIED TABLE (id: ${unifiedWord.id})</div>
                    <div class="flex gap-2 mb-2">
                      <div style="width:120px;">
                        <label>Kanji</label>
                        <input type="text" data-uw-edit-kanji="${unifiedWord.id}" value="${escapeHtml(unifiedWord.kanji || '')}">
                      </div>
                      <div class="flex-1">
                        <label>Hiragana</label>
                        <input type="text" data-uw-edit-hiragana="${unifiedWord.id}" value="${escapeHtml(unifiedWord.hiragana || '')}">
                      </div>
                      <div class="flex-1">
                        <label>Meaning</label>
                        <input type="text" data-uw-edit-meaning="${unifiedWord.id}" value="${escapeHtml(unifiedWord.meaning_en || '')}">
                      </div>
                    </div>
                    <div class="flex gap-2 mb-2">
                      <div class="flex-1">
                        <label>Hint</label>
                        <input type="text" data-uw-edit-hint="${unifiedWord.id}" value="${escapeHtml(unifiedWord.hint || '')}">
                      </div>
                      <div style="width:100px;">
                        <label>Type</label>
                        <input type="text" data-uw-edit-type="${unifiedWord.id}" value="${escapeHtml(unifiedWord.word_type || '')}">
                      </div>
                    </div>
                    <button class="btn btn-sm btn-primary mb-3" data-save-unified="${unifiedWord.id}" data-alert-id="${alert.id}">💾 Save Unified</button>
                  ` : `<div style="font-size:11px; color:var(--text-muted); margin-bottom:8px;">📘 Not in unified table</div>`}
                  
                  ${goiWord ? `
                    <!-- Goi table edit -->
                    <div style="font-size:11px; color:var(--emerald); margin-bottom:6px; font-weight:600;">📗 GOI TABLE (id: ${goiWord.id})</div>
                    <div class="flex gap-2 mb-2">
                      <div style="width:120px;">
                        <label>Kanji</label>
                        <input type="text" data-goi-edit-kanji="${goiWord.id}" value="${escapeHtml(goiWord.kanji || goiWord.raw || '')}">
                      </div>
                      <div class="flex-1">
                        <label>Hiragana</label>
                        <input type="text" data-goi-edit-hiragana="${goiWord.id}" value="${escapeHtml(goiWord.hiragana || '')}">
                      </div>
                      <div class="flex-1">
                        <label>Meaning</label>
                        <input type="text" data-goi-edit-meaning="${goiWord.id}" value="${escapeHtml(goiWord.meaning_en || goiWord.meaning || '')}">
                      </div>
                    </div>
                    <div class="flex gap-2 mb-2">
                      <div class="flex-1">
                        <label>Hint</label>
                        <input type="text" data-goi-edit-hint="${goiWord.id}" value="${escapeHtml(goiWord.hint || '')}">
                      </div>
                      <div style="width:100px;">
                        <label>Level</label>
                        <input type="text" data-goi-edit-level="${goiWord.id}" value="${escapeHtml(goiWord.level || '')}" disabled style="opacity:0.6;">
                      </div>
                    </div>
                    <button class="btn btn-sm btn-emerald mb-3" data-save-goi="${goiWord.id}" data-alert-id="${alert.id}">💾 Save Goi</button>
                  ` : `<div style="font-size:11px; color:var(--text-muted); margin-bottom:8px;">📗 Not in goi table</div>`}
                  
                  <div class="flex gap-2">
                    ${(unifiedWord || goiWord) && !alert.resolved ? `<button class="btn btn-sm btn-ghost" data-resolve-word="${alert.id}">Skip (Resolve)</button>` : ''}
                    ${!hasAny && !alert.resolved ? `<button class="btn btn-sm btn-ghost" data-resolve-word="${alert.id}">Resolve (not found)</button>` : ''}
                  </div>
                </div>
              </div>
            </div>
          `;
        }).join('')}
        
        ${totalPages > 1 ? `
          <div class="pagination">
            <button class="btn btn-sm btn-ghost" id="flagPrev" ${page===0?'disabled':''}>← Prev</button>
            <span style="font-size:12px; color:var(--text-muted);">${page+1} / ${totalPages}</span>
            <button class="btn btn-sm btn-ghost" id="flagNext" ${page>=totalPages-1?'disabled':''}>Next →</button>
          </div>
        ` : ''}
      `;
    }
    
    // ========== EVENT LISTENERS ==========
    function attachListeners() {
      // Tabs
      document.querySelectorAll('[data-tab]').forEach(btn => {
        btn.addEventListener('click', () => { state.tab = btn.dataset.tab; state.flagPage = 0; state.flagFilter = 'open'; render(); });
      });
      
      // Admin sign out
      document.getElementById('adminSignOutBtn')?.addEventListener('click', async () => {
        await sb.auth.signOut();
        state.user = null;
        render();
      });
      
      // Sentence filters
      document.querySelectorAll('[data-sent-filter]').forEach(btn => {
        btn.addEventListener('click', () => { state.sentFilter = btn.dataset.sentFilter; state.sentPage = 0; render(); });
      });
      document.getElementById('sentSourceFilter')?.addEventListener('change', e => { state.sentSource = e.target.value; state.sentPage = 0; render(); });
      
      let searchTimer;
      document.getElementById('sentSearch')?.addEventListener('input', e => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => { state.sentSearch = e.target.value; state.sentPage = 0; render(); }, 300);
      });
      
      // Sentence pagination
      document.getElementById('sentPrev')?.addEventListener('click', () => { state.sentPage--; render(); });
      document.getElementById('sentNext')?.addEventListener('click', () => { state.sentPage++; render(); });
      
      // Verify / reject
      document.querySelectorAll('[data-verify]').forEach(btn => btn.addEventListener('click', () => verifySentence(parseInt(btn.dataset.verify), 'verified')));
      document.querySelectorAll('[data-reject]').forEach(btn => btn.addEventListener('click', () => verifySentence(parseInt(btn.dataset.reject), 'rejected')));
      document.querySelectorAll('[data-unverify]').forEach(btn => btn.addEventListener('click', () => verifySentence(parseInt(btn.dataset.unverify), 'unverified')));
      
      // Tags
      document.querySelectorAll('[data-add-tag]').forEach(btn => {
        btn.addEventListener('click', () => {
          const input = document.querySelector(`[data-tag-in="${btn.dataset.addTag}"]`);
          if (input?.value?.trim()) addTag(parseInt(btn.dataset.addTag), input.value.trim());
        });
      });
      document.querySelectorAll('[data-rm-tag]').forEach(btn => {
        btn.addEventListener('click', () => removeTag(parseInt(btn.dataset.rmTag), btn.dataset.rmVal));
      });
      
      // Bulk
      document.getElementById('parseBulkBtn')?.addEventListener('click', parseBulk);
      document.getElementById('bulkSaveBtn')?.addEventListener('click', bulkSaveAll);
      
      // Flag filters
      document.querySelectorAll('[data-flag-filter]').forEach(btn => {
        btn.addEventListener('click', () => { state.flagFilter = btn.dataset.flagFilter; state.flagPage = 0; render(); });
      });
      document.getElementById('flagPrev')?.addEventListener('click', () => { state.flagPage--; render(); });
      document.getElementById('flagNext')?.addEventListener('click', () => { state.flagPage++; render(); });
      
      // Save story edits (now includes onyomi/kunyomi)
      document.querySelectorAll('[data-save-story]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const kanji = btn.dataset.saveStory;
          const alertId = parseInt(btn.dataset.alertId);
          const meaning = document.querySelector(`[data-story-edit-meaning="${kanji}"]`)?.value || '';
          const story = document.querySelector(`[data-story-edit-story="${kanji}"]`)?.value || '';
          const onyomi = document.querySelector(`[data-story-edit-onyomi="${kanji}"]`)?.value || '';
          const kunyomi = document.querySelector(`[data-story-edit-kunyomi="${kanji}"]`)?.value || '';
          
          const ok = await updateStory(kanji, { meaning, story, onyomi, kunyomi });
          if (ok && alertId) {
            await resolveAlert('japanese_story_alerts', alertId);
            const a = state.storyAlerts.find(a => a.id === alertId);
            if (a) a.resolved = true;
          }
          if (ok) { toast('Story updated & resolved!'); render(); }
        });
      });
      
      // Resolve story without edit
      document.querySelectorAll('[data-resolve-story]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = parseInt(btn.dataset.resolveStory);
          const ok = await resolveAlert('japanese_story_alerts', id);
          if (ok) { const a = state.storyAlerts.find(a => a.id === id); if (a) a.resolved = true; toast('Resolved'); render(); }
        });
      });
      
      // Save unified word edits
      document.querySelectorAll('[data-save-unified]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const wordId = parseInt(btn.dataset.saveUnified);
          const alertId = parseInt(btn.dataset.alertId);
          
          const kanji = document.querySelector(`[data-uw-edit-kanji="${wordId}"]`)?.value || '';
          const hiragana = document.querySelector(`[data-uw-edit-hiragana="${wordId}"]`)?.value || '';
          const meaning_en = document.querySelector(`[data-uw-edit-meaning="${wordId}"]`)?.value || '';
          const hint = document.querySelector(`[data-uw-edit-hint="${wordId}"]`)?.value || '';
          const word_type = document.querySelector(`[data-uw-edit-type="${wordId}"]`)?.value || '';
          
          const ok = await updateWord(wordId, { kanji, hiragana, meaning_en, hint, word_type });
          if (ok && alertId) {
            await resolveAlert('japanese_word_alerts', alertId);
            const a = state.wordAlerts.find(a => a.id === alertId);
            if (a) a.resolved = true;
          }
          if (ok) { toast('Unified word updated!'); render(); }
        });
      });
      
      // Save goi word edits
      document.querySelectorAll('[data-save-goi]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const wordId = parseInt(btn.dataset.saveGoi);
          const alertId = parseInt(btn.dataset.alertId);
          
          const kanji = document.querySelector(`[data-goi-edit-kanji="${wordId}"]`)?.value || '';
          const hiragana = document.querySelector(`[data-goi-edit-hiragana="${wordId}"]`)?.value || '';
          const meaning_en = document.querySelector(`[data-goi-edit-meaning="${wordId}"]`)?.value || '';
          const hint = document.querySelector(`[data-goi-edit-hint="${wordId}"]`)?.value || '';
          
          const ok = await updateGoiWord(wordId, { kanji, hiragana, meaning_en, hint });
          if (ok && alertId) {
            await resolveAlert('japanese_word_alerts', alertId);
            const a = state.wordAlerts.find(a => a.id === alertId);
            if (a) a.resolved = true;
          }
          if (ok) { toast('Goi word updated!'); render(); }
        });
      });
      
      // Resolve word without edit
      document.querySelectorAll('[data-resolve-word]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = parseInt(btn.dataset.resolveWord);
          const ok = await resolveAlert('japanese_word_alerts', id);
          if (ok) { const a = state.wordAlerts.find(a => a.id === id); if (a) a.resolved = true; toast('Resolved'); render(); }
        });
      });
      
      // Export / Import / AI Review
      document.getElementById('exportSentencesBtn')?.addEventListener('click', exportSentencesForReview);
      document.getElementById('importReviewBtn')?.addEventListener('click', importAIReview);
      document.getElementById('aiToggle')?.addEventListener('change', (e) => { state.aiEnabled = e.target.checked; render(); });
      document.getElementById('aiReviewBtn')?.addEventListener('click', aiReviewBatch);
      document.getElementById('clearAIResultsBtn')?.addEventListener('click', () => { state.aiResults = null; render(); });
      document.querySelectorAll('[data-apply-ai]').forEach(btn => {
        btn.addEventListener('click', () => applyAIResult(parseInt(btn.dataset.applyAi)));
      });
    }
    
    // ========== INIT ==========
    async function init() {
      render(); // show "checking auth..."
      
      // Check existing session
      const { data: { session } } = await sb.auth.getSession();
      if (session) {
        state.user = session.user;
      }
      state.authChecked = true;
      
      // Listen for auth changes (handles OAuth redirect)
      sb.auth.onAuthStateChange((event, session) => {
        if (event === 'INITIAL_SESSION') return;
        state.user = session?.user || null;
        state.authChecked = true;
        if (state.user?.id === ADMIN_USER_ID && state.words.length === 0) {
          loadAll();
        }
        render();
      });
      
      // If already admin, load data
      if (state.user?.id === ADMIN_USER_ID) {
        await loadAll();
      }
      
      render();
    }
    
    init();
  </script>
</body>
</html>
