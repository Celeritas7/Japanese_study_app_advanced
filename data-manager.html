<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JLPT Data Manager</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0c0e14;
      --bg-card: #141620;
      --bg-input: #1a1d2e;
      --bg-hover: #1e2235;
      --border: #252840;
      --border-focus: #6366f1;
      --text-primary: #e2e4ed;
      --text-secondary: #8b8fa3;
      --text-muted: #5c5f73;
      --accent: #6366f1;
      --accent-hover: #7577f5;
      --emerald: #10b981;
      --amber: #f59e0b;
      --red: #ef4444;
      --rose: #f43f5e;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Noto Sans JP', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }
    
    .mono { font-family: 'JetBrains Mono', monospace; }
    
    /* Layout */
    .app-header {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .app-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .app-title .icon { font-size: 20px; }
    .app-title .sub { color: var(--text-muted); font-weight: 400; font-size: 12px; }
    
    .tab-bar {
      display: flex;
      gap: 4px;
    }
    
    .tab-btn {
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-secondary);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    
    .tab-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
    .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
    
    .main-content {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px;
    }
    
    /* Cards */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 16px;
    }
    
    .card-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .card-body { padding: 20px; }
    
    .card-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.3px;
      color: var(--text-secondary);
    }
    
    /* Buttons */
    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.15s;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-emerald { background: rgba(16,185,129,0.15); color: var(--emerald); border-color: rgba(16,185,129,0.3); }
    .btn-emerald:hover { background: rgba(16,185,129,0.25); }
    .btn-amber { background: rgba(245,158,11,0.15); color: var(--amber); border-color: rgba(245,158,11,0.3); }
    .btn-amber:hover { background: rgba(245,158,11,0.25); }
    .btn-red { background: rgba(239,68,68,0.15); color: var(--red); border-color: rgba(239,68,68,0.3); }
    .btn-red:hover { background: rgba(239,68,68,0.25); }
    .btn-ghost { background: transparent; color: var(--text-secondary); border-color: var(--border); }
    .btn-ghost:hover { background: var(--bg-hover); color: var(--text-primary); }
    .btn-sm { padding: 4px 10px; font-size: 11px; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    
    /* Inputs */
    input, textarea, select {
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      width: 100%;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--border-focus);
    }
    
    textarea { resize: vertical; }
    
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    /* Tags */
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 500;
      border: 1px solid;
    }
    
    .tag-grammar { background: rgba(245,158,11,0.1); color: var(--amber); border-color: rgba(245,158,11,0.2); }
    .tag-vocab { background: rgba(99,102,241,0.1); color: var(--accent); border-color: rgba(99,102,241,0.2); }
    .tag-default { background: rgba(139,143,163,0.1); color: var(--text-secondary); border-color: var(--border); }
    
    .tag .remove {
      cursor: pointer;
      opacity: 0.5;
      font-size: 13px;
      line-height: 1;
    }
    .tag .remove:hover { opacity: 1; }
    
    /* Badge */
    .badge {
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.3px;
      border: 1px solid;
    }
    
    .badge-unverified { background: rgba(245,158,11,0.1); color: var(--amber); border-color: rgba(245,158,11,0.2); }
    .badge-verified { background: rgba(16,185,129,0.1); color: var(--emerald); border-color: rgba(16,185,129,0.2); }
    .badge-rejected { background: rgba(239,68,68,0.1); color: var(--red); border-color: rgba(239,68,68,0.2); }
    
    /* Sentence item */
    .sent-item {
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 10px;
      transition: border-color 0.15s;
    }
    
    .sent-item:hover { border-color: rgba(99,102,241,0.3); }
    .sent-item.resolved { opacity: 0.5; border-color: rgba(16,185,129,0.2); }
    
    .sent-text { font-size: 15px; line-height: 1.7; margin-bottom: 6px; }
    .sent-text .hl { color: var(--accent); font-weight: 700; background: rgba(99,102,241,0.1); padding: 0 2px; border-radius: 3px; }
    .sent-meaning { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
    .sent-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-size: 11px; color: var(--text-muted); }
    
    /* Alert item */
    .alert-item {
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 10px;
      border-left: 3px solid var(--amber);
    }
    
    .alert-item.resolved { border-left-color: var(--emerald); opacity: 0.6; }
    
    .alert-kanji {
      font-size: 28px;
      font-weight: 700;
      margin-right: 16px;
    }
    
    /* Filters bar */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      align-items: center;
    }
    
    .filter-bar select, .filter-bar input {
      width: auto;
      min-width: 120px;
    }
    
    /* Stats row */
    .stats-row {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .stat-card {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      text-align: center;
    }
    
    .stat-num { font-size: 24px; font-weight: 700; }
    .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    
    /* Pagination */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px 0;
    }
    
    /* Word edit row */
    .edit-row {
      display: grid;
      grid-template-columns: 100px 150px 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    
    .edit-row:last-child { border-bottom: none; }
    
    /* Loading */
    .loading { text-align: center; padding: 40px; color: var(--text-muted); }
    
    /* Flex utilities */
    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .items-center { align-items: center; }
    .items-start { align-items: flex-start; }
    .justify-between { justify-content: space-between; }
    .gap-2 { gap: 8px; }
    .gap-3 { gap: 12px; }
    .gap-4 { gap: 16px; }
    .flex-1 { flex: 1; }
    .flex-wrap { flex-wrap: wrap; }
    .mt-2 { margin-top: 8px; }
    .mt-3 { margin-top: 12px; }
    .mb-2 { margin-bottom: 8px; }
    .mb-3 { margin-bottom: 12px; }
    .hidden { display: none !important; }
    
    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      z-index: 9999;
      animation: fadeInUp 0.25s ease-out;
    }
    
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .toast-success { background: rgba(16,185,129,0.15); color: var(--emerald); border: 1px solid rgba(16,185,129,0.3); }
    .toast-error { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    // ========== CONFIG ==========
    const SUPABASE_URL = 'https://ulgrfumbwjovbjzjiems.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVsZ3JmdW1id2pvdmJqemppZW1zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjczNzIyNjcsImV4cCI6MjA4Mjk0ODI2N30.ix5Vh4Y3GXNbQbzVtTD_WSko0L3cr5q_eCnTuDEMh7M';
    const ADMIN_USER_ID = 'd469efb7-f9e1-4b49-8b14-75a42b4d22e0';
    
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    // ========== STATE ==========
    const state = {
      user: null,
      authChecked: false,
      tab: 'stats',    // stats, sentences, bulk, story-flags, word-flags, incomplete
      loading: true,
      
      // Data pools
      sentences: [],
      words: [],       // from japanese_unified_words (includes all Goi + Kanji words)
      wordBooks: [],   // from japanese_unified_word_books
      wordGroups: [],  // from japanese_word_groups
      wordGroupMembers: [], // from japanese_word_group_members
      wordSentenceLinks: [], // from japanese_unified_word_sentences
      storyAlerts: [],
      wordAlerts: [],
      stories: [],
      storyGroups: [],
      
      // Sentence tab
      sentFilter: 'unverified',
      sentSource: 'all',
      sentSearch: '',
      sentPage: 0,
      
      // AI Review
      aiEnabled: false,
      aiReviewing: false,
      aiResults: null,
      
      // Bulk tab
      bulkInput: '',
      bulkSource: 'manual',
      bulkLevel: '',
      bulkParsed: null,
      bulkSaving: false,
      bulkMsg: '',
      
      // Flags
      flagFilter: 'open', // open, resolved, all
      flagPage: 0,
      
      // Incomplete words tab
      incompleteFilter: 'all', // all, sentence_tap, textbook, other
      incompletePage: 0,
      
      // Verification queue
      verifySource: 'all',
      verifyIdx: 0, // current card index in filtered list
      showBulkAI: false,
      
      // Anime word review
      animeWords: [],
      animeFilter: 'pending', // pending, promoted, dismissed
      animePage: 0,
      
      // Word group editor
      groupEditorType: 'all', // all, synonym, near_synonym, alt_kanji, alt_reading, context_variant
      groupEditorSearch: '',
      groupEditorPage: 0,
      editingGroup: null, // group object being edited
      
      // Duplicates
      dupePage: 0,
      
      // Orphans
      orphanResults: null, // { wordBookOrphans, sentenceLinkOrphans, groupMemberOrphans }
    };
    
    // ========== HELPERS ==========
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    
    function isKanji(c) {
      const code = c.codePointAt(0);
      return (code >= 0x4E00 && code <= 0x9FFF) || (code >= 0x3400 && code <= 0x4DBF);
    }
    
    function extractKanjiStem(word) {
      if (!word) return '';
      const chars = [...word];
      if (!chars.some(isKanji)) return word;
      let stem = '';
      for (const c of chars) { if (isKanji(c)) stem += c; else break; }
      return stem || word;
    }
    
    function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
    
    function tagClass(tag) {
      if (tag.startsWith('grammar')) return 'tag-grammar';
      if (tag.startsWith('vocab')) return 'tag-vocab';
      return 'tag-default';
    }
    
    function toast(msg, type = 'success') {
      const el = document.createElement('div');
      el.className = `toast toast-${type}`;
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }
    
    // Build word lookup for detection (full word + compound stems, skip single-char stems)
    function buildStemMap() {
      const map = {};
      state.words.forEach(w => {
        const kanji = w.kanji || '';
        if (!kanji) return;
        
        // Always try full word match
        if (!map[kanji]) map[kanji] = [];
        if (!map[kanji].some(e => e.id === w.id)) map[kanji].push(w);
        
        // For compound kanji (2+ chars), also add the stem
        const stem = extractKanjiStem(kanji);
        if (stem && stem.length >= 2 && stem !== kanji) {
          if (!map[stem]) map[stem] = [];
          if (!map[stem].some(e => e.id === w.id)) map[stem].push(w);
        }
      });
      return map;
    }
    
    function detectWords(sentence, stemMap, sortedStems) {
      const found = [];
      const seen = new Set();
      for (const stem of sortedStems) {
        if (sentence.includes(stem)) {
          // For single-char stems that got in via full word match,
          // verify it's not part of a larger compound in the sentence
          if ([...stem].length === 1) {
            const idx = sentence.indexOf(stem);
            const charBefore = idx > 0 ? sentence[idx - 1] : '';
            const charAfter = idx + stem.length < sentence.length ? sentence[idx + stem.length] : '';
            // Skip if surrounded by other kanji (it's part of a compound)
            if (isKanji(charBefore) || isKanji(charAfter)) continue;
          }
          for (const w of stemMap[stem]) {
            if (!seen.has(w.id)) { seen.add(w.id); found.push(w); }
          }
        }
      }
      return found;
    }
    
    function highlightWords(sentence, detectedWords) {
      if (!detectedWords?.length) return escapeHtml(sentence);
      const stems = [...new Set(detectedWords.map(w => extractKanjiStem(w.kanji)).filter(Boolean))].sort((a,b) => b.length - a.length);
      if (!stems.length) return escapeHtml(sentence);
      const pattern = new RegExp(`(${stems.map(escapeRegex).join('|')})`, 'g');
      return sentence.split(pattern).map(part =>
        stems.includes(part) ? `<span class="hl">${escapeHtml(part)}</span>` : escapeHtml(part)
      ).join('');
    }
    
    // ========== DATA LOADING ==========
    async function loadPaginated(table, select = '*', orderCol = 'id') {
      let all = [], page = 0;
      while (true) {
        const { data, error } = await sb.from(table).select(select).order(orderCol).range(page * 1000, (page + 1) * 1000 - 1);
        if (error) { console.error(`Load ${table}:`, error); break; }
        if (!data?.length) break;
        all = all.concat(data);
        if (data.length < 1000) break;
        page++;
      }
      return all;
    }
    
    async function loadAll() {
      state.loading = true; render();
      const [sentences, words, wordBooks, wordGroups, wordGroupMembers, storyAlerts, wordAlerts, stories, storyGroups, wordSentenceLinks, animeWords] = await Promise.all([
        loadPaginated('japanese_unified_sentences'),
        loadPaginated('japanese_unified_words'),
        loadPaginated('japanese_unified_word_books'),
        loadPaginated('japanese_word_groups'),
        loadPaginated('japanese_word_group_members'),
        loadPaginated('japanese_story_alerts'),
        loadPaginated('japanese_word_alerts'),
        loadPaginated('japanese_kanji_stories'),
        loadPaginated('japanese_kanji_story_groups'),
        loadPaginated('japanese_unified_word_sentences', 'id,word_id,sentence_id,rating'),
        loadPaginated('japanese_anime_words').catch(() => []),
      ]);
      state.sentences = sentences;
      state.words = words;
      state.wordBooks = wordBooks;
      state.wordGroups = wordGroups;
      state.wordGroupMembers = wordGroupMembers;
      state.storyAlerts = storyAlerts;
      state.wordAlerts = wordAlerts;
      state.stories = stories;
      state.storyGroups = storyGroups;
      state.wordSentenceLinks = wordSentenceLinks;
      state.animeWords = animeWords;
      state.loading = false;
      render();
    }
    
    // ========== DATA OPERATIONS ==========
    function getVerifyQueue() {
      let queue = state.sentences.filter(s => (s.verified || 'unverified') === 'unverified');
      if (state.verifySource !== 'all') queue = queue.filter(s => s.source === state.verifySource);
      return queue.sort((a, b) => (b.id || 0) - (a.id || 0));
    }
    
    async function updateSentence(id, updates) {
      const { error } = await sb.from('japanese_unified_sentences').update(updates).eq('id', id);
      if (error) { toast('Update failed: ' + error.message, 'error'); return false; }
      const s = state.sentences.find(s => s.id === id);
      if (s) Object.assign(s, updates);
      return true;
    }
    
    async function updateWord(id, updates) {
      const { error } = await sb.from('japanese_unified_words').update(updates).eq('id', id);
      if (error) { toast('Update failed: ' + error.message, 'error'); return false; }
      const w = state.words.find(w => w.id === id);
      if (w) Object.assign(w, updates);
      return true;
    }
    
    async function updateStory(kanji, updates) {
      const { error } = await sb.from('japanese_kanji_stories').update(updates).eq('kanji', kanji);
      if (error) { toast('Story update failed: ' + error.message, 'error'); return false; }
      const s = state.stories.find(s => s.kanji === kanji);
      if (s) Object.assign(s, updates);
      return true;
    }
    
    async function resolveAlert(table, id) {
      const { error } = await sb.from(table).update({ resolved: true, resolved_at: new Date().toISOString() }).eq('id', id);
      if (error) { toast('Resolve failed: ' + error.message, 'error'); return false; }
      return true;
    }
    
    async function addTag(sentenceId, tag) {
      const s = state.sentences.find(s => s.id === sentenceId);
      if (!s) return;
      const tags = [...(s.tags || [])];
      if (tags.includes(tag)) return;
      tags.push(tag);
      if (await updateSentence(sentenceId, { tags })) { toast(`Tag "${tag}" added`); render(); }
    }
    
    async function removeTag(sentenceId, tag) {
      const s = state.sentences.find(s => s.id === sentenceId);
      if (!s) return;
      const tags = (s.tags || []).filter(t => t !== tag);
      if (await updateSentence(sentenceId, { tags })) { toast('Tag removed'); render(); }
    }
    
    async function verifySentence(id, status) {
      return await updateSentence(id, { verified: status });
    }
    
    // Export sentences as JSON for AI review
    function exportSentencesForReview() {
      const toExport = state.sentences
        .filter(s => (s.verified || 'unverified') === 'unverified')
        .map(s => ({
          id: s.id,
          sentence: s.sentence,
          meaning_en: s.meaning_en || '',
          source: s.source || '',
          jlpt_level: s.jlpt_level || '',
          tags: s.tags || [],
        }));
      
      const blob = new Blob([JSON.stringify(toExport, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `sentences_review_${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
      toast(`Exported ${toExport.length} sentences`);
    }
    
    // Import AI review results (JSON)
    async function importAIReview() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json';
      input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        try {
          const text = await file.text();
          const results = JSON.parse(text);
          if (!Array.isArray(results)) { toast('Invalid JSON: expected array', 'error'); return; }
          
          let updated = 0;
          for (const r of results) {
            if (!r.id) continue;
            const updates = {};
            if (r.verified) updates.verified = r.verified;
            if (r.tags) updates.tags = r.tags;
            if (r.meaning_en) updates.meaning_en = r.meaning_en;
            if (r.corrected_sentence) updates.sentence = r.corrected_sentence;
            
            if (Object.keys(updates).length > 0) {
              const ok = await updateSentence(r.id, updates);
              if (ok) updated++;
            }
          }
          toast(`Imported: ${updated}/${results.length} sentences updated`);
          render();
        } catch (err) {
          toast('Import error: ' + err.message, 'error');
        }
      };
      input.click();
    }
    
    // AI Review via Anthropic API (Option B)
    async function aiReviewBatch() {
      const unverified = state.sentences
        .filter(s => (s.verified || 'unverified') === 'unverified')
        .slice(0, 15); // batch of 15
      
      if (unverified.length === 0) { toast('No unverified sentences', 'error'); return; }
      
      state.aiReviewing = true;
      state.aiResults = null;
      render();
      
      const sentenceList = unverified.map(s => 
        `ID:${s.id} | ${s.sentence} | ${s.meaning_en || '(no translation)'}`
      ).join('\n');
      
      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 4000,
            system: `You are a Japanese language expert reviewing sentences for a JLPT study app. For each sentence, evaluate:
1. Grammar correctness (is it natural Japanese?)
2. Suggest tags (grammar:てform, grammar:passive, vocab, etc.)
3. If meaning_en is wrong or missing, provide correct translation
4. Rate difficulty 1-3 (1=easy, 3=hard)
5. verdict: "verified", "rejected", or "needs_edit"
6. If needs_edit, provide corrected_sentence

Respond ONLY with a JSON array, no markdown. Each element: {"id": number, "verdict": string, "tags": string[], "meaning_en": string, "difficulty": number, "corrected_sentence": string|null, "notes": string}`,
            messages: [{ role: 'user', content: `Review these Japanese sentences:\n\n${sentenceList}` }]
          })
        });
        
        const data = await response.json();
        const text = data.content?.map(c => c.text || '').join('') || '';
        const clean = text.replace(/```json|```/g, '').trim();
        state.aiResults = JSON.parse(clean);
        state.aiReviewing = false;
        render();
        toast(`AI reviewed ${state.aiResults.length} sentences`);
      } catch (err) {
        state.aiReviewing = false;
        render();
        toast('AI review failed: ' + err.message, 'error');
      }
    }
    
    // Apply a single AI review result
    async function applyAIResult(resultIdx) {
      const r = state.aiResults?.[resultIdx];
      if (!r) return;
      const updates = {};
      if (r.verdict === 'verified' || r.verdict === 'rejected') updates.verified = r.verdict;
      if (r.tags?.length) updates.tags = r.tags;
      if (r.meaning_en) updates.meaning_en = r.meaning_en;
      if (r.difficulty) updates.difficulty = r.difficulty;
      if (r.corrected_sentence) updates.sentence = r.corrected_sentence;
      
      if (Object.keys(updates).length > 0 && await updateSentence(r.id, updates)) {
        r._applied = true;
        toast('Applied!');
        render();
      }
    }
    
    // ========== BULK OPERATIONS ==========
    function parseBulk() {
      const text = document.getElementById('bulkInput')?.value?.trim();
      if (!text) { toast('Paste sentences first', 'error'); return; }
      state.bulkInput = text;
      state.bulkSource = document.getElementById('bulkSource')?.value || 'manual';
      state.bulkLevel = document.getElementById('bulkLevel')?.value || '';
      
      const stemMap = buildStemMap();
      const sortedStems = Object.keys(stemMap).sort((a,b) => b.length - a.length);
      const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
      
      state.bulkParsed = lines.map(line => ({
        sentence: line,
        detectedWords: detectWords(line, stemMap, sortedStems),
        linked: false,
      }));
      state.bulkMsg = '';
      render();
      toast(`Parsed ${lines.length} sentences`);
    }
    
    async function bulkSaveAll() {
      if (!state.bulkParsed?.length) return;
      state.bulkSaving = true; render();
      
      const source = state.bulkSource || 'manual';
      const level = state.bulkLevel || null;
      const rows = state.bulkParsed.map(p => ({
        sentence: p.sentence,
        source,
        jlpt_level: level,
        verified: 'unverified',
        difficulty: 1,
      }));
      
      const { data: inserted, error } = await sb.from('japanese_unified_sentences').insert(rows).select();
      if (error) { toast('Insert failed: ' + error.message, 'error'); state.bulkSaving = false; render(); return; }
      
      // Build links
      const links = [];
      inserted.forEach((s, i) => {
        const parsed = state.bulkParsed[i];
        if (!parsed) return;
        parsed.detectedWords.forEach(w => {
          if (w.id) links.push({ word_id: w.id, sentence_id: s.id, rating: null });
        });
        parsed.linked = true;
        state.sentences.push(s);
      });
      
      let linkedCount = 0;
      if (links.length > 0) {
        const { data: linkData, error: linkErr } = await sb.from('japanese_unified_word_sentences').insert(links).select();
        if (!linkErr && linkData) linkedCount = linkData.length;
      }
      
      state.bulkSaving = false;
      state.bulkMsg = `✅ ${inserted.length} sentences saved, ${linkedCount} word links created`;
      render();
      toast(state.bulkMsg);
    }

    // ========== ANIME WORD REVIEW TAB ==========
    function renderAnimeReviewTab() {
      const knownKanji = new Set(state.words.map(w => w.kanji));
      
      // Categorize anime words
      let items = state.animeWords || [];

      const promotedCount = items.filter(a => a.promoted).length;
      const dismissedCount = items.filter(a => a.dismissed).length;
      
      // Filter
      if (state.animeFilter === 'pending') items = items.filter(a => !a.promoted && !a.dismissed);

      else if (state.animeFilter === 'dismissed') items = items.filter(a => a.dismissed);
      
      // Mark which are already in unified words
      items = items.map(a => ({
        ...a,
        alreadyInDB: knownKanji.has(a.word || a.kanji),

                    ${a.promoted ? '<span style="font-size:10px; padding:2px 6px; background:rgba(16,185,129,0.15); color:var(--emerald); border-radius:4px;">✓ Promoted</span>' : ''}

    // ========== SENTENCES TAB ==========
    function renderSentencesTab() {
      const stats = { unverified: 0, verified: 0, rejected: 0 };
      state.sentences.forEach(s => { const v = s.verified || 'unverified'; if (stats[v] !== undefined) stats[v]++; });
      
      let filtered = state.sentences.filter(s => {
        const v = s.verified || 'unverified';
        if (state.sentFilter !== 'all' && v !== state.sentFilter) return false;
        if (state.sentSource !== 'all' && s.source !== state.sentSource) return false;
        if (state.sentSearch) {
          const q = state.sentSearch.toLowerCase();
          if (!(s.sentence || '').includes(state.sentSearch) && !(s.meaning_en || '').toLowerCase().includes(q) && !(s.tags || []).some(t => t.includes(q))) return false;
        }
        return true;
      }).sort((a, b) => (b.id || 0) - (a.id || 0));
      
      const sources = [...new Set(state.sentences.map(s => s.source).filter(Boolean))].sort();
      const page = state.sentPage;
      const pageSize = 25;
      const totalPages = Math.ceil(filtered.length / pageSize);
      const items = filtered.slice(page * pageSize, (page + 1) * pageSize);
      
      const stemMap = buildStemMap();
      const sortedStems = Object.keys(stemMap).sort((a,b) => b.length - a.length);
      
      return `

          <div class="stat-card"><div class="stat-num" style="color:var(--red)">${stats.rejected}</div><div class="stat-label">Rejected</div></div>
          <div class="stat-card"><div class="stat-num">${state.sentences.length}</div><div class="stat-label">Total</div></div>

              <button class="btn btn-sm btn-ghost" id="importReviewBtn">📥 Import AI Results</button>

            <div class="card-header">
              <span class="card-title">🤖 AI REVIEW RESULTS (${state.aiResults.length} sentences)</span>

                      ${r.tags?.map(t => `<span class="tag ${tagClass(t)}">${escapeHtml(t)}</span>`).join('') || ''}
                      ${r.difficulty ? `<span style="color:var(--text-muted);">Diff: ${r.difficulty}</span>` : ''}
                    </div>
                    ${r.meaning_en ? `<div style="font-size:11px; color:var(--text-secondary);">EN: ${escapeHtml(r.meaning_en)}</div>` : ''}
                    ${r.corrected_sentence ? `<div style="font-size:11px; color:var(--amber);">Fix: ${escapeHtml(r.corrected_sentence)}</div>` : ''}

        ${items.map(s => {

          return `
            <div class="sent-item">

              <!-- Actions -->

    // ========== WORD GROUP EDITOR TAB ==========
    function renderGroupEditorTab() {
      const types = ['all', 'synonym', 'near_synonym', 'alt_kanji', 'alt_reading', 'context_variant'];
      const typeLabels = { all: 'All', synonym: 'Synonym', near_synonym: 'Near Synonym', alt_kanji: 'Alt Kanji', alt_reading: 'Alt Reading', context_variant: 'Context' };
      
      let groups = state.wordGroups || [];
      if (state.groupEditorType !== 'all') groups = groups.filter(g => g.group_type === state.groupEditorType);
      if (state.groupEditorSearch) {
        const q = state.groupEditorSearch.toLowerCase();
        groups = groups.filter(g => 
          (g.group_name || '').toLowerCase().includes(q) ||
          (g.group_key || '').includes(state.groupEditorSearch)
        );
      }
      groups.sort((a, b) => (b.id || 0) - (a.id || 0));
      
      const page = state.groupEditorPage || 0;
      const pageSize = 20;
      const totalPages = Math.ceil(groups.length / pageSize);
      const pageItems = groups.slice(page * pageSize, (page + 1) * pageSize);
      
      // Editing a specific group?
      if (state.editingGroup) return renderGroupEditDetail();
      
      return `
        <div style="margin-bottom:16px;">
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <div>
              <h2 style="font-size:16px; font-weight:700; margin-bottom:4px;">🔗 Word Group Editor</h2>
              <p style="font-size:12px; color:var(--text-muted);">${state.wordGroups.length} groups · ${(state.wordGroupMembers || []).length} word links</p>
            </div>
            <button class="btn btn-primary" id="createGroupBtn" style="font-size:12px;">+ New Group</button>
          </div>
        </div>
        
        <div class="filter-bar" style="margin-bottom:12px;">
          ${types.map(t => `
            <button class="btn btn-sm ${state.groupEditorType === t ? 'btn-primary' : 'btn-ghost'}" data-ge-type="${t}">${typeLabels[t] || t}</button>
          `).join('')}
        </div>
        
        <div style="margin-bottom:12px;">
          <input type="text" id="groupEditorSearch" placeholder="Search groups..." value="${escapeHtml(state.groupEditorSearch)}" style="width:100%;">
        </div>
        
        ${pageItems.length === 0 ? `
          <div style="text-align:center; padding:40px; color:var(--text-muted);">No groups found</div>
        ` : `
          <div style="display:flex; flex-direction:column; gap:6px;">
            ${pageItems.map(g => {
              const members = (state.wordGroupMembers || []).filter(m => m.group_id === g.id);
              const memberWords = members.map(m => state.words.find(w => w.id === m.word_id)).filter(Boolean);
              return `
                <div class="card" style="padding:10px 16px; cursor:pointer;" data-edit-group="${g.id}">
                  <div style="display:flex; align-items:center; justify-content:space-between;">
                    <div style="display:flex; align-items:center; gap:10px;">
                      <span style="font-size:10px; padding:2px 8px; background:var(--bg-input); border:1px solid var(--border); border-radius:4px; color:var(--accent);">${escapeHtml(g.group_type)}</span>
                      <span style="font-weight:600; font-size:14px; color:var(--text-primary);">${escapeHtml(g.group_name || g.group_key)}</span>
                    </div>
                    <div style="display:flex; align-items:center; gap:8px;">
                      <span style="font-size:11px; color:var(--text-muted);">${memberWords.length} words</span>
                      <span style="font-size:11px; color:var(--text-secondary);">${memberWords.slice(0, 4).map(w => w.kanji).join(' ')}${memberWords.length > 4 ? '...' : ''}</span>
                    </div>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
          
          ${totalPages > 1 ? `
            <div class="pagination" style="margin-top:12px;">
              <button class="btn btn-sm btn-ghost" id="gePrev" ${page === 0 ? 'disabled' : ''}>← Prev</button>
              <span style="font-size:12px; color:var(--text-muted);">${page + 1} / ${totalPages}</span>
              <button class="btn btn-sm btn-ghost" id="geNext" ${page >= totalPages - 1 ? 'disabled' : ''}>Next →</button>
            </div>
          ` : ''}
        `}
        
        <!-- Create group form (hidden) -->

    // ========== DUPLICATE DETECTION TAB ==========
    function renderDupesTab() {
      // Find words with duplicate kanji
      const kanjiCount = {};
      state.words.forEach(w => {
        if (!w.kanji) return;
        if (!kanjiCount[w.kanji]) kanjiCount[w.kanji] = [];
        kanjiCount[w.kanji].push(w);
      });
      
      const dupes = Object.entries(kanjiCount)
        .filter(([k, arr]) => arr.length > 1)
        .sort((a, b) => b[1].length - a[1].length);
      
      const page = state.dupePage || 0;
      const pageSize = 15;
      const totalPages = Math.ceil(dupes.length / pageSize);
      const pageItems = dupes.slice(page * pageSize, (page + 1) * pageSize);
      
      return `
        <div style="margin-bottom:16px;">
          <h2 style="font-size:16px; font-weight:700; margin-bottom:4px;">🔍 Duplicate Detection</h2>
          <p style="font-size:12px; color:var(--text-muted);">Words with the same kanji appearing multiple times in the database.</p>
        </div>
        
        <div class="stats-row" style="margin-bottom:16px;">
          <div class="stat-card"><div class="stat-num" style="color:${dupes.length > 0 ? 'var(--amber)' : 'var(--emerald)'}">${dupes.length}</div><div class="stat-label">Duplicate Kanji</div></div>
          <div class="stat-card"><div class="stat-num">${dupes.reduce((a, [, arr]) => a + arr.length, 0)}</div><div class="stat-label">Total Duplicate Rows</div></div>
        </div>
        
        ${dupes.length === 0 ? `
          <div style="text-align:center; padding:40px; color:var(--text-muted);">
            <div style="font-size:32px; margin-bottom:8px;">✅</div>
            <div>No duplicate words found!</div>
          </div>
        ` : `
          <div style="display:flex; flex-direction:column; gap:10px;">
            ${pageItems.map(([kanji, words]) => {
              // Find which word has most links (sentences, books)
              return `
                <div class="card" style="padding:14px 16px;">
                  <div style="font-size:20px; font-weight:700; color:var(--text-primary); margin-bottom:8px;">${escapeHtml(kanji)} <span style="font-size:12px; font-weight:400; color:var(--amber);">(${words.length} copies)</span></div>
                  <div style="display:flex; flex-direction:column; gap:6px;">
                    ${words.map(w => {
                      const bookLinks = (state.wordBooks || []).filter(wb => wb.word_id === w.id).length;
                      const sentLinks = (state.wordSentenceLinks || []).filter(l => l.word_id === w.id).length;
                      const groupLinks = (state.wordGroupMembers || []).filter(m => m.word_id === w.id).length;
                      const totalLinks = bookLinks + sentLinks + groupLinks;
                      return `
                        <div style="display:flex; align-items:center; justify-content:space-between; padding:6px 10px; background:var(--bg-input); border-radius:6px; border:1px solid var(--border);">
                          <div style="display:flex; align-items:center; gap:8px; flex:1;">
                            <span class="mono" style="font-size:10px; color:var(--text-muted);">ID:${w.id}</span>
                            <span style="font-size:12px; color:#60a5fa;">${escapeHtml(w.hiragana || '—')}</span>
                            <span style="font-size:11px; color:var(--emerald);">${escapeHtml(w.meaning_en || '—')}</span>
                            <span style="font-size:10px; color:var(--text-muted);">${w.source || 'textbook'}</span>
                          </div>
                          <div style="display:flex; align-items:center; gap:6px;">
                            <span style="font-size:10px; color:var(--text-muted);" title="Books / Sentences / Groups">${bookLinks}B ${sentLinks}S ${groupLinks}G</span>
                            ${totalLinks === 0 ? `<button class="btn btn-sm btn-ghost" data-delete-word="${w.id}" style="color:var(--red); font-size:10px;">🗑 Delete</button>` : `<span style="font-size:9px; color:var(--text-muted);">has links</span>`}
                          </div>
                        </div>
                      `;
                    }).join('')}
                  </div>
                </div>
              `;
            }).join('')}
          </div>
          
          ${totalPages > 1 ? `
            <div class="pagination" style="margin-top:12px;">
              <button class="btn btn-sm btn-ghost" id="dupePrev" ${page === 0 ? 'disabled' : ''}>← Prev</button>
              <span style="font-size:12px; color:var(--text-muted);">${page + 1} / ${totalPages}</span>
              <button class="btn btn-sm btn-ghost" id="dupeNext" ${page >= totalPages - 1 ? 'disabled' : ''}>Next →</button>
            </div>
          ` : ''}
        `}
      `;
    }
    
    // ========== ORPHANED DATA CLEANUP TAB ==========
    function renderOrphansTab() {
      const wordIds = new Set(state.words.map(w => w.id));
      const sentIds = new Set(state.sentences.map(s => s.id));
      const groupIds = new Set((state.wordGroups || []).map(g => g.id));
      
      // Check for orphans
      const orphanedBookLinks = (state.wordBooks || []).filter(wb => !wordIds.has(wb.word_id));
      const orphanedSentLinks = (state.wordSentenceLinks || []).filter(l => !wordIds.has(l.word_id) || !sentIds.has(l.sentence_id));
      const orphanedGroupMembers = (state.wordGroupMembers || []).filter(m => !wordIds.has(m.word_id) || !groupIds.has(m.group_id));
      
      const totalOrphans = orphanedBookLinks.length + orphanedSentLinks.length + orphanedGroupMembers.length;
      
      return `
        <div style="margin-bottom:16px;">
          <h2 style="font-size:16px; font-weight:700; margin-bottom:4px;">🧹 Orphaned Data Cleanup</h2>
          <p style="font-size:12px; color:var(--text-muted);">Find broken links: word-book links pointing to deleted words, sentence links with missing data, group members referencing non-existent IDs.</p>
        </div>
        
        <div class="stats-row" style="margin-bottom:20px;">
          <div class="stat-card">
            <div class="stat-num" style="color:${orphanedBookLinks.length > 0 ? 'var(--amber)' : 'var(--emerald)'}">${orphanedBookLinks.length}</div>
            <div class="stat-label">Orphaned Book Links</div>
            <div style="font-size:10px; color:var(--text-muted); margin-top:2px;">word_books → deleted words</div>
          </div>
          <div class="stat-card">
            <div class="stat-num" style="color:${orphanedSentLinks.length > 0 ? 'var(--amber)' : 'var(--emerald)'}">${orphanedSentLinks.length}</div>
            <div class="stat-label">Orphaned Sentence Links</div>
            <div style="font-size:10px; color:var(--text-muted); margin-top:2px;">word_sentences → missing data</div>
          </div>
          <div class="stat-card">
            <div class="stat-num" style="color:${orphanedGroupMembers.length > 0 ? 'var(--amber)' : 'var(--emerald)'}">${orphanedGroupMembers.length}</div>
            <div class="stat-label">Orphaned Group Members</div>
            <div style="font-size:10px; color:var(--text-muted); margin-top:2px;">group_members → missing IDs</div>
          </div>
        </div>
        
        ${totalOrphans === 0 ? `
          <div style="text-align:center; padding:40px; color:var(--text-muted);">
            <div style="font-size:48px; margin-bottom:12px;">✨</div>
            <div style="font-size:16px; font-weight:600;">Database is clean!</div>
            <div style="font-size:12px; margin-top:4px;">No orphaned records found.</div>
          </div>
        ` : `
          <!-- Orphaned Book Links -->
          ${orphanedBookLinks.length > 0 ? `
            <div class="card" style="margin-bottom:16px;">
              <div class="card-header" style="padding:12px 16px;">
                <span style="font-size:13px; font-weight:700;">📚 Orphaned Book Links (${orphanedBookLinks.length})</span>
                <button class="btn btn-sm btn-ghost" data-clean-orphan="book" style="color:var(--red);">🗑 Clean All</button>
              </div>
              <div style="padding:8px 16px; max-height:200px; overflow-y:auto;">
                ${orphanedBookLinks.slice(0, 20).map(wb => `
                  <div style="font-size:11px; padding:4px 0; border-bottom:1px solid var(--border); color:var(--text-secondary);">
                    Link ID:${wb.id} → word_id:${wb.word_id} (missing) · book:${escapeHtml(wb.book_code || '')}
                  </div>
                `).join('')}
                ${orphanedBookLinks.length > 20 ? `<div style="font-size:11px; color:var(--text-muted); padding:4px 0;">... and ${orphanedBookLinks.length - 20} more</div>` : ''}
              </div>
            </div>
          ` : ''}
          
          <!-- Orphaned Sentence Links -->
          ${orphanedSentLinks.length > 0 ? `
            <div class="card" style="margin-bottom:16px;">
              <div class="card-header" style="padding:12px 16px;">
                <span style="font-size:13px; font-weight:700;">💬 Orphaned Sentence Links (${orphanedSentLinks.length})</span>
                <button class="btn btn-sm btn-ghost" data-clean-orphan="sentence" style="color:var(--red);">🗑 Clean All</button>
              </div>
              <div style="padding:8px 16px; max-height:200px; overflow-y:auto;">
                ${orphanedSentLinks.slice(0, 20).map(l => `
                  <div style="font-size:11px; padding:4px 0; border-bottom:1px solid var(--border); color:var(--text-secondary);">
                    Link ID:${l.id} → word:${l.word_id}${!wordIds.has(l.word_id) ? '(missing)' : ''} · sent:${l.sentence_id}${!sentIds.has(l.sentence_id) ? '(missing)' : ''}
                  </div>
                `).join('')}
                ${orphanedSentLinks.length > 20 ? `<div style="font-size:11px; color:var(--text-muted); padding:4px 0;">... and ${orphanedSentLinks.length - 20} more</div>` : ''}
              </div>
            </div>
          ` : ''}
          
          <!-- Orphaned Group Members -->
          ${orphanedGroupMembers.length > 0 ? `
            <div class="card" style="margin-bottom:16px;">
              <div class="card-header" style="padding:12px 16px;">
                <span style="font-size:13px; font-weight:700;">🔗 Orphaned Group Members (${orphanedGroupMembers.length})</span>
                <button class="btn btn-sm btn-ghost" data-clean-orphan="group" style="color:var(--red);">🗑 Clean All</button>
              </div>
              <div style="padding:8px 16px; max-height:200px; overflow-y:auto;">
                ${orphanedGroupMembers.slice(0, 20).map(m => `
                  <div style="font-size:11px; padding:4px 0; border-bottom:1px solid var(--border); color:var(--text-secondary);">
                    Member ID:${m.id} → word:${m.word_id}${!wordIds.has(m.word_id) ? '(missing)' : ''} · group:${m.group_id}${!groupIds.has(m.group_id) ? '(missing)' : ''}
                  </div>
                `).join('')}
                ${orphanedGroupMembers.length > 20 ? `<div style="font-size:11px; color:var(--text-muted); padding:4px 0;">... and ${orphanedGroupMembers.length - 20} more</div>` : ''}
              </div>
            </div>
          ` : ''}
        `}
      `;
    }
    
    // ========== EVENT LISTENERS ==========
    function attachListeners() {
      // Tabs
      document.querySelectorAll('[data-tab]').forEach(btn => {
        btn.addEventListener('click', () => { state.tab = btn.dataset.tab; state.flagPage = 0; state.flagFilter = 'open'; render(); });
      });
      
      // Admin sign out
      document.getElementById('adminSignOutBtn')?.addEventListener('click', async () => {
        await sb.auth.signOut();
        state.user = null;
        render();
      });
      
      // Sentence filters
      document.querySelectorAll('[data-sent-filter]').forEach(btn => {
        btn.addEventListener('click', () => { state.sentFilter = btn.dataset.sentFilter; state.sentPage = 0; render(); });
      });
      document.getElementById('sentSourceFilter')?.addEventListener('change', e => { state.sentSource = e.target.value; state.sentPage = 0; render(); });
      
      let searchTimer;
      document.getElementById('sentSearch')?.addEventListener('input', e => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => { state.sentSearch = e.target.value; state.sentPage = 0; render(); }, 300);
      });
      
      // Sentence pagination
      document.getElementById('sentPrev')?.addEventListener('click', () => { state.sentPage--; render(); });
      document.getElementById('sentNext')?.addEventListener('click', () => { state.sentPage++; render(); });
      
      // Verify / reject
      document.querySelectorAll('[data-verify]').forEach(btn => btn.addEventListener('click', async () => { if (await verifySentence(parseInt(btn.dataset.verify), 'verified')) { toast('✓ Verified'); render(); } }));
      document.querySelectorAll('[data-reject]').forEach(btn => btn.addEventListener('click', async () => { if (await verifySentence(parseInt(btn.dataset.reject), 'rejected')) { toast('✗ Rejected'); render(); } }));
      document.querySelectorAll('[data-unverify]').forEach(btn => btn.addEventListener('click', async () => { if (await verifySentence(parseInt(btn.dataset.unverify), 'unverified')) { toast('↩ Unverified'); render(); } }));
      
      // Tags
      document.querySelectorAll('[data-add-tag]').forEach(btn => {
        btn.addEventListener('click', () => {
          const input = document.querySelector(`[data-tag-in="${btn.dataset.addTag}"]`);
          if (input?.value?.trim()) addTag(parseInt(btn.dataset.addTag), input.value.trim());
        });
      });
      document.querySelectorAll('[data-rm-tag]').forEach(btn => {
        btn.addEventListener('click', () => removeTag(parseInt(btn.dataset.rmTag), btn.dataset.rmVal));
      });
      
      // Bulk
      document.getElementById('parseBulkBtn')?.addEventListener('click', parseBulk);
      document.getElementById('bulkSaveBtn')?.addEventListener('click', bulkSaveAll);
      
      // Bulk: Add new word per sentence
      document.querySelectorAll('[data-bulk-add-word]').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = btn.dataset.bulkAddWord;
          const form = document.getElementById(`bulkAddWordForm_${idx}`);
          if (form) form.style.display = form.style.display === 'none' ? 'block' : 'none';
        });
      });
      
      document.querySelectorAll('[data-baw-cancel]').forEach(btn => {
        btn.addEventListener('click', () => {
          const form = document.getElementById(`bulkAddWordForm_${btn.dataset.bawCancel}`);
          if (form) form.style.display = 'none';
        });
      });
      
      document.querySelectorAll('[data-baw-save]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const idx = parseInt(btn.dataset.bawSave);
          const kanji = document.querySelector(`[data-baw-kanji="${idx}"]`)?.value?.trim();
          if (!kanji) { toast('Please enter kanji', 'error'); return; }
          
          const hiragana = document.querySelector(`[data-baw-hiragana="${idx}"]`)?.value?.trim() || '';
          const meaning_en = document.querySelector(`[data-baw-meaning="${idx}"]`)?.value?.trim() || '';
          const jlpt_level = document.querySelector(`[data-baw-level="${idx}"]`)?.value || '';
          const hint = document.querySelector(`[data-baw-hint="${idx}"]`)?.value?.trim() || '';
          const word_type = document.querySelector(`[data-baw-type="${idx}"]`)?.value?.trim() || '';
          
          // Check if word already exists
          const existing = state.words.find(w => w.kanji === kanji);
          if (existing) {
            toast(`「${kanji}」already exists (ID: ${existing.id})`, 'warn');
            return;
          }
          
          // Insert new word — always include jlpt_level (NOT NULL constraint)
          const insertData = { kanji, hiragana, meaning_en, hint, word_type, jlpt_level: jlpt_level || '' };
          
          // Try with source column
          insertData.source = 'bulk_add';
          let { data, error } = await sb.from('japanese_unified_words').insert(insertData).select();
          if (error && (error.message?.includes('source') || error.code === 'PGRST204')) {
            const { source, ...withoutSource } = insertData;
            const retry = await sb.from('japanese_unified_words').insert(withoutSource).select();
            data = retry.data;
            error = retry.error;
          }
          
          if (error) {
            toast('Save failed: ' + error.message, 'error');
            return;
          }
          
          const newWord = data[0];
          state.words.push(newWord);
          
          // Add to this sentence's detected words so it gets linked on "Save All"
          const parsed = state.bulkParsed?.[idx];
          if (parsed) {
            parsed.detectedWords.push(newWord);
            if (!parsed.addedWords) parsed.addedWords = [];
            parsed.addedWords.push(newWord);
          }
          
          toast(`「${kanji}」added! Will be linked on Save All.`);
          render();
        });
      });
      
      // Flag filters
      document.querySelectorAll('[data-flag-filter]').forEach(btn => {
        btn.addEventListener('click', () => { state.flagFilter = btn.dataset.flagFilter; state.flagPage = 0; render(); });
      });
      document.getElementById('flagPrev')?.addEventListener('click', () => { state.flagPage--; render(); });
      document.getElementById('flagNext')?.addEventListener('click', () => { state.flagPage++; render(); });
      
      // Save story edits (now includes onyomi/kunyomi)
      document.querySelectorAll('[data-save-story]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const kanji = btn.dataset.saveStory;
          const alertId = parseInt(btn.dataset.alertId);
          const meaning = document.querySelector(`[data-story-edit-meaning="${kanji}"]`)?.value || '';
          const story = document.querySelector(`[data-story-edit-story="${kanji}"]`)?.value || '';
          const onyomi = document.querySelector(`[data-story-edit-onyomi="${kanji}"]`)?.value || '';
          const kunyomi = document.querySelector(`[data-story-edit-kunyomi="${kanji}"]`)?.value || '';
          
          const ok = await updateStory(kanji, { meaning, story, onyomi, kunyomi });
          if (ok && alertId) {
            await resolveAlert('japanese_story_alerts', alertId);
            const a = state.storyAlerts.find(a => a.id === alertId);
            if (a) a.resolved = true;
          }
          if (ok) { toast('Story updated & resolved!'); render(); }
        });
      });
      
      // Resolve story without edit
      document.querySelectorAll('[data-resolve-story]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = parseInt(btn.dataset.resolveStory);
          const ok = await resolveAlert('japanese_story_alerts', id);
          if (ok) { const a = state.storyAlerts.find(a => a.id === id); if (a) a.resolved = true; toast('Resolved'); render(); }
        });
      });
      
      // Save unified word edits
      document.querySelectorAll('[data-save-unified]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const wordId = parseInt(btn.dataset.saveUnified);
          const alertId = parseInt(btn.dataset.alertId);
          
          const kanji = document.querySelector(`[data-uw-edit-kanji="${wordId}"]`)?.value || '';
          const hiragana = document.querySelector(`[data-uw-edit-hiragana="${wordId}"]`)?.value || '';
          const meaning_en = document.querySelector(`[data-uw-edit-meaning="${wordId}"]`)?.value || '';
          const hint = document.querySelector(`[data-uw-edit-hint="${wordId}"]`)?.value || '';
          const word_type = document.querySelector(`[data-uw-edit-type="${wordId}"]`)?.value || '';
          
          const ok = await updateWord(wordId, { kanji, hiragana, meaning_en, hint, word_type });
          if (ok && alertId) {
            await resolveAlert('japanese_word_alerts', alertId);
            const a = state.wordAlerts.find(a => a.id === alertId);
            if (a) a.resolved = true;
          }
          if (ok) { toast('Unified word updated!'); render(); }
        });
      });
      
      // Resolve word without edit
      document.querySelectorAll('[data-resolve-word]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = parseInt(btn.dataset.resolveWord);
          const ok = await resolveAlert('japanese_word_alerts', id);
          if (ok) { const a = state.wordAlerts.find(a => a.id === id); if (a) a.resolved = true; toast('Resolved'); render(); }
        });
      });
      
      // Export / Import / AI Review
      document.getElementById('exportSentencesBtn')?.addEventListener('click', exportSentencesForReview);
      document.getElementById('importReviewBtn')?.addEventListener('click', importAIReview);
      document.getElementById('aiToggle')?.addEventListener('change', (e) => { state.aiEnabled = e.target.checked; render(); });
      document.getElementById('aiReviewBtn')?.addEventListener('click', aiReviewBatch);
      document.getElementById('clearAIResultsBtn')?.addEventListener('click', () => { state.aiResults = null; render(); });
      document.querySelectorAll('[data-apply-ai]').forEach(btn => {
        btn.addEventListener('click', () => applyAIResult(parseInt(btn.dataset.applyAi)));
      });
      
      // ===== INCOMPLETE TAB =====
      document.querySelectorAll('[data-incomplete-filter]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.incompleteFilter = btn.dataset.incompleteFilter;
          state.incompletePage = 0;
          render();
        });
      });
      
      document.getElementById('incPrev')?.addEventListener('click', () => { state.incompletePage--; render(); });
      document.getElementById('incNext')?.addEventListener('click', () => { state.incompletePage++; render(); });
      
      // Save incomplete word inline edits
      document.querySelectorAll('[data-save-incomplete]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const wordId = parseInt(btn.dataset.saveIncomplete);
          const hiragana = document.querySelector(`[data-inc-hiragana="${wordId}"]`)?.value || '';
          const meaning_en = document.querySelector(`[data-inc-meaning="${wordId}"]`)?.value || '';
          const hint = document.querySelector(`[data-inc-hint="${wordId}"]`)?.value || '';
          
          const { error } = await sb.from('japanese_unified_words')
            .update({ hiragana, meaning_en, hint })
            .eq('id', wordId);
          
          if (error) {
            toast('Save failed: ' + error.message, 'error');
          } else {
            // Update local state
            const w = state.words.find(w => w.id === wordId);
            if (w) { w.hiragana = hiragana; w.meaning_en = meaning_en; w.hint = hint; }
            toast('Word updated!');
            render();
          }
        });
      });
      
      // ===== VERIFY QUEUE TAB =====
      document.querySelectorAll('[data-verify-source]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.verifySource = btn.dataset.verifySource;
          state.verifyIdx = 0;
          render();
        });
      });
      
      // Bulk AI panel toggle
      document.getElementById('toggleBulkAIPanel')?.addEventListener('click', () => {
        state.showBulkAI = !state.showBulkAI;
        const panel = document.getElementById('bulkAIPanel');
        if (panel) panel.style.display = state.showBulkAI ? 'block' : 'none';
      });
      
      // Export batch for AI review
      document.getElementById('verifyExportBtn')?.addEventListener('click', () => {
        const batchSize = parseInt(document.getElementById('verifyExportSize')?.value) || 50;
        const queue = getVerifyQueue();
        const batch = queue.slice(0, batchSize);
        
        const toExport = batch.map(s => ({
          id: s.id,
          sentence: s.sentence,
          meaning_en: s.meaning_en || '',
          source: s.source || '',
          jlpt_level: s.jlpt_level || '',
          tags: s.tags || [],
        }));
        
        const blob = new Blob([JSON.stringify(toExport, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `verify_batch_${new Date().toISOString().slice(0,10)}_${batchSize}.json`;
        a.click();
        URL.revokeObjectURL(url);
        toast(`Exported ${toExport.length} sentences for AI review`);
      });
      
      // Copy AI prompt
      document.getElementById('verifyCopyPromptBtn')?.addEventListener('click', () => {
        const box = document.getElementById('aiPromptBox');
        if (box) box.style.display = box.style.display === 'none' ? 'block' : 'none';
      });
      
      document.getElementById('copyPromptTextBtn')?.addEventListener('click', () => {
        const text = document.getElementById('aiPromptText')?.value || '';
        navigator.clipboard.writeText(text).then(() => toast('Prompt copied!')).catch(() => {
          document.getElementById('aiPromptText')?.select();
          toast('Select all and copy manually', 'warn');
        });
      });
      
      // Import AI results
      document.getElementById('verifyImportBtn')?.addEventListener('click', () => importAIReview());
      
      document.getElementById('verifyAcceptBtn')?.addEventListener('click', async () => {
        const queue = getVerifyQueue();
        const sent = queue[state.verifyIdx];
        if (!sent) return;
        const ok = await verifySentence(sent.id, 'verified');
        if (ok) {
          toast('✓ Verified');
          // Stay at same index (next unverified slides in)
          const newQueue = getVerifyQueue();
          if (state.verifyIdx >= newQueue.length) state.verifyIdx = Math.max(0, newQueue.length - 1);
          render();
        }
      });
      
      document.getElementById('verifyRejectBtn')?.addEventListener('click', async () => {
        const queue = getVerifyQueue();
        const sent = queue[state.verifyIdx];
        if (!sent) return;
        const ok = await verifySentence(sent.id, 'rejected');
        if (ok) {
          toast('✕ Rejected');
          const newQueue = getVerifyQueue();
          if (state.verifyIdx >= newQueue.length) state.verifyIdx = Math.max(0, newQueue.length - 1);
          render();
        }
      });
      
      document.getElementById('verifySkipBtn')?.addEventListener('click', () => {
        const queue = getVerifyQueue();
        if (state.verifyIdx < queue.length - 1) { state.verifyIdx++; render(); }
      });
      
      document.getElementById('verifyPrevBtn')?.addEventListener('click', () => {
        if (state.verifyIdx > 0) { state.verifyIdx--; render(); }
      });
      document.getElementById('verifyNextBtn')?.addEventListener('click', () => {
        const queue = getVerifyQueue();
        if (state.verifyIdx < queue.length - 1) { state.verifyIdx++; render(); }
      });
      
      // ===== ANIME REVIEW TAB =====
      document.querySelectorAll('[data-anime-filter]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.animeFilter = btn.dataset.animeFilter;
          state.animePage = 0;
          render();
        });
      });
      
      document.getElementById('animePrev')?.addEventListener('click', () => { state.animePage--; render(); });
      document.getElementById('animeNext')?.addEventListener('click', () => { state.animePage++; render(); });
      
      // Promote anime word to unified words
      document.querySelectorAll('[data-anime-promote]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const animeId = parseInt(btn.dataset.animePromote);
          const wordText = btn.dataset.animeWord;
          const hiragana = document.querySelector(`[data-anime-hiragana="${animeId}"]`)?.value?.trim() || '';
          const meaning = document.querySelector(`[data-anime-meaning="${animeId}"]`)?.value?.trim() || '';
          
          // Check if already in unified words
          const existing = state.words.find(w => w.kanji === wordText);
          if (!existing) {
            // Insert into japanese_unified_words
            const insertData = { kanji: wordText, hiragana, meaning_en: meaning, hint: '', jlpt_level: '', source: 'anime' };
            let { data, error } = await sb.from('japanese_unified_words').insert(insertData).select();
            if (error && (error.message?.includes('source') || error.code === 'PGRST204')) {
              const { source, ...withoutSource } = insertData;
              const retry = await sb.from('japanese_unified_words').insert(withoutSource).select();
              data = retry.data; error = retry.error;
            }
            if (error) { toast('Insert failed: ' + error.message, 'error'); return; }
            if (data?.[0]) state.words.push(data[0]);
          }
          
          // Mark as promoted in anime_words
          await sb.from('japanese_anime_words').update({ promoted: true }).eq('id', animeId);
          const aw = state.animeWords.find(a => a.id === animeId);
          if (aw) aw.promoted = true;
          
          toast(`「${wordText}」promoted!`);
          render();
        });
      });
      
      // Dismiss anime word
      document.querySelectorAll('[data-anime-dismiss]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const animeId = parseInt(btn.dataset.animeDismiss);
          await sb.from('japanese_anime_words').update({ dismissed: true }).eq('id', animeId);
          const aw = state.animeWords.find(a => a.id === animeId);
          if (aw) aw.dismissed = true;
          toast('Dismissed');
          render();
        });
      });
      
      // ===== GROUP EDITOR TAB =====
      document.querySelectorAll('[data-ge-type]').forEach(btn => {
        btn.addEventListener('click', () => { state.groupEditorType = btn.dataset.geType; state.groupEditorPage = 0; render(); });
      });
      
      let geSearchTimer;
      document.getElementById('groupEditorSearch')?.addEventListener('input', e => {
        clearTimeout(geSearchTimer);
        geSearchTimer = setTimeout(() => { state.groupEditorSearch = e.target.value; state.groupEditorPage = 0; render(); }, 300);
      });
      
      document.getElementById('gePrev')?.addEventListener('click', () => { state.groupEditorPage--; render(); });
      document.getElementById('geNext')?.addEventListener('click', () => { state.groupEditorPage++; render(); });
      
      // Click group to edit
      document.querySelectorAll('[data-edit-group]').forEach(el => {
        el.addEventListener('click', () => {
          const gid = parseInt(el.dataset.editGroup);
          state.editingGroup = state.wordGroups.find(g => g.id === gid) || null;
          render();
        });
      });
      
      // Back from group detail
      document.getElementById('backToGroupListBtn')?.addEventListener('click', () => { state.editingGroup = null; render(); });
      
      // Save group metadata
      document.getElementById('saveGroupMetaBtn')?.addEventListener('click', async () => {
        const g = state.editingGroup;
        if (!g) return;
        const name = document.getElementById('editGroupName')?.value?.trim() || '';
        const key = document.getElementById('editGroupKey')?.value?.trim() || '';
        const desc = document.getElementById('editGroupDesc')?.value?.trim() || '';
        const { error } = await sb.from('japanese_word_groups').update({ group_name: name, group_key: key, description: desc }).eq('id', g.id);
        if (error) { toast('Save failed: ' + error.message, 'error'); return; }
        g.group_name = name; g.group_key = key; g.description = desc;
        toast('Group updated!'); render();
      });
      
      // Delete empty group
      document.getElementById('deleteGroupBtn')?.addEventListener('click', async () => {
        const g = state.editingGroup;
        if (!g) return;
        if (!confirm(`Delete group "${g.group_name || g.group_key}"?`)) return;
        const { error } = await sb.from('japanese_word_groups').delete().eq('id', g.id);
        if (error) { toast('Delete failed: ' + error.message, 'error'); return; }
        state.wordGroups = state.wordGroups.filter(gr => gr.id !== g.id);
        state.editingGroup = null;
        toast('Group deleted!'); render();
      });
      
      // Remove member from group
      document.querySelectorAll('[data-remove-member]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const memberId = parseInt(btn.dataset.removeMember);
          const { error } = await sb.from('japanese_word_group_members').delete().eq('id', memberId);
          if (error) { toast('Remove failed: ' + error.message, 'error'); return; }
          state.wordGroupMembers = state.wordGroupMembers.filter(m => m.id !== memberId);
          toast('Member removed'); render();
        });
      });
      
      // Add member to group
      document.getElementById('addMemberBtn')?.addEventListener('click', async () => {
        const g = state.editingGroup;
        if (!g) return;
        const kanji = document.getElementById('addMemberKanji')?.value?.trim();
        if (!kanji) return;
        
        let word = state.words.find(w => w.kanji === kanji);
        if (!word) {
          // Insert new word
          const insertData = { kanji, hiragana: '', meaning_en: '', hint: '', jlpt_level: '', source: 'group_add' };
          let { data, error } = await sb.from('japanese_unified_words').insert(insertData).select();
          if (error && (error.message?.includes('source') || error.code === 'PGRST204')) {
            const { source, ...ws } = insertData;
            const retry = await sb.from('japanese_unified_words').insert(ws).select();
            data = retry.data; error = retry.error;
          }
          if (error) { toast('Word insert failed: ' + error.message, 'error'); return; }
          word = data[0]; state.words.push(word);
        }
        
        // Check if already in group
        if (state.wordGroupMembers.some(m => m.group_id === g.id && m.word_id === word.id)) {
          toast('Already in this group', 'warn'); return;
        }
        
        const nextSort = state.wordGroupMembers.filter(m => m.group_id === g.id).length + 1;
        const { data, error } = await sb.from('japanese_word_group_members').insert({ group_id: g.id, word_id: word.id, sort_order: nextSort }).select();
        if (error) { toast('Link failed: ' + error.message, 'error'); return; }
        state.wordGroupMembers.push(data[0]);
        toast(`「${kanji}」added to group!`); render();
      });
      
      // Create new group
      document.getElementById('createGroupBtn')?.addEventListener('click', () => {
        const form = document.getElementById('createGroupForm');
        if (form) form.style.display = form.style.display === 'none' ? 'block' : 'none';
      });
      document.getElementById('cancelCreateGroup')?.addEventListener('click', () => {
        document.getElementById('createGroupForm').style.display = 'none';
      });
      document.getElementById('submitCreateGroup')?.addEventListener('click', async () => {
        const name = document.getElementById('newGroupName')?.value?.trim();
        const type = document.getElementById('newGroupType')?.value;
        const key = document.getElementById('newGroupKey')?.value?.trim() || name;
        const desc = document.getElementById('newGroupDesc')?.value?.trim() || '';
        if (!name || !type) { toast('Name and type required', 'error'); return; }
        
        const { data, error } = await sb.from('japanese_word_groups').insert({ group_name: name, group_type: type, group_key: key, description: desc, status: 'draft' }).select();
        if (error) { toast('Create failed: ' + error.message, 'error'); return; }
        state.wordGroups.push(data[0]);
        toast('Group created!'); render();
      });
      
      // ===== DUPLICATE TAB =====
      document.getElementById('dupePrev')?.addEventListener('click', () => { state.dupePage--; render(); });
      document.getElementById('dupeNext')?.addEventListener('click', () => { state.dupePage++; render(); });
      
      document.querySelectorAll('[data-delete-word]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const wordId = parseInt(btn.dataset.deleteWord);
          const word = state.words.find(w => w.id === wordId);
          if (!confirm(`Delete word "${word?.kanji}" (ID:${wordId})?`)) return;
          const { error } = await sb.from('japanese_unified_words').delete().eq('id', wordId);
          if (error) { toast('Delete failed: ' + error.message, 'error'); return; }
          state.words = state.words.filter(w => w.id !== wordId);
          toast('Word deleted!'); render();
        });
      });
      
      // ===== ORPHAN CLEANUP =====
      document.querySelectorAll('[data-clean-orphan]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const type = btn.dataset.cleanOrphan;
          const wordIds = new Set(state.words.map(w => w.id));
          const sentIds = new Set(state.sentences.map(s => s.id));
          const groupIds = new Set((state.wordGroups || []).map(g => g.id));
          
          let table, orphanIds;
          if (type === 'book') {
            table = 'japanese_unified_word_books';
            orphanIds = (state.wordBooks || []).filter(wb => !wordIds.has(wb.word_id)).map(wb => wb.id);
          } else if (type === 'sentence') {
            table = 'japanese_unified_word_sentences';
            orphanIds = (state.wordSentenceLinks || []).filter(l => !wordIds.has(l.word_id) || !sentIds.has(l.sentence_id)).map(l => l.id);
          } else if (type === 'group') {
            table = 'japanese_word_group_members';
            orphanIds = (state.wordGroupMembers || []).filter(m => !wordIds.has(m.word_id) || !groupIds.has(m.group_id)).map(m => m.id);
          }
          
          if (!orphanIds?.length) { toast('Nothing to clean'); return; }
          if (!confirm(`Delete ${orphanIds.length} orphaned rows from ${table}?`)) return;
          
          // Delete in batches of 500
          let deleted = 0;
          for (let i = 0; i < orphanIds.length; i += 500) {
            const batch = orphanIds.slice(i, i + 500);
            const { error } = await sb.from(table).delete().in('id', batch);
            if (error) { toast('Partial cleanup error: ' + error.message, 'error'); break; }
            deleted += batch.length;
          }
          
          // Update local state
          if (type === 'book') state.wordBooks = state.wordBooks.filter(wb => !orphanIds.includes(wb.id));
          else if (type === 'sentence') state.wordSentenceLinks = state.wordSentenceLinks.filter(l => !orphanIds.includes(l.id));
          else if (type === 'group') state.wordGroupMembers = state.wordGroupMembers.filter(m => !orphanIds.includes(m.id));
          
          toast(`Cleaned ${deleted} orphaned rows!`); render();
        });
      });
    }
    
    // ========== INIT ==========
    async function init() {
      render(); // show "checking auth..."
      
      // Check existing session
      const { data: { session } } = await sb.auth.getSession();
      if (session) {
        state.user = session.user;
      }
      state.authChecked = true;
      
      // Listen for auth changes (handles OAuth redirect)
      sb.auth.onAuthStateChange((event, session) => {
        if (event === 'INITIAL_SESSION') return;
        state.user = session?.user || null;
        state.authChecked = true;
        if (state.user?.id === ADMIN_USER_ID && state.words.length === 0) {
          loadAll();
        }
        render();
      });
      
      // If already admin, load data
      if (state.user?.id === ADMIN_USER_ID) {
        await loadAll();
      }
      
      render();
    }
    
    init();
  </script>
</body>
</html>
