<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>アニメ Reading Mode — JLPT Vocabulary Master</title>
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=M+PLUS+Rounded+1c:wght@400;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root{--bg-deep:#07070d;--bg-surface:#0f1019;--bg-card:#161822;--bg-elevated:#1e2030;--border-dim:#252839;--border-glow:#3d4166;--text-primary:#e8e9f0;--text-secondary:#8b8fa8;--text-muted:#555873;--accent-cyan:#00d4ff;--accent-pink:#ff3b8b;--accent-amber:#ffb03a;--accent-green:#00e88f;--accent-purple:#b07dff;--word-known:#00e88f;--word-unknown:#ff3b8b;--word-saved:#b07dff}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Noto Sans JP',sans-serif;background:var(--bg-deep);color:var(--text-primary);min-height:100vh;overscroll-behavior:none;-webkit-font-smoothing:antialiased}
    .hide-sb::-webkit-scrollbar{display:none}.hide-sb{-ms-overflow-style:none;scrollbar-width:none}
    .app-header{background:var(--bg-surface);border-bottom:1px solid var(--border-dim);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
    .app-title{font-family:'M PLUS Rounded 1c',sans-serif;font-size:16px;font-weight:700;background:linear-gradient(135deg,var(--accent-cyan),var(--accent-purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .header-actions{display:flex;gap:8px;align-items:center}
    .btn-icon{width:36px;height:36px;border:1px solid var(--border-dim);background:var(--bg-card);border-radius:8px;color:var(--text-secondary);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;font-size:16px;text-decoration:none}
    .btn-icon:hover{border-color:var(--accent-cyan);color:var(--accent-cyan)}
    .view{padding:16px;max-width:580px;margin:0 auto}
    .card{background:var(--bg-card);border:1px solid var(--border-dim);border-radius:14px;padding:20px;margin-bottom:16px}
    .form-label{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;display:block}
    .form-input{width:100%;background:var(--bg-elevated);border:1px solid var(--border-dim);border-radius:8px;padding:10px 14px;font-size:15px;color:var(--text-primary);font-family:'Noto Sans JP',sans-serif;outline:none;transition:border-color .15s;margin-bottom:14px}
    .form-input:focus{border-color:var(--accent-cyan)}.form-input::placeholder{color:var(--text-muted)}
    .btn-primary{width:100%;padding:14px 24px;border:none;border-radius:12px;font-size:15px;font-weight:700;font-family:'M PLUS Rounded 1c',sans-serif;cursor:pointer;transition:all .2s;background:linear-gradient(135deg,var(--accent-cyan),#0098cc);color:var(--bg-deep)}
    .btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,212,255,.3)}.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
    .btn-secondary{padding:10px 20px;border:1px solid var(--border-dim);border-radius:10px;font-size:13px;font-weight:500;background:var(--bg-card);color:var(--text-secondary);cursor:pointer;transition:all .15s}
    .btn-secondary:hover{border-color:var(--accent-cyan);color:var(--text-primary)}
    .ep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(64px,1fr));gap:8px}
    .ep-btn{padding:12px 4px;border:1px solid var(--border-dim);border-radius:10px;background:var(--bg-elevated);color:var(--text-secondary);text-align:center;cursor:pointer;transition:all .15s;font-size:14px;font-weight:600}
    .ep-btn:hover{border-color:var(--accent-cyan);color:var(--text-primary);background:var(--bg-card)}
    .import-tabs{display:flex;margin-bottom:16px;border-radius:10px;overflow:hidden;border:1px solid var(--border-dim)}
    .import-tab{flex:1;padding:10px 0;text-align:center;font-size:13px;font-weight:500;background:var(--bg-card);color:var(--text-secondary);cursor:pointer;transition:all .15s;border:none}
    .import-tab.active{background:var(--accent-cyan);color:var(--bg-deep);font-weight:700}
    .drop-zone{border:2px dashed var(--border-glow);border-radius:14px;padding:32px 20px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg-card);margin-bottom:16px}
    .drop-zone:hover,.drop-zone.dragover{border-color:var(--accent-cyan);background:rgba(0,212,255,.04)}
    .text-import-area{width:100%;min-height:100px;background:var(--bg-elevated);border:1px solid var(--border-dim);border-radius:10px;padding:12px;font-size:15px;color:var(--text-primary);font-family:'Noto Sans JP',sans-serif;outline:none;resize:vertical;line-height:1.7;margin-bottom:16px}
    .reading-header{background:var(--bg-surface);border-bottom:1px solid var(--border-dim);padding:10px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:49px;z-index:90}
    .reading-meta{flex:1;min-width:0}
    .reading-anime-name{font-size:13px;font-weight:600;color:var(--accent-cyan);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .reading-episode{font-size:11px;color:var(--text-muted)}
    .reading-stats{display:flex;gap:12px;font-size:11px;font-family:'IBM Plex Mono',monospace}
    .dialogue-container{padding:16px;max-width:680px;margin:0 auto}
    .dialogue-line{margin-bottom:16px;padding:14px 16px;background:var(--bg-card);border:1px solid var(--border-dim);border-radius:12px;animation:fadeUp .3s ease-out both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .dl-timestamp{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text-muted);margin-bottom:6px}
    .dl-speaker{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;margin-bottom:6px;background:rgba(176,125,255,.15);color:var(--accent-purple);border:1px solid rgba(176,125,255,.25)}
    .dl-speaker.narrator{background:rgba(85,88,115,.2);color:var(--text-muted);border-color:var(--border-dim)}
    .dl-text{font-size:20px;line-height:1.8;letter-spacing:.02em}
    .word-token{display:inline;cursor:pointer;border-radius:3px;padding:1px 2px;transition:all .12s;position:relative}
    .word-token:hover{background:rgba(255,255,255,.08)}
    .word-token.known{color:var(--word-known)}.word-token.unknown{color:var(--word-unknown);border-bottom:2px dotted var(--word-unknown)}.word-token.saved{color:var(--word-saved);border-bottom:2px solid var(--word-saved)}.word-token.punct{color:var(--text-muted);cursor:default}
    .word-popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);animation:fadeIn .15s ease-out}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .word-popup{width:100%;max-width:480px;background:var(--bg-elevated);border-top:1px solid var(--border-glow);border-radius:20px 20px 0 0;padding:24px 20px 32px;animation:slideUp .2s ease-out;max-height:70vh;overflow-y:auto}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .popup-handle{width:36px;height:4px;background:var(--border-glow);border-radius:2px;margin:0 auto 18px}
    .popup-surface{font-size:40px;font-weight:700;text-align:center;margin-bottom:4px}
    .popup-reading{font-size:18px;color:var(--accent-cyan);font-family:'M PLUS Rounded 1c',sans-serif;text-align:center}
    .popup-meaning{background:var(--bg-card);border:1px solid var(--border-dim);border-radius:10px;padding:14px 16px;margin:14px 0}
    .popup-context{background:var(--bg-card);border:1px solid var(--border-dim);border-radius:10px;padding:14px 16px;margin-bottom:16px;font-size:14px;color:var(--text-secondary);line-height:1.7}
    .popup-context em{color:var(--accent-pink);font-style:normal;font-weight:600}
    .popup-tag{display:inline-block;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:500;margin-bottom:16px}
    .popup-tag.known{background:rgba(0,232,143,.12);color:var(--word-known);border:1px solid rgba(0,232,143,.25)}
    .popup-tag.unknown{background:rgba(255,59,139,.12);color:var(--word-unknown);border:1px solid rgba(255,59,139,.25)}
    .popup-tag.saved{background:rgba(176,125,255,.12);color:var(--word-saved);border:1px solid rgba(176,125,255,.25)}
    .btn-save-word{width:100%;padding:13px;border:none;border-radius:10px;font-size:14px;font-weight:700;font-family:'M PLUS Rounded 1c',sans-serif;cursor:pointer;transition:all .2s;background:linear-gradient(135deg,var(--accent-pink),#cc2e6f);color:white}
    .btn-save-word:disabled{opacity:.4;cursor:not-allowed}
    .btn-save-word.saved{background:linear-gradient(135deg,var(--accent-purple),#8a5fd9)}
    .btn-remove-word{width:100%;padding:10px;border:1px solid var(--border-dim);border-radius:10px;font-size:12px;background:transparent;color:var(--text-muted);cursor:pointer;margin-top:8px}
    .summary-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
    .summary-stat{text-align:center;padding:12px 8px;background:var(--bg-elevated);border-radius:10px}
    .summary-stat b{font-size:24px;font-family:'M PLUS Rounded 1c',sans-serif;display:block}
    .summary-stat small{font-size:10px;color:var(--text-muted);text-transform:uppercase}
    .word-list-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border-dim)}
    .word-list-item:last-child{border-bottom:none}
    .login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
    .btn-google{padding:12px 32px;border:1px solid var(--border-glow);border-radius:12px;background:var(--bg-card);color:var(--text-primary);font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:10px}
    .btn-google:hover{border-color:var(--accent-cyan);background:var(--bg-elevated)}
    @media(min-width:640px){.dl-text{font-size:24px}.word-popup{border-radius:20px;margin:auto;max-height:80vh}.word-popup-overlay{align-items:center}}
  </style>
</head>
<body>
<div id="app"></div>
<script>
const SUPABASE_URL='https://ulgrfumbwjovbjzjiems.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVsZ3JmdW1id2pvdmJqemppZW1zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjczNzIyNjcsImV4cCI6MjA4Mjk0ODI2N30.ix5Vh4Y3GXNbQbzVtTD_WSko0L3cr5q_eCnTuDEMh7M';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
const segmenter=new Intl.Segmenter('ja',{granularity:'word'});
const isKanji=c=>c>='\u4E00'&&c<='\u9FFF';
const isHiragana=c=>c>='\u3040'&&c<='\u309F';
const isKatakana=c=>c>='\u30A0'&&c<='\u30FF';
const isJP=s=>[...s].some(c=>isKanji(c)||isHiragana(c)||isKatakana(c));
const isPunct=s=>/^[\s\p{P}\p{S}\uFF01\uFF1F\u3002\u3001\u300C\u300D\u300E\u300F\uFF08\uFF09\u2026\u2015\uFF5E\u30FB]+$/u.test(s);

function parseSRT(t){const b=t.trim().replace(/\r\n/g,'\n').split(/\n\n+/),L=[];for(const k of b){const p=k.split('\n');if(p.length<3)continue;const m=p[1].match(/(\d{2}:\d{2}:\d{2}[,.]?\d{0,3})\s*-->\s*(\d{2}:\d{2}:\d{2}[,.]?\d{0,3})/);if(!m)continue;const d=p.slice(2).join(' ').replace(/<[^>]+>/g,'').replace(/\{[^}]+\}/g,'').trim();if(!d)continue;L.push({start:m[1].replace(',','.'),end:m[2].replace(',','.'),text:d})}return L}
function parseASS(t){const L=[],re=/^Dialogue:\s*\d+,(\d+:\d{2}:\d{2}\.\d{2}),(\d+:\d{2}:\d{2}\.\d{2}),[^,]*,[^,]*,\d+,\d+,\d+,[^,]*,(.*)/;for(const l of t.split('\n')){const m=l.match(re);if(!m)continue;const d=m[3].replace(/\{[^}]*\}/g,'').replace(/\\[Nn]/g,' ').trim();if(!d)continue;L.push({start:m[1],end:m[2],text:d})}return L}
const speakerRe=/^[\uFF08\u0028]([^\uFF09\u0029]+)[\uFF09\u0029]\s*(.*)/;
function splitSpeaker(text){const m=text.match(speakerRe);return m?{speaker:m[1].trim(),dialogue:m[2].trim()}:{speaker:'',dialogue:text}}

class AnimeReader{
  constructor(){
    this.user=null;this.vocabulary=[];this.vocabLookup={};this.savedAnimeWords={};
    this.currentView='browse'; // 'browse','episodes','reading','summary','import'
    this.animeList=[];this.episodeList=[];this.selectedAnime='';this.selectedEpisode=null;
    this.importMode='srt';this.srtFile=null;this.rawText='';
    this.dialogueLines=[];this.allTokens=[];this.wordPopup=null;
    this.sessions=[];this.loading=false;
    this.init();
  }

  async init(){
    const{data:{session}}=await sb.auth.getSession();
    if(session)this.user=session.user;
    sb.auth.onAuthStateChange((ev,session)=>{
      if(ev==='INITIAL_SESSION')return;
      this.user=session?.user||null;
      if(ev==='SIGNED_IN'){this.loadVocabulary();this.loadSavedAnimeWords();this.loadAnimeList()}
      this.render();
    });
    if(this.user)await Promise.all([this.loadVocabulary(),this.loadSavedAnimeWords(),this.loadAnimeList()]);
    this.render();
  }

  // === DATA ===
  async loadVocabulary(){
    try{let a=[],p=0;while(true){const{data,error}=await sb.from('japanese_vocabulary').select('id,kanji,hiragana,meaning_en,hint,level').range(p*1000,(p+1)*1000-1).order('id');if(error||!data?.length)break;a=a.concat(data);if(data.length<1000)break;p++}
    this.vocabulary=a;this.vocabLookup={};for(const v of a){if(v.kanji)this.vocabLookup[v.kanji]=v;if(v.hiragana&&!this.vocabLookup[v.hiragana])this.vocabLookup[v.hiragana]=v}
    console.log(`Vocab: ${a.length}`)}catch(e){console.error(e)}
  }
  async loadSavedAnimeWords(){
    if(!this.user)return;try{const{data}=await sb.from('japanese_anime_words').select('*').eq('user_id',this.user.id);this.savedAnimeWords={};for(const w of(data||[]))this.savedAnimeWords[w.base_form]=w}catch(e){console.error(e)}
  }
  async loadAnimeList(){
    try{const{data,error}=await sb.from('japanese_anime_subtitles').select('anime_name').limit(1);
    if(error){console.log('Subtitles table not ready yet');this.animeList=[];return}
    const{data:d2}=await sb.rpc('get_anime_list').catch(()=>({data:null}));
    if(d2){this.animeList=d2}else{
      // Fallback: get distinct anime names
      const{data:d3}=await sb.from('japanese_anime_subtitles').select('anime_name').limit(1000);
      this.animeList=[...new Set((d3||[]).map(r=>r.anime_name))];
    }}catch(e){console.error(e);this.animeList=[]}
  }
  async loadEpisodes(animeName){
    this.loading=true;this.render();
    try{const{data}=await sb.from('japanese_anime_subtitles').select('episode').eq('anime_name',animeName).order('episode');
    this.episodeList=[...new Set((data||[]).map(r=>r.episode))].sort((a,b)=>a-b);
    }catch(e){console.error(e);this.episodeList=[]}
    this.loading=false;this.render();
  }
  async loadEpisodeDialogue(animeName,episode){
    this.loading=true;this.render();
    try{const{data}=await sb.from('japanese_anime_subtitles').select('*').eq('anime_name',animeName).eq('episode',episode).order('line_number');
    if(!data?.length){alert('No dialogue found');this.loading=false;this.render();return}
    const rawLines=data.map(r=>({start:r.start_time,end:r.end_time,text:r.dialogue,speaker:r.speaker||''}));
    this.processDialogue(rawLines,true);
    this.selectedAnime=animeName;this.selectedEpisode=episode;
    this.currentView='reading'}catch(e){console.error(e)}
    this.loading=false;this.render();
  }

  // === TOKENIZATION ===
  tokenizeLine(text){
    return[...segmenter.segment(text)].map(seg=>{
      const s=seg.segment;
      if(!seg.isWordLike||isPunct(s))return{surface:s,type:'punct'};
      const v=this.vocabLookup[s],sv=this.savedAnimeWords[s];
      let type='unknown';if(v)type='known';else if(sv)type='saved';else if(!isJP(s))type='punct';
      return{surface:s,type,vocabEntry:v||null,savedEntry:sv||null};
    });
  }
  processDialogue(rawLines,hasSpeaker=false){
    let lastSpeaker='';
    this.dialogueLines=rawLines.map((line,i)=>{
      let speaker=line.speaker||'';
      let dialogue=line.text||'';
      if(!hasSpeaker){const sp=splitSpeaker(dialogue);speaker=sp.speaker;dialogue=sp.dialogue;if(speaker)lastSpeaker=speaker;else speaker=lastSpeaker}
      return{...line,index:i,speaker,dialogue,tokens:this.tokenizeLine(dialogue)};
    });
    const seen=new Set();this.allTokens=[];
    for(const l of this.dialogueLines)for(const t of l.tokens){if(t.type==='punct')continue;if(seen.has(t.surface))continue;seen.add(t.surface);this.allTokens.push(t)}
  }

  // === ACTIONS ===
  async startFromFile(){
    let rawLines;
    if(this.importMode==='srt'&&this.srtFile){const t=await this.srtFile.text();const ext=this.srtFile.name.toLowerCase();rawLines=(ext.endsWith('.ass')||ext.endsWith('.ssa'))?parseASS(t):parseSRT(t)}
    else if(this.importMode==='text'&&this.rawText.trim()){rawLines=this.rawText.trim().split('\n').filter(l=>l.trim()).map(l=>({start:'',end:'',text:l.trim()}))}
    else return;
    if(!rawLines.length){alert('No lines found');return}
    this.processDialogue(rawLines,false);
    this.selectedAnime='File Import';this.selectedEpisode=null;
    this.currentView='reading';this.render();
  }
  async saveWord(token){
    if(!this.user||!token)return;
    try{const{data,error}=await sb.from('japanese_anime_words').upsert({user_id:this.user.id,surface_form:token.surface,base_form:token.surface,reading:token.vocabEntry?.hiragana||'',pos:'',pos_detail:'',anime_source:this.selectedAnime||'Unknown',episode:this.selectedEpisode?String(this.selectedEpisode):null,created_at:new Date().toISOString()},{onConflict:'user_id,base_form'}).select();
    if(error){alert('Save failed');return}
    this.savedAnimeWords[token.surface]=data?.[0]||{};
    for(const l of this.dialogueLines)for(const t of l.tokens)if(t.surface===token.surface&&t.type==='unknown'){t.type='saved';t.savedEntry=this.savedAnimeWords[token.surface]}
    for(const t of this.allTokens)if(t.surface===token.surface){t.type='saved';t.savedEntry=this.savedAnimeWords[token.surface]}
    this.render();if(this.wordPopup?.surface===token.surface)this.showWordPopup(token)}catch(e){console.error(e)}
  }
  async removeWord(token){
    if(!this.user||!token)return;
    try{await sb.from('japanese_anime_words').delete().eq('user_id',this.user.id).eq('base_form',token.surface);
    delete this.savedAnimeWords[token.surface];
    for(const l of this.dialogueLines)for(const t of l.tokens)if(t.surface===token.surface&&t.type==='saved'){t.type='unknown';t.savedEntry=null}
    for(const t of this.allTokens)if(t.surface===token.surface){t.type='unknown';t.savedEntry=null}
    this.render();if(this.wordPopup?.surface===token.surface)this.showWordPopup(token)}catch(e){console.error(e)}
  }
  showWordPopup(t){if(!t||t.type==='punct')return;this.wordPopup=t;this.render()}
  closePopup(){this.wordPopup=null;this.render()}
  getStats(){const k=this.allTokens.filter(t=>t.type==='known').length,u=this.allTokens.filter(t=>t.type==='unknown').length,s=this.allTokens.filter(t=>t.type==='saved').length;return{known:k,unknown:u,saved:s,total:this.allTokens.length}}
  async signIn(){await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:location.origin+location.pathname}})}
  async signOut(){await sb.auth.signOut();this.user=null;this.render()}

  // === RENDER ===
  render(){
    const app=document.getElementById('app');if(!app)return;
    if(!this.user){app.innerHTML=this.renderLogin();this.bindAll();return}
    let body='';
    switch(this.currentView){
      case'episodes':body=this.renderEpisodes();break;
      case'reading':body=this.renderReading();break;
      case'summary':body=this.renderSummary();break;
      case'import':body=this.renderImport();break;
      default:body=this.renderBrowse();
    }
    app.innerHTML=`${this.renderHeader()}${body}${this.wordPopup?this.renderPopup():''}`;
    this.bindAll();
  }

  renderLogin(){
    return`<div class="login-screen"><div style="width:80px;height:80px;border-radius:22px;background:linear-gradient(135deg,var(--accent-cyan),var(--accent-purple));display:flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:20px;box-shadow:0 8px 40px rgba(0,212,255,.2)">\uD83D\uDCFA</div>
    <div style="font-family:'M PLUS Rounded 1c',sans-serif;font-size:20px;font-weight:700;margin-bottom:6px">\u30A2\u30CB\u30E1 Reading Mode</div>
    <div style="font-size:13px;color:var(--text-secondary);margin-bottom:28px">Import subtitles, learn vocabulary from anime</div>
    <button class="btn-google" id="loginBtn"><svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.997 8.997 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>Sign in with Google</button></div>`;
  }

  renderHeader(){
    const backBtn=this.currentView==='browse'?''
      :this.currentView==='episodes'?`<button class="btn-icon" id="navBackBtn" title="Back">\u2190</button>`
      :this.currentView==='reading'?`<button class="btn-icon" id="navBackBtn" title="Episodes">\u2190</button><button class="btn-icon" id="summaryBtn" title="Summary">\uD83D\uDCCA</button>`
      :this.currentView==='summary'?`<button class="btn-icon" id="backToReadingBtn" title="Reading">\u2190</button>`
      :`<button class="btn-icon" id="navBackBtn" title="Back">\u2190</button>`;
    return`<header class="app-header"><div class="app-title">\uD83D\uDCFA \u30A2\u30CB\u30E1 Reader</div>
      <div class="header-actions"><a href="index.html" class="btn-icon" title="Main app">\uD83C\uDFE0</a>${backBtn}<button class="btn-icon" id="signOutBtn">\u23CF</button></div></header>`;
  }

  // === BROWSE ===
  renderBrowse(){
    return`<div class="view">
      <div style="text-align:center;padding:32px 0 24px"><div style="font-size:48px;margin-bottom:12px">\uD83D\uDCFA</div>
        <h1 style="font-family:'M PLUS Rounded 1c',sans-serif;font-size:22px;margin-bottom:4px">Anime Dialogue Reader</h1>
        <p style="font-size:13px;color:var(--text-secondary)">Browse episodes or import subtitle files</p></div>
      ${this.animeList.length?`<div class="card"><h3 style="font-size:13px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px">Available Anime</h3>
        ${this.animeList.map(a=>`<button data-anime="${this.esc(a)}" class="btn-secondary" style="width:100%;margin-bottom:8px;text-align:left;padding:14px 16px;font-size:15px">\uD83C\uDFAC ${this.esc(a)}</button>`).join('')}</div>`
      :`<div class="card" style="text-align:center;color:var(--text-muted)"><p style="margin-bottom:8px">No anime imported to database yet.</p><p style="font-size:12px">Run the Python import script first, or use file import below.</p></div>`}
      <button class="btn-primary" id="goImportBtn" style="background:linear-gradient(135deg,var(--accent-purple),#8a5fd9)">\uD83D\uDCC1 Import from File</button></div>`;
  }

  // === EPISODES ===
  renderEpisodes(){
    if(this.loading)return`<div class="view" style="text-align:center;padding:60px 0"><div style="font-size:32px;margin-bottom:12px">\u23F3</div><p style="color:var(--text-muted)">Loading episodes...</p></div>`;
    return`<div class="view">
      <div class="card"><h2 style="font-size:18px;font-weight:700;margin-bottom:4px">\uD83C\uDFAC ${this.esc(this.selectedAnime)}</h2>
        <p style="font-size:12px;color:var(--text-muted)">${this.episodeList.length} episodes available</p></div>
      <div class="ep-grid">${this.episodeList.map(ep=>`<button data-ep="${ep}" class="ep-btn">${ep}</button>`).join('')}</div></div>`;
  }

  // === IMPORT ===
  renderImport(){
    const canStart=(this.importMode==='srt'&&this.srtFile)||(this.importMode==='text'&&this.rawText.trim());
    return`<div class="view">
      <h2 style="font-size:18px;font-weight:700;margin-bottom:16px">\uD83D\uDCC1 Import Subtitle File</h2>
      <div class="import-tabs"><button class="import-tab ${this.importMode==='srt'?'active':''}" data-import-mode="srt">Subtitle File</button><button class="import-tab ${this.importMode==='text'?'active':''}" data-import-mode="text">Paste Text</button></div>
      ${this.importMode==='srt'?`<div class="drop-zone" id="dropZone"><input type="file" id="fileInput" accept=".srt,.ass,.ssa,.vtt" hidden>
        <div style="font-size:36px;margin-bottom:10px">\uD83D\uDCC1</div><div style="font-size:14px;color:var(--text-secondary)">Drop subtitle file or tap to browse</div><div style="font-size:11px;color:var(--text-muted);margin-top:6px">.srt .ass .ssa supported</div>
        ${this.srtFile?`<div style="font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--accent-green);margin-top:8px">\u2713 ${this.esc(this.srtFile.name)}</div>`:''}</div>`
      :`<textarea class="text-import-area" id="textImportArea" placeholder="Paste Japanese dialogue...">${this.esc(this.rawText)}</textarea>`}
      <button class="btn-primary" id="startFileBtn" ${canStart?'':'disabled'}>\uD83C\uDFAC Start Reading</button></div>`;
  }

  // === READING ===
  renderReading(){
    const stats=this.getStats();
    // Assign colors per speaker
    const speakerColors=['#b07dff','#00d4ff','#ff3b8b','#00e88f','#ffb03a','#ff6b6b','#4ecdc4','#f093fb','#a8e6cf','#ffd93d'];
    const speakers=[...new Set(this.dialogueLines.map(l=>l.speaker).filter(Boolean))];
    const colorMap={};speakers.forEach((s,i)=>colorMap[s]=speakerColors[i%speakerColors.length]);

    return`<div class="reading-header"><div class="reading-meta">
        <div class="reading-anime-name">${this.esc(this.selectedAnime)}</div>
        <div class="reading-episode">${this.selectedEpisode?'Episode '+this.selectedEpisode:''} \u00B7 ${this.dialogueLines.length} lines</div></div>
      <div class="reading-stats"><span style="color:var(--word-known)">${stats.known}\u2713</span><span style="color:var(--word-saved)">${stats.saved}\u2605</span><span style="color:var(--word-unknown)">${stats.unknown}?</span></div></div>
    <div class="dialogue-container hide-sb">
      ${this.dialogueLines.map((line,i)=>{
        const sc=colorMap[line.speaker]||'var(--text-muted)';
        return`<div class="dialogue-line" style="animation-delay:${Math.min(i*20,300)}ms">
          ${line.start?`<div class="dl-timestamp">${line.start}${line.end?' \u2192 '+line.end:''}</div>`:''}
          ${line.speaker?`<div class="dl-speaker" style="background:${sc}18;color:${sc};border-color:${sc}40">${this.esc(line.speaker)}</div>`:''}
          <div class="dl-text">${line.tokens.map((t,j)=>t.type==='punct'?`<span class="word-token punct">${this.esc(t.surface)}</span>`:`<span class="word-token ${t.type}" data-line="${i}" data-token="${j}">${this.esc(t.surface)}</span>`).join('')}</div>
        </div>`;
      }).join('')}
      <div style="height:40px"></div></div>`;
  }

  // === POPUP ===
  renderPopup(){
    const t=this.wordPopup;if(!t)return'';
    const v=t.vocabEntry||this.vocabLookup[t.surface],sv=t.savedEntry||this.savedAnimeWords[t.surface];
    const isK=!!v,isS=!!sv;
    let ctx='';for(const l of this.dialogueLines){if(l.tokens.some(lt=>lt.surface===t.surface)){ctx=l.tokens.map(lt=>lt.surface===t.surface?`<em>${this.esc(lt.surface)}</em>`:this.esc(lt.surface)).join('');break}}
    return`<div class="word-popup-overlay" id="popupOverlay"><div class="word-popup"><div class="popup-handle"></div>
      <div class="popup-surface">${this.esc(t.surface)}</div>
      ${v?.hiragana?`<div class="popup-reading">${this.esc(v.hiragana)}</div>`:''}
      <div style="text-align:center;margin:12px 0">
        ${isK?`<span class="popup-tag known">\u2713 JLPT vocabulary</span>`:isS?`<span class="popup-tag saved">\u2605 Saved from ${this.esc(sv.anime_source||'anime')}</span>`:`<span class="popup-tag unknown">? New word</span>`}
      </div>
      ${v?`<div class="popup-meaning"><div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;margin-bottom:4px">Meaning</div>
        <div style="font-size:15px;line-height:1.5">${this.esc(v.meaning_en||'')}</div>
        ${v.hint?`<div style="font-size:12px;color:var(--accent-amber);margin-top:6px">\uD83D\uDCA1 ${this.esc(v.hint)}</div>`:''}
        ${v.level?`<div style="font-size:11px;color:var(--text-muted);margin-top:6px">JLPT ${v.level}</div>`:''}</div>`:''}
      ${ctx?`<div class="popup-context">${ctx}</div>`:''}
      ${!isK?(isS?`<button class="btn-save-word saved" disabled>\u2605 Already Saved</button><button class="btn-remove-word" id="removeWordBtn">Remove</button>`
        :`<button class="btn-save-word" id="saveWordBtn">\u2605 Save Word</button>`):''}</div></div>`;
  }

  // === SUMMARY ===
  renderSummary(){
    const s=this.getStats(),un=this.allTokens.filter(t=>t.type==='unknown'),kn=this.allTokens.filter(t=>t.type==='known');
    const pct=s.total>0?Math.round(((s.known+s.saved)/s.total)*100):0;
    return`<div class="view hide-sb" style="overflow:auto;max-height:calc(100vh - 50px)">
      <div class="card"><h3 style="font-size:13px;color:var(--text-muted);text-transform:uppercase;margin-bottom:12px">Session Summary</h3>
        <div style="text-align:center;margin-bottom:16px"><div style="font-size:48px;font-weight:700;font-family:'M PLUS Rounded 1c',sans-serif;background:linear-gradient(135deg,var(--accent-cyan),var(--accent-green));-webkit-background-clip:text;-webkit-text-fill-color:transparent">${pct}%</div>
        <div style="font-size:12px;color:var(--text-muted)">Comprehension</div></div>
        <div class="summary-grid"><div class="summary-stat"><b style="color:var(--word-known)">${s.known}</b><small>Known</small></div><div class="summary-stat"><b style="color:var(--word-saved)">${s.saved}</b><small>Saved</small></div><div class="summary-stat"><b style="color:var(--word-unknown)">${s.unknown}</b><small>Unknown</small></div></div></div>
      ${un.length?`<div class="card"><h3 style="font-size:13px;color:var(--text-muted);text-transform:uppercase;margin-bottom:12px">Unknown (${un.length})</h3>
        ${un.slice(0,40).map(t=>`<div class="word-list-item"><span style="font-size:18px;font-weight:600;color:var(--word-unknown)">${this.esc(t.surface)}</span>
          <button class="btn-secondary" data-save-base="${this.esc(t.surface)}" style="padding:6px 12px;font-size:11px">\u2605 Save</button></div>`).join('')}
        ${un.length>40?`<div style="text-align:center;padding:8px;color:var(--text-muted);font-size:12px">...and ${un.length-40} more</div>`:''}</div>`:''}
      ${kn.length?`<div class="card"><h3 style="font-size:13px;color:var(--text-muted);text-transform:uppercase;margin-bottom:12px">Known (${kn.length})</h3>
        ${kn.slice(0,20).map(t=>`<div class="word-list-item"><div><span style="font-size:16px;font-weight:600;color:var(--word-known)">${this.esc(t.surface)}</span>
          <span style="font-size:12px;color:var(--accent-cyan);margin-left:8px">${t.vocabEntry?.hiragana||''}</span></div>
          <span style="font-size:12px;color:var(--text-secondary)">${this.esc(t.vocabEntry?.meaning_en||'')}</span></div>`).join('')}</div>`:''}</div>`;
  }

  // === EVENTS ===
  bindAll(){
    document.getElementById('loginBtn')?.addEventListener('click',()=>this.signIn());
    document.getElementById('signOutBtn')?.addEventListener('click',()=>this.signOut());
    document.getElementById('navBackBtn')?.addEventListener('click',()=>{
      if(this.currentView==='episodes'){this.currentView='browse'}
      else if(this.currentView==='reading'){this.currentView=this.selectedEpisode?'episodes':'browse';this.dialogueLines=[];this.allTokens=[];this.wordPopup=null}
      else if(this.currentView==='import'){this.currentView='browse'}
      this.render();
    });
    document.getElementById('summaryBtn')?.addEventListener('click',()=>{this.currentView='summary';this.wordPopup=null;this.render()});
    document.getElementById('backToReadingBtn')?.addEventListener('click',()=>{this.currentView='reading';this.render()});
    document.getElementById('goImportBtn')?.addEventListener('click',()=>{this.currentView='import';this.render()});
    // Anime selection
    document.querySelectorAll('[data-anime]').forEach(b=>b.addEventListener('click',()=>{this.selectedAnime=b.dataset.anime;this.currentView='episodes';this.loadEpisodes(this.selectedAnime)}));
    // Episode selection
    document.querySelectorAll('[data-ep]').forEach(b=>b.addEventListener('click',()=>this.loadEpisodeDialogue(this.selectedAnime,parseInt(b.dataset.ep))));
    // Import
    document.querySelectorAll('[data-import-mode]').forEach(b=>b.addEventListener('click',()=>{this.importMode=b.dataset.importMode;this.render()}));
    const ta=document.getElementById('textImportArea');if(ta)ta.addEventListener('input',()=>this.rawText=ta.value);
    const dz=document.getElementById('dropZone'),fi=document.getElementById('fileInput');
    if(dz&&fi){dz.addEventListener('click',()=>fi.click());dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('dragover')});dz.addEventListener('dragleave',()=>dz.classList.remove('dragover'));dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('dragover');if(e.dataTransfer?.files?.[0]){this.srtFile=e.dataTransfer.files[0];this.render()}});fi.addEventListener('change',()=>{if(fi.files?.[0]){this.srtFile=fi.files[0];this.render()}})}
    document.getElementById('startFileBtn')?.addEventListener('click',()=>this.startFromFile());
    // Word tokens
    document.querySelectorAll('.word-token[data-line]').forEach(el=>el.addEventListener('click',()=>{const t=this.dialogueLines[+el.dataset.line]?.tokens[+el.dataset.token];if(t)this.showWordPopup(t)}));
    // Popup
    document.getElementById('popupOverlay')?.addEventListener('click',e=>{if(e.target.id==='popupOverlay')this.closePopup()});
    document.getElementById('saveWordBtn')?.addEventListener('click',()=>{if(this.wordPopup)this.saveWord(this.wordPopup)});
    document.getElementById('removeWordBtn')?.addEventListener('click',()=>{if(this.wordPopup)this.removeWord(this.wordPopup)});
    document.querySelectorAll('[data-save-base]').forEach(b=>b.addEventListener('click',()=>{const t=this.allTokens.find(x=>x.surface===b.dataset.saveBase);if(t)this.saveWord(t)}));
  }
  esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}
}
window.animeReader=new AnimeReader();
</script>
</body>
</html>
