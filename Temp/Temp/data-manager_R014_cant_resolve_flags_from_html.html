<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JLPT Data Manager</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0c0e14;
      --bg-card: #141620;
      --bg-input: #1a1d2e;
      --bg-hover: #1e2235;
      --border: #252840;
      --border-focus: #6366f1;
      --text-primary: #e2e4ed;
      --text-secondary: #8b8fa3;
      --text-muted: #5c5f73;
      --accent: #6366f1;
      --accent-hover: #7577f5;
      --emerald: #10b981;
      --amber: #f59e0b;
      --red: #ef4444;
      --rose: #f43f5e;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Noto Sans JP', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }
    
    .mono { font-family: 'JetBrains Mono', monospace; }
    
    /* Layout */
    .app-header {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .app-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .app-title .icon { font-size: 20px; }
    .app-title .sub { color: var(--text-muted); font-weight: 400; font-size: 12px; }
    
    .tab-bar {
      display: flex;
      gap: 4px;
    }
    
    .tab-btn {
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-secondary);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    
    .tab-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
    .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
    
    .main-content {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px;
    }
    
    /* Cards */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 16px;
    }
    
    .card-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .card-body { padding: 20px; }
    
    .card-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.3px;
      color: var(--text-secondary);
    }
    
    /* Buttons */
    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.15s;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-emerald { background: rgba(16,185,129,0.15); color: var(--emerald); border-color: rgba(16,185,129,0.3); }
    .btn-emerald:hover { background: rgba(16,185,129,0.25); }
    .btn-amber { background: rgba(245,158,11,0.15); color: var(--amber); border-color: rgba(245,158,11,0.3); }
    .btn-amber:hover { background: rgba(245,158,11,0.25); }
    .btn-red { background: rgba(239,68,68,0.15); color: var(--red); border-color: rgba(239,68,68,0.3); }
    .btn-red:hover { background: rgba(239,68,68,0.25); }
    .btn-ghost { background: transparent; color: var(--text-secondary); border-color: var(--border); }
    .btn-ghost:hover { background: var(--bg-hover); color: var(--text-primary); }
    .btn-sm { padding: 4px 10px; font-size: 11px; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    
    /* Inputs */
    input, textarea, select {
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      width: 100%;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--border-focus);
    }
    
    textarea { resize: vertical; }
    
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    /* Tags */
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 500;
      border: 1px solid;
    }
    
    .tag-grammar { background: rgba(245,158,11,0.1); color: var(--amber); border-color: rgba(245,158,11,0.2); }
    .tag-vocab { background: rgba(99,102,241,0.1); color: var(--accent); border-color: rgba(99,102,241,0.2); }
    .tag-default { background: rgba(139,143,163,0.1); color: var(--text-secondary); border-color: var(--border); }
    
    .tag .remove {
      cursor: pointer;
      opacity: 0.5;
      font-size: 13px;
      line-height: 1;
    }
    .tag .remove:hover { opacity: 1; }
    
    /* Badge */
    .badge {
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.3px;
      border: 1px solid;
    }
    
    .badge-unverified { background: rgba(245,158,11,0.1); color: var(--amber); border-color: rgba(245,158,11,0.2); }
    .badge-verified { background: rgba(16,185,129,0.1); color: var(--emerald); border-color: rgba(16,185,129,0.2); }
    .badge-rejected { background: rgba(239,68,68,0.1); color: var(--red); border-color: rgba(239,68,68,0.2); }
    
    /* Sentence item */
    .sent-item {
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 10px;
      transition: border-color 0.15s;
    }
    
    .sent-item:hover { border-color: rgba(99,102,241,0.3); }
    .sent-item.resolved { opacity: 0.5; border-color: rgba(16,185,129,0.2); }
    
    .sent-text { font-size: 15px; line-height: 1.7; margin-bottom: 6px; }
    .sent-text .hl { color: var(--accent); font-weight: 700; background: rgba(99,102,241,0.1); padding: 0 2px; border-radius: 3px; }
    .sent-meaning { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
    .sent-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-size: 11px; color: var(--text-muted); }
    
    /* Alert item */
    .alert-item {
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 10px;
      border-left: 3px solid var(--amber);
    }
    
    .alert-item.resolved { border-left-color: var(--emerald); opacity: 0.6; }
    
    .alert-kanji {
      font-size: 28px;
      font-weight: 700;
      margin-right: 16px;
    }
    
    /* Filters bar */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      align-items: center;
    }
    
    .filter-bar select, .filter-bar input {
      width: auto;
      min-width: 120px;
    }
    
    /* Stats row */
    .stats-row {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .stat-card {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      text-align: center;
    }
    
    .stat-num { font-size: 24px; font-weight: 700; }
    .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    
    /* Pagination */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px 0;
    }
    
    /* Word edit row */
    .edit-row {
      display: grid;
      grid-template-columns: 100px 150px 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    
    .edit-row:last-child { border-bottom: none; }
    
    /* Loading */
    .loading { text-align: center; padding: 40px; color: var(--text-muted); }
    
    /* Flex utilities */
    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .items-center { align-items: center; }
    .items-start { align-items: flex-start; }
    .justify-between { justify-content: space-between; }
    .gap-2 { gap: 8px; }
    .gap-3 { gap: 12px; }
    .gap-4 { gap: 16px; }
    .flex-1 { flex: 1; }
    .flex-wrap { flex-wrap: wrap; }
    .mt-2 { margin-top: 8px; }
    .mt-3 { margin-top: 12px; }
    .mb-2 { margin-bottom: 8px; }
    .mb-3 { margin-bottom: 12px; }
    .hidden { display: none !important; }
    
    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      z-index: 9999;
      animation: fadeInUp 0.25s ease-out;
    }
    
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .toast-success { background: rgba(16,185,129,0.15); color: var(--emerald); border: 1px solid rgba(16,185,129,0.3); }
    .toast-error { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    // ========== CONFIG ==========
    const SUPABASE_URL = 'https://ulgrfumbwjovbjzjiems.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVsZ3JmdW1id2pvdmJqemppZW1zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjczNzIyNjcsImV4cCI6MjA4Mjk0ODI2N30.ix5Vh4Y3GXNbQbzVtTD_WSko0L3cr5q_eCnTuDEMh7M';
    const ADMIN_USER_ID = 'd469efb7-f9e1-4b49-8b14-75a42b4d22e0';
    
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    // ========== STATE ==========
    const state = {
      user: null,
      authChecked: false,
      tab: 'sentences',    // sentences, bulk, story-flags, word-flags
      loading: true,
      
      // Data pools
      sentences: [],
      words: [],
      storyAlerts: [],
      wordAlerts: [],
      stories: [],
      storyGroups: [],
      
      // Sentence tab
      sentFilter: 'unverified',
      sentSource: 'all',
      sentSearch: '',
      sentPage: 0,
      
      // Bulk tab
      bulkInput: '',
      bulkSource: 'manual',
      bulkLevel: '',
      bulkParsed: null,
      bulkSaving: false,
      bulkMsg: '',
      
      // Flags
      flagFilter: 'open', // open, resolved, all
      flagPage: 0,
    };
    
    // ========== HELPERS ==========
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    
    function isKanji(c) {
      const code = c.codePointAt(0);
      return (code >= 0x4E00 && code <= 0x9FFF) || (code >= 0x3400 && code <= 0x4DBF);
    }
    
    function extractKanjiStem(word) {
      if (!word) return '';
      const chars = [...word];
      if (!chars.some(isKanji)) return word;
      let stem = '';
      for (const c of chars) { if (isKanji(c)) stem += c; else break; }
      return stem || word;
    }
    
    function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
    
    function tagClass(tag) {
      if (tag.startsWith('grammar')) return 'tag-grammar';
      if (tag.startsWith('vocab')) return 'tag-vocab';
      return 'tag-default';
    }
    
    function toast(msg, type = 'success') {
      const el = document.createElement('div');
      el.className = `toast toast-${type}`;
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }
    
    // Build stem lookup for word detection
    function buildStemMap() {
      const map = {};
      state.words.forEach(w => {
        const stem = extractKanjiStem(w.kanji);
        if (stem) { if (!map[stem]) map[stem] = []; map[stem].push(w); }
      });
      return map;
    }
    
    function detectWords(sentence, stemMap, sortedStems) {
      const found = [];
      const seen = new Set();
      for (const stem of sortedStems) {
        if (sentence.includes(stem)) {
          for (const w of stemMap[stem]) {
            if (!seen.has(w.id)) { seen.add(w.id); found.push(w); }
          }
        }
      }
      return found;
    }
    
    function highlightWords(sentence, detectedWords) {
      if (!detectedWords?.length) return escapeHtml(sentence);
      const stems = [...new Set(detectedWords.map(w => extractKanjiStem(w.kanji)).filter(Boolean))].sort((a,b) => b.length - a.length);
      if (!stems.length) return escapeHtml(sentence);
      const pattern = new RegExp(`(${stems.map(escapeRegex).join('|')})`, 'g');
      return sentence.split(pattern).map(part =>
        stems.includes(part) ? `<span class="hl">${escapeHtml(part)}</span>` : escapeHtml(part)
      ).join('');
    }
    
    // ========== DATA LOADING ==========
    async function loadPaginated(table, select = '*', orderCol = 'id') {
      let all = [], page = 0;
      while (true) {
        const { data, error } = await sb.from(table).select(select).order(orderCol).range(page * 1000, (page + 1) * 1000 - 1);
        if (error) { console.error(`Load ${table}:`, error); break; }
        if (!data?.length) break;
        all = all.concat(data);
        if (data.length < 1000) break;
        page++;
      }
      return all;
    }
    
    async function loadAll() {
      state.loading = true; render();
      const [sentences, words, storyAlerts, wordAlerts, stories, storyGroups] = await Promise.all([
        loadPaginated('japanese_unified_sentences'),
        loadPaginated('japanese_unified_words'),
        loadPaginated('japanese_story_alerts'),
        loadPaginated('japanese_word_alerts'),
        loadPaginated('japanese_kanji_stories'),
        loadPaginated('japanese_kanji_story_groups'),
      ]);
      state.sentences = sentences;
      state.words = words;
      state.storyAlerts = storyAlerts;
      state.wordAlerts = wordAlerts;
      state.stories = stories;
      state.storyGroups = storyGroups;
      state.loading = false;
      render();
    }
    
    // ========== DATA OPERATIONS ==========
    async function updateSentence(id, updates) {
      const { error } = await sb.from('japanese_unified_sentences').update(updates).eq('id', id);
      if (error) { toast('Update failed: ' + error.message, 'error'); return false; }
      const s = state.sentences.find(s => s.id === id);
      if (s) Object.assign(s, updates);
      return true;
    }
    
    async function updateWord(id, updates) {
      const { error } = await sb.from('japanese_unified_words').update(updates).eq('id', id);
      if (error) { toast('Update failed: ' + error.message, 'error'); return false; }
      const w = state.words.find(w => w.id === id);
      if (w) Object.assign(w, updates);
      return true;
    }
    
    async function updateStory(kanji, updates) {
      const { error } = await sb.from('japanese_kanji_stories').update(updates).eq('kanji', kanji);
      if (error) { toast('Story update failed: ' + error.message, 'error'); return false; }
      const s = state.stories.find(s => s.kanji === kanji);
      if (s) Object.assign(s, updates);
      return true;
    }
    
    async function resolveAlert(table, id) {
      const { error } = await sb.from(table).update({ resolved: true, resolved_at: new Date().toISOString() }).eq('id', id);
      if (error) { toast('Resolve failed: ' + error.message, 'error'); return false; }
      return true;
    }
    
    async function addTag(sentenceId, tag) {
      const s = state.sentences.find(s => s.id === sentenceId);
      if (!s) return;
      const tags = [...(s.tags || [])];
      if (tags.includes(tag)) return;
      tags.push(tag);
      if (await updateSentence(sentenceId, { tags })) { toast(`Tag "${tag}" added`); render(); }
    }
    
    async function removeTag(sentenceId, tag) {
      const s = state.sentences.find(s => s.id === sentenceId);
      if (!s) return;
      const tags = (s.tags || []).filter(t => t !== tag);
      if (await updateSentence(sentenceId, { tags })) { toast('Tag removed'); render(); }
    }
    
    async function verifySentence(id, status) {
      if (await updateSentence(id, { verified: status })) {
        toast(status === 'verified' ? '✓ Verified' : status === 'rejected' ? '✗ Rejected' : '↩ Unverified');
        render();
      }
    }
    
    // ========== BULK OPERATIONS ==========
    function parseBulk() {
      const text = document.getElementById('bulkInput')?.value?.trim();
      if (!text) { toast('Paste sentences first', 'error'); return; }
      state.bulkInput = text;
      state.bulkSource = document.getElementById('bulkSource')?.value || 'manual';
      state.bulkLevel = document.getElementById('bulkLevel')?.value || '';
      
      const stemMap = buildStemMap();
      const sortedStems = Object.keys(stemMap).sort((a,b) => b.length - a.length);
      const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
      
      state.bulkParsed = lines.map(line => ({
        sentence: line,
        detectedWords: detectWords(line, stemMap, sortedStems),
        linked: false,
      }));
      state.bulkMsg = '';
      render();
      toast(`Parsed ${lines.length} sentences`);
    }
    
    async function bulkSaveAll() {
      if (!state.bulkParsed?.length) return;
      state.bulkSaving = true; render();
      
      const source = state.bulkSource || 'manual';
      const level = state.bulkLevel || null;
      const rows = state.bulkParsed.map(p => ({
        sentence: p.sentence,
        source,
        jlpt_level: level,
        verified: 'unverified',
        difficulty: 1,
      }));
      
      const { data: inserted, error } = await sb.from('japanese_unified_sentences').insert(rows).select();
      if (error) { toast('Insert failed: ' + error.message, 'error'); state.bulkSaving = false; render(); return; }
      
      // Build links
      const links = [];
      inserted.forEach((s, i) => {
        const parsed = state.bulkParsed[i];
        if (!parsed) return;
        parsed.detectedWords.forEach(w => links.push({ word_id: w.id, sentence_id: s.id, rating: null }));
        parsed.linked = true;
        state.sentences.push(s);
      });
      
      let linkedCount = 0;
      if (links.length > 0) {
        const { data: linkData, error: linkErr } = await sb.from('japanese_unified_word_sentences').insert(links).select();
        if (!linkErr && linkData) linkedCount = linkData.length;
      }
      
      state.bulkSaving = false;
      state.bulkMsg = `✅ ${inserted.length} sentences saved, ${linkedCount} word links created`;
      render();
      toast(state.bulkMsg);
    }
    
    // ========== RENDER ENGINE ==========
    function render() {
      const app = document.getElementById('app');
      
      // Auth gate
      if (!state.authChecked) {
        app.innerHTML = `
          <div style="min-height:100vh; display:flex; align-items:center; justify-content:center;">
            <div style="text-align:center; color:var(--text-muted);">Checking authentication...</div>
          </div>`;
        return;
      }
      
      if (!state.user) {
        app.innerHTML = `
          <div style="min-height:100vh; display:flex; align-items:center; justify-content:center;">
            <div style="text-align:center; max-width:360px;">
              <div style="font-size:48px; margin-bottom:16px;">🔒</div>
              <h1 style="font-size:20px; font-weight:700; margin-bottom:8px; color:var(--text-primary);">JLPT Data Manager</h1>
              <p style="font-size:13px; color:var(--text-muted); margin-bottom:24px;">Admin access only. Sign in to continue.</p>
              <button id="adminLoginBtn" class="btn btn-primary" style="width:100%; padding:12px; font-size:14px;">
                Sign in with Google
              </button>
            </div>
          </div>`;
        document.getElementById('adminLoginBtn')?.addEventListener('click', async () => {
          await sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.href } });
        });
        return;
      }
      
      if (state.user.id !== ADMIN_USER_ID) {
        app.innerHTML = `
          <div style="min-height:100vh; display:flex; align-items:center; justify-content:center;">
            <div style="text-align:center; max-width:360px;">
              <div style="font-size:48px; margin-bottom:16px;">⛔</div>
              <h1 style="font-size:20px; font-weight:700; margin-bottom:8px; color:var(--red);">Access Denied</h1>
              <p style="font-size:13px; color:var(--text-muted); margin-bottom:8px;">This tool is restricted to the admin account.</p>
              <p style="font-size:11px; color:var(--text-muted); margin-bottom:24px;" class="mono">Signed in as: ${escapeHtml(state.user.email || state.user.id)}</p>
              <button id="adminSignOutBtn" class="btn btn-ghost" style="width:100%; padding:10px;">Sign Out</button>
            </div>
          </div>`;
        document.getElementById('adminSignOutBtn')?.addEventListener('click', async () => {
          await sb.auth.signOut();
          state.user = null;
          render();
        });
        return;
      }
      
      const openStoryFlags = state.storyAlerts.filter(a => !a.resolved).length;
      const openWordFlags = state.wordAlerts.filter(a => !a.resolved).length;
      const unverified = state.sentences.filter(s => (s.verified || 'unverified') === 'unverified').length;
      
      app.innerHTML = `
        <header class="app-header">
          <div class="app-title">
            <span class="icon">🛠️</span>
            <span>JLPT Data Manager</span>
            <span class="sub">${state.loading ? 'Loading...' : `${state.words.length} words · ${state.sentences.length} sentences`}</span>
          </div>
          <div class="tab-bar">
            <button class="tab-btn ${state.tab === 'sentences' ? 'active' : ''}" data-tab="sentences">
              💬 Sentences ${unverified > 0 ? `(${unverified})` : ''}
            </button>
            <button class="tab-btn ${state.tab === 'bulk' ? 'active' : ''}" data-tab="bulk">📝 Bulk Import</button>
            <button class="tab-btn ${state.tab === 'story-flags' ? 'active' : ''}" data-tab="story-flags">
              📖 Story Flags ${openStoryFlags > 0 ? `(${openStoryFlags})` : ''}
            </button>
            <button class="tab-btn ${state.tab === 'word-flags' ? 'active' : ''}" data-tab="word-flags">
              🚩 Word Flags ${openWordFlags > 0 ? `(${openWordFlags})` : ''}
            </button>
            <button class="tab-btn" id="adminSignOutBtn" style="margin-left:8px; color:var(--text-muted);">↩ Sign Out</button>
          </div>
        </header>
        
        <div class="main-content">
          ${state.loading ? '<div class="loading">Loading data...</div>' : renderTab()}
        </div>
      `;
      
      attachListeners();
    }
    
    function renderTab() {
      switch (state.tab) {
        case 'sentences': return renderSentencesTab();
        case 'bulk': return renderBulkTab();
        case 'story-flags': return renderStoryFlagsTab();
        case 'word-flags': return renderWordFlagsTab();
        default: return '';
      }
    }
    
    // ========== SENTENCES TAB ==========
    function renderSentencesTab() {
      const stats = { unverified: 0, verified: 0, rejected: 0 };
      state.sentences.forEach(s => { const v = s.verified || 'unverified'; if (stats[v] !== undefined) stats[v]++; });
      
      let filtered = state.sentences.filter(s => {
        const v = s.verified || 'unverified';
        if (state.sentFilter !== 'all' && v !== state.sentFilter) return false;
        if (state.sentSource !== 'all' && s.source !== state.sentSource) return false;
        if (state.sentSearch) {
          const q = state.sentSearch.toLowerCase();
          if (!(s.sentence || '').includes(state.sentSearch) && !(s.meaning_en || '').toLowerCase().includes(q) && !(s.tags || []).some(t => t.includes(q))) return false;
        }
        return true;
      }).sort((a, b) => (b.id || 0) - (a.id || 0));
      
      const sources = [...new Set(state.sentences.map(s => s.source).filter(Boolean))].sort();
      const page = state.sentPage;
      const pageSize = 25;
      const totalPages = Math.ceil(filtered.length / pageSize);
      const items = filtered.slice(page * pageSize, (page + 1) * pageSize);
      
      const stemMap = buildStemMap();
      const sortedStems = Object.keys(stemMap).sort((a,b) => b.length - a.length);
      
      return `
        <div class="stats-row">
          <div class="stat-card"><div class="stat-num" style="color:var(--amber)">${stats.unverified}</div><div class="stat-label">Unverified</div></div>
          <div class="stat-card"><div class="stat-num" style="color:var(--emerald)">${stats.verified}</div><div class="stat-label">Verified</div></div>
          <div class="stat-card"><div class="stat-num" style="color:var(--red)">${stats.rejected}</div><div class="stat-label">Rejected</div></div>
          <div class="stat-card"><div class="stat-num">${state.sentences.length}</div><div class="stat-label">Total</div></div>
        </div>
        
        <div class="filter-bar">
          ${['unverified', 'verified', 'rejected', 'all'].map(f => `
            <button class="btn btn-sm ${state.sentFilter === f ? 'btn-primary' : 'btn-ghost'}" data-sent-filter="${f}">
              ${f === 'all' ? 'All' : f.charAt(0).toUpperCase() + f.slice(1)}
            </button>
          `).join('')}
          <select id="sentSourceFilter" style="width: 140px;">
            <option value="all">All Sources</option>
            ${sources.map(s => `<option value="${escapeHtml(s)}" ${state.sentSource === s ? 'selected' : ''}>${escapeHtml(s)}</option>`).join('')}
          </select>
          <input type="text" id="sentSearch" placeholder="Search sentences, tags..." value="${escapeHtml(state.sentSearch)}" style="width: 200px;">
          <span style="color:var(--text-muted); font-size: 12px;">${filtered.length} results</span>
        </div>
        
        ${items.map(s => {
          const v = s.verified || 'unverified';
          const words = detectWords(s.sentence || '', stemMap, sortedStems);
          return `
            <div class="sent-item">
              <div class="sent-text">${highlightWords(s.sentence || '', words)}</div>
              ${s.meaning_en ? `<div class="sent-meaning">${escapeHtml(s.meaning_en)}</div>` : ''}
              
              <div class="sent-meta mb-2">
                <span>${escapeHtml(s.source || 'unknown')}</span>
                ${s.jlpt_level ? `<span>• ${s.jlpt_level}</span>` : ''}
                <span class="badge badge-${v}">${v}</span>
                <span class="mono" style="font-size:10px; color:var(--text-muted);">#${s.id}</span>
              </div>
              
              <!-- Tags -->
              <div class="flex gap-2 flex-wrap items-center mb-2">
                ${(s.tags || []).map(t => `
                  <span class="tag ${tagClass(t)}">${escapeHtml(t)} <span class="remove" data-rm-tag="${s.id}" data-rm-val="${escapeHtml(t)}">×</span></span>
                `).join('')}
                <span class="flex gap-2 items-center">
                  <input type="text" data-tag-in="${s.id}" placeholder="+ tag" style="width: 140px; padding: 4px 8px; font-size: 11px;">
                  <button class="btn btn-sm btn-ghost" data-add-tag="${s.id}">Add</button>
                </span>
              </div>
              
              <!-- Detected words -->
              ${words.length > 0 ? `
                <div class="flex gap-2 flex-wrap mb-2">
                  ${words.slice(0, 8).map(w => `<span style="font-size:11px; padding: 2px 6px; background:rgba(99,102,241,0.08); color:var(--accent); border-radius:4px;">${escapeHtml(w.kanji)}</span>`).join('')}
                  ${words.length > 8 ? `<span style="font-size:11px; color:var(--text-muted);">+${words.length-8}</span>` : ''}
                </div>
              ` : ''}
              
              <!-- Actions -->
              <div class="flex gap-2">
                ${v === 'unverified' ? `
                  <button class="btn btn-sm btn-emerald" data-verify="${s.id}">✓ Verify</button>
                  <button class="btn btn-sm btn-red" data-reject="${s.id}">✗ Reject</button>
                ` : v === 'verified' ? `
                  <button class="btn btn-sm btn-ghost" data-unverify="${s.id}">↩ Unverify</button>
                  <button class="btn btn-sm btn-red" data-reject="${s.id}">✗ Reject</button>
                ` : `
                  <button class="btn btn-sm btn-emerald" data-verify="${s.id}">✓ Restore</button>
                `}
              </div>
            </div>
          `;
        }).join('')}
        
        ${totalPages > 1 ? `
          <div class="pagination">
            <button class="btn btn-sm btn-ghost" id="sentPrev" ${page === 0 ? 'disabled' : ''}>← Prev</button>
            <span style="font-size:12px; color:var(--text-muted);">${page + 1} / ${totalPages}</span>
            <button class="btn btn-sm btn-ghost" id="sentNext" ${page >= totalPages - 1 ? 'disabled' : ''}>Next →</button>
          </div>
        ` : ''}
      `;
    }

        ${totalPages > 1 ? `

    // ========== EVENT LISTENERS ==========
    function attachListeners() {
      // Tabs
      document.querySelectorAll('[data-tab]').forEach(btn => {
        btn.addEventListener('click', () => { state.tab = btn.dataset.tab; state.flagPage = 0; state.flagFilter = 'open'; render(); });
      });
      
      // Admin sign out
      document.getElementById('adminSignOutBtn')?.addEventListener('click', async () => {
        await sb.auth.signOut();
        state.user = null;
        render();
      });
      
      // Sentence filters
      document.querySelectorAll('[data-sent-filter]').forEach(btn => {
        btn.addEventListener('click', () => { state.sentFilter = btn.dataset.sentFilter; state.sentPage = 0; render(); });
      });
      document.getElementById('sentSourceFilter')?.addEventListener('change', e => { state.sentSource = e.target.value; state.sentPage = 0; render(); });
      
      let searchTimer;
      document.getElementById('sentSearch')?.addEventListener('input', e => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => { state.sentSearch = e.target.value; state.sentPage = 0; render(); }, 300);
      });
      
      // Sentence pagination
      document.getElementById('sentPrev')?.addEventListener('click', () => { state.sentPage--; render(); });
      document.getElementById('sentNext')?.addEventListener('click', () => { state.sentPage++; render(); });
      
      // Verify / reject
      document.querySelectorAll('[data-verify]').forEach(btn => btn.addEventListener('click', () => verifySentence(parseInt(btn.dataset.verify), 'verified')));
      document.querySelectorAll('[data-reject]').forEach(btn => btn.addEventListener('click', () => verifySentence(parseInt(btn.dataset.reject), 'rejected')));
      document.querySelectorAll('[data-unverify]').forEach(btn => btn.addEventListener('click', () => verifySentence(parseInt(btn.dataset.unverify), 'unverified')));
      
      // Tags
      document.querySelectorAll('[data-add-tag]').forEach(btn => {
        btn.addEventListener('click', () => {
          const input = document.querySelector(`[data-tag-in="${btn.dataset.addTag}"]`);
          if (input?.value?.trim()) addTag(parseInt(btn.dataset.addTag), input.value.trim());
        });
      });
      document.querySelectorAll('[data-rm-tag]').forEach(btn => {
        btn.addEventListener('click', () => removeTag(parseInt(btn.dataset.rmTag), btn.dataset.rmVal));
      });
      
      // Bulk
      document.getElementById('parseBulkBtn')?.addEventListener('click', parseBulk);
      document.getElementById('bulkSaveBtn')?.addEventListener('click', bulkSaveAll);
      
      // Flag filters
      document.querySelectorAll('[data-flag-filter]').forEach(btn => {
        btn.addEventListener('click', () => { state.flagFilter = btn.dataset.flagFilter; state.flagPage = 0; render(); });
      });
      document.getElementById('flagPrev')?.addEventListener('click', () => { state.flagPage--; render(); });
      document.getElementById('flagNext')?.addEventListener('click', () => { state.flagPage++; render(); });
      
      // Save story edits
      document.querySelectorAll('[data-save-story]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const kanji = btn.dataset.saveStory;
          const alertId = parseInt(btn.dataset.alertId);
          const meaning = document.querySelector(`[data-story-edit-meaning="${kanji}"]`)?.value || '';
          const story = document.querySelector(`[data-story-edit-story="${kanji}"]`)?.value || '';
          
          const ok = await updateStory(kanji, { meaning, story });
          if (ok && alertId) {
            await resolveAlert('japanese_story_alerts', alertId);
            const a = state.storyAlerts.find(a => a.id === alertId);
            if (a) a.resolved = true;
          }
          if (ok) { toast('Story updated & resolved!'); render(); }
        });
      });
      
      // Resolve story without edit
      document.querySelectorAll('[data-resolve-story]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = parseInt(btn.dataset.resolveStory);
          const ok = await resolveAlert('japanese_story_alerts', id);
          if (ok) { const a = state.storyAlerts.find(a => a.id === id); if (a) a.resolved = true; toast('Resolved'); render(); }
        });
      });
      
      // Save word edits
      document.querySelectorAll('[data-save-word]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const wordId = parseInt(btn.dataset.saveWord);
          const alertId = parseInt(btn.dataset.alertId);
          const alertTable = btn.dataset.alertTable;
          
          const hiragana = document.querySelector(`[data-word-edit-hiragana="${wordId}"]`)?.value || '';
          const meaning_en = document.querySelector(`[data-word-edit-meaning="${wordId}"]`)?.value || '';
          const word_type = document.querySelector(`[data-word-edit-type="${wordId}"]`)?.value || '';
          const hint = document.querySelector(`[data-word-edit-hint="${wordId}"]`)?.value || '';
          
          const ok = await updateWord(wordId, { hiragana, meaning_en, word_type, hint });
          if (ok && alertId && alertTable) {
            await resolveAlert(alertTable, alertId);
            const a = state.wordAlerts.find(a => a.id === alertId);
            if (a) a.resolved = true;
          }
          if (ok) { toast('Word updated & resolved!'); render(); }
        });
      });
      
      // Resolve word without edit
      document.querySelectorAll('[data-resolve-word]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = parseInt(btn.dataset.resolveWord);
          const ok = await resolveAlert('japanese_word_alerts', id);
          if (ok) { const a = state.wordAlerts.find(a => a.id === id); if (a) a.resolved = true; toast('Resolved'); render(); }
        });
      });
    }
    
    // ========== INIT ==========
    async function init() {
      render(); // show "checking auth..."
      
      // Check existing session
      const { data: { session } } = await sb.auth.getSession();
      if (session) {
        state.user = session.user;
      }
      state.authChecked = true;
      
      // Listen for auth changes (handles OAuth redirect)
      sb.auth.onAuthStateChange((event, session) => {
        if (event === 'INITIAL_SESSION') return;
        state.user = session?.user || null;
        state.authChecked = true;
        if (state.user?.id === ADMIN_USER_ID && state.words.length === 0) {
          loadAll();
        }
        render();
      });
      
      // If already admin, load data
      if (state.user?.id === ADMIN_USER_ID) {
        await loadAll();
      }
      
      render();
    }
    
    init();
  </script>
</body>
</html>
