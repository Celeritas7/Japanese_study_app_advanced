    // ========== GROUP AUDIT TAB ==========
    function renderGroupAuditTab() {
      // Build tree: for each group, find members and check if any member
      // is itself a group parent (meaning its children might be mis-assigned)
      const groupKanjiSet = new Set(state.storyGroups.map(g => g.group_kanji));
      
      // Build member map: group_kanji → [story records]
      const memberMap = {};
      state.stories.forEach(s => {
        if (!s.group_kanji) return;
        if (!memberMap[s.group_kanji]) memberMap[s.group_kanji] = [];
        memberMap[s.group_kanji].push(s);
      });
      
      // Find groups where a member is itself a group parent (sub-group exists)
      const auditIssues = [];
      state.storyGroups.forEach(group => {
        const members = memberMap[group.group_kanji] || [];
        members.forEach(m => {
          // Is this member also a group parent?
          if (groupKanjiSet.has(m.kanji)) {
            // Check if there are kanji assigned to the PARENT group that should be under this member's group
            const childGroup = state.storyGroups.find(g => g.group_kanji === m.kanji);
            const childMembers = memberMap[m.kanji] || [];
            // Find members of the parent group that contain this sub-group kanji as a component
            // (heuristic: any member assigned to parent group that could be a child of the sub-group)
            const suspicious = members.filter(other => 
              other.kanji !== m.kanji && 
              other.kanji !== group.group_kanji &&
              !groupKanjiSet.has(other.kanji) // not itself a group
            );
            if (suspicious.length > 0 || childMembers.length > 0) {
              auditIssues.push({
                parentGroup: group,
                subGroupKanji: m.kanji,
                subGroup: childGroup,
                subGroupMembers: childMembers,
                parentMembers: members,
                suspicious,
              });
            }
          }
        });
      });
      
      // Also find stories with no group assigned
      const noGroup = state.stories.filter(s => !s.group_kanji);
      
      // Paginate audit issues
      const page = state.auditPage || 0;
      const pageSize = 10;
      const totalPages = Math.ceil(auditIssues.length / pageSize);
      const pageItems = auditIssues.slice(page * pageSize, (page + 1) * pageSize);
      
      return `
        <div style="margin-bottom:16px;">
          <h2 style="font-size:16px; font-weight:700; margin-bottom:4px;">🌳 Story Group Audit</h2>
          <p style="font-size:12px; color:var(--text-muted); margin-bottom:8px;">Find kanji that might be assigned to the wrong group level in the component tree.</p>
          ${renderExportImportBar('auditExportBtn', 'auditImportBtn', 'auditPromptBtn')}
        </div>
        
        <div class="stats-row" style="margin-bottom:16px;">
          <div class="stat-card"><div class="stat-num" style="color:var(--amber)">${auditIssues.length}</div><div class="stat-label">Groups with Sub-groups</div></div>
          <div class="stat-card"><div class="stat-num">${state.storyGroups.length}</div><div class="stat-label">Total Story Groups</div></div>
          <div class="stat-card"><div class="stat-num">${state.stories.length}</div><div class="stat-label">Total Stories</div></div>
          <div class="stat-card"><div class="stat-num" style="color:${noGroup.length > 0 ? 'var(--red)' : 'var(--emerald)'}">${noGroup.length}</div><div class="stat-label">No Group Assigned</div></div>
        </div>
        
        ${noGroup.length > 0 ? `
          <div class="card" style="margin-bottom:16px;">
            <div class="card-header" style="padding:10px 16px;">
              <span style="font-size:12px; font-weight:700;">⚠ Kanji Without Group (${noGroup.length})</span>
            </div>
            <div style="padding:8px 16px; display:flex; flex-wrap:wrap; gap:6px;">
              ${noGroup.slice(0, 40).map(s => `
                <span style="font-size:16px; padding:4px 8px; background:var(--bg-input); border:1px solid var(--border); border-radius:6px; cursor:default;" title="${escapeHtml(s.meaning || '')}">${escapeHtml(s.kanji)}</span>
              `).join('')}
              ${noGroup.length > 40 ? `<span style="font-size:11px; color:var(--text-muted); align-self:center;">+${noGroup.length - 40} more</span>` : ''}
            </div>
          </div>
        ` : ''}
        
        <div style="font-size:13px; font-weight:700; color:var(--text-primary); margin-bottom:12px;">Tree Structure Issues (${auditIssues.length})</div>
        
        ${pageItems.length === 0 ? `
          <div style="text-align:center; padding:30px; color:var(--text-muted);">No tree issues found — all groups look flat.</div>
        ` : `
          <div style="display:flex; flex-direction:column; gap:12px;">
            ${pageItems.map(issue => `
              <div class="card" style="padding:14px 16px;">
                <!-- Parent group -->
                <div style="display:flex; align-items:center; gap:8px; margin-bottom:10px;">
                  <span style="font-size:24px; font-weight:700; color:var(--text-primary);">${escapeHtml(issue.parentGroup.group_kanji)}</span>
                  <span style="font-size:13px; color:#fcd34d;">${escapeHtml(issue.parentGroup.group_meaning || '')}</span>
                  <span style="font-size:10px; color:var(--text-muted);">← parent group</span>
                </div>
                
                <!-- Tree visualization -->
                <div style="padding-left:16px; border-left:2px solid var(--border);">
                  <!-- Sub-group kanji -->
                  <div style="margin-bottom:8px;">
                    <div style="display:flex; align-items:center; gap:6px; padding:6px 10px; background:rgba(168,85,247,0.1); border:1px solid rgba(168,85,247,0.2); border-radius:6px;">
                      <span style="font-size:18px; font-weight:700; color:#d8b4fe;">${escapeHtml(issue.subGroupKanji)}</span>
                      <span style="font-size:11px; color:#c084fc;">← is also a group parent</span>
                      ${issue.subGroup ? `<span style="font-size:10px; color:var(--text-muted);">(${escapeHtml(issue.subGroup.group_meaning || '')})</span>` : ''}
                    </div>
                    
                    <!-- Sub-group's own members -->
                    ${issue.subGroupMembers.length > 0 ? `
                      <div style="padding-left:16px; border-left:2px solid rgba(168,85,247,0.2); margin-top:4px;">
                        <div style="font-size:9px; color:var(--text-muted); margin-bottom:4px;">ASSIGNED TO ${escapeHtml(issue.subGroupKanji)} GROUP:</div>
                        ${issue.subGroupMembers.map(m => `
                          <div style="display:flex; align-items:center; gap:6px; padding:2px 0;">
                            <span style="font-size:14px; font-weight:600; color:var(--emerald);">${escapeHtml(m.kanji)}</span>
                            <span style="font-size:10px; color:var(--text-secondary);">${escapeHtml(m.meaning || '')}</span>
                            <span style="font-size:9px; color:var(--emerald);">✓ correct level</span>
                          </div>
                        `).join('')}
                      </div>
                    ` : ''}
                  </div>
                  
                  <!-- Other members in parent (potentially mis-assigned) -->
                  ${issue.suspicious.length > 0 ? `
                    <div style="font-size:9px; color:var(--amber); margin-bottom:4px; margin-top:8px;">⚠ ALSO IN PARENT GROUP — CHECK IF THESE BELONG UNDER ${escapeHtml(issue.subGroupKanji)} INSTEAD:</div>
                    ${issue.suspicious.map(m => `
                      <div style="display:flex; align-items:center; gap:6px; padding:4px 8px; margin-bottom:3px; background:rgba(245,158,11,0.06); border:1px solid rgba(245,158,11,0.15); border-radius:6px;">
                        <span style="font-size:16px; font-weight:700; color:var(--text-primary);">${escapeHtml(m.kanji)}</span>
                        <span style="font-size:11px; color:var(--text-secondary); flex:1;">${escapeHtml(m.meaning || '')}</span>
                        <span style="font-size:10px; color:var(--text-muted);">group: ${escapeHtml(m.group_kanji || '?')}</span>
                        <button class="btn btn-sm btn-ghost" data-audit-reassign="${escapeHtml(m.kanji)}" data-audit-to="${escapeHtml(issue.subGroupKanji)}" style="font-size:10px; padding:2px 8px; color:var(--accent);">→ Move to ${escapeHtml(issue.subGroupKanji)}</button>
                      </div>
                    `).join('')}
                  ` : ''}
                </div>
              </div>
            `).join('')}
          </div>
          
          ${totalPages > 1 ? `
            <div class="pagination" style="margin-top:12px;">
              <button class="btn btn-sm btn-ghost" id="auditPrev" ${page === 0 ? 'disabled' : ''}>← Prev</button>
              <span style="font-size:12px; color:var(--text-muted);">${page + 1} / ${totalPages}</span>
              <button class="btn btn-sm btn-ghost" id="auditNext" ${page >= totalPages - 1 ? 'disabled' : ''}>Next →</button>
            </div>
          ` : ''}
        `}
      `;
    }
    
    // ========== DUPLICATE DETECTION TAB ==========
    function renderDupesTab() {
      // Find words with duplicate kanji
      const kanjiCount = {};
      state.words.forEach(w => {
        if (!w.kanji) return;
        if (!kanjiCount[w.kanji]) kanjiCount[w.kanji] = [];
        kanjiCount[w.kanji].push(w);
      });
      
      const dupes = Object.entries(kanjiCount)
        .filter(([k, arr]) => arr.length > 1)
        .sort((a, b) => b[1].length - a[1].length);
      
      const page = state.dupePage || 0;
      const pageSize = 15;
      const totalPages = Math.ceil(dupes.length / pageSize);
      const pageItems = dupes.slice(page * pageSize, (page + 1) * pageSize);
      
      return `
        <div style="margin-bottom:16px;">
          <h2 style="font-size:16px; font-weight:700; margin-bottom:4px;">🔍 Duplicate Detection</h2>
          <p style="font-size:12px; color:var(--text-muted);">Words with the same kanji appearing multiple times in the database.</p>
        </div>
        
        <div class="stats-row" style="margin-bottom:16px;">
          <div class="stat-card"><div class="stat-num" style="color:${dupes.length > 0 ? 'var(--amber)' : 'var(--emerald)'}">${dupes.length}</div><div class="stat-label">Duplicate Kanji</div></div>
          <div class="stat-card"><div class="stat-num">${dupes.reduce((a, [, arr]) => a + arr.length, 0)}</div><div class="stat-label">Total Duplicate Rows</div></div>
        </div>
        
        ${dupes.length === 0 ? `
          <div style="text-align:center; padding:40px; color:var(--text-muted);">
            <div style="font-size:32px; margin-bottom:8px;">✅</div>
            <div>No duplicate words found!</div>
          </div>
        ` : `
          <div style="display:flex; flex-direction:column; gap:10px;">
            ${pageItems.map(([kanji, words]) => {
              // Find which word has most links (sentences, books)
              return `
                <div class="card" style="padding:14px 16px;">
                  <div style="font-size:20px; font-weight:700; color:var(--text-primary); margin-bottom:8px;">${escapeHtml(kanji)} <span style="font-size:12px; font-weight:400; color:var(--amber);">(${words.length} copies)</span></div>
                  <div style="display:flex; flex-direction:column; gap:6px;">
                    ${words.map(w => {
                      const bookLinks = (state.wordBooks || []).filter(wb => wb.word_id === w.id).length;
                      const sentLinks = (state.wordSentenceLinks || []).filter(l => l.word_id === w.id).length;
                      const groupLinks = (state.wordGroupMembers || []).filter(m => m.word_id === w.id).length;
                      const totalLinks = bookLinks + sentLinks + groupLinks;
                      return `
                        <div style="display:flex; align-items:center; justify-content:space-between; padding:6px 10px; background:var(--bg-input); border-radius:6px; border:1px solid var(--border);">
                          <div style="display:flex; align-items:center; gap:8px; flex:1;">
                            <span class="mono" style="font-size:10px; color:var(--text-muted);">ID:${w.id}</span>
                            <span style="font-size:12px; color:#60a5fa;">${escapeHtml(w.hiragana || '—')}</span>
                            <span style="font-size:11px; color:var(--emerald);">${escapeHtml(w.meaning_en || '—')}</span>
                            <span style="font-size:10px; color:var(--text-muted);">${w.source || 'textbook'}</span>
                          </div>
                          <div style="display:flex; align-items:center; gap:6px;">
                            <span style="font-size:10px; color:var(--text-muted);" title="Books / Sentences / Groups">${bookLinks}B ${sentLinks}S ${groupLinks}G</span>
                            ${totalLinks === 0 ? `<button class="btn btn-sm btn-ghost" data-delete-word="${w.id}" style="color:var(--red); font-size:10px;">🗑 Delete</button>` : `<span style="font-size:9px; color:var(--text-muted);">has links</span>`}
                          </div>
                        </div>
                      `;
                    }).join('')}
                  </div>
                </div>
              `;
            }).join('')}
          </div>
          
          ${totalPages > 1 ? `
            <div class="pagination" style="margin-top:12px;">
              <button class="btn btn-sm btn-ghost" id="dupePrev" ${page === 0 ? 'disabled' : ''}>← Prev</button>
              <span style="font-size:12px; color:var(--text-muted);">${page + 1} / ${totalPages}</span>
              <button class="btn btn-sm btn-ghost" id="dupeNext" ${page >= totalPages - 1 ? 'disabled' : ''}>Next →</button>
            </div>
          ` : ''}
        `}
        
        <!-- ===== SENTENCE DUPLICATES ===== -->
        ${(() => {
          const sentMap = {};
          state.sentences.forEach(s => {
            if (!s.sentence) return;
            const norm = s.sentence.replace(/\s+/g, '').trim();
            if (!sentMap[norm]) sentMap[norm] = [];
            sentMap[norm].push(s);
          });
          const sentDupes = Object.entries(sentMap).filter(([, arr]) => arr.length > 1).sort((a, b) => b[1].length - a[1].length);
          
          return `
            <div style="margin-top:24px; margin-bottom:16px;">
              <h2 style="font-size:16px; font-weight:700; margin-bottom:4px;">💬 Duplicate Sentences</h2>
              <p style="font-size:12px; color:var(--text-muted);">Same sentence text appearing multiple times.</p>
            </div>
            
            <div class="stats-row" style="margin-bottom:16px;">
              <div class="stat-card"><div class="stat-num" style="color:${sentDupes.length > 0 ? 'var(--amber)' : 'var(--emerald)'}">${sentDupes.length}</div><div class="stat-label">Duplicate Sentences</div></div>
              <div class="stat-card"><div class="stat-num">${sentDupes.reduce((a, [, arr]) => a + arr.length, 0)}</div><div class="stat-label">Total Duplicate Rows</div></div>
            </div>
            
            ${sentDupes.length === 0 ? `<div style="text-align:center; padding:20px; color:var(--text-muted);">No duplicate sentences found!</div>` : `
              <div style="display:flex; flex-direction:column; gap:10px;">
                ${sentDupes.slice(0, 20).map(([, sents]) => {
                  return '<div class="card" style="padding:12px 16px;">' +
                    '<div style="font-size:14px; color:var(--text-primary); margin-bottom:8px; line-height:1.6;">' + escapeHtml(sents[0].sentence) + '</div>' +
                    '<div style="display:flex; flex-direction:column; gap:4px;">' +
                    sents.map(s => {
                      const links = (state.wordSentenceLinks || []).filter(l => l.sentence_id === s.id).length;
                      return '<div style="display:flex; align-items:center; justify-content:space-between; padding:4px 8px; background:var(--bg-input); border-radius:6px; border:1px solid var(--border);">' +
                        '<div style="display:flex; align-items:center; gap:8px;">' +
                          '<span class="mono" style="font-size:10px; color:var(--text-muted);">ID:' + s.id + '</span>' +
                          '<span style="font-size:10px; color:var(--accent);">' + escapeHtml(s.source || '') + '</span>' +
                          '<span style="font-size:10px; color:var(--text-muted);">' + (s.verified || 'unverified') + '</span>' +
                          '<span style="font-size:10px; color:var(--text-muted);">' + links + ' word links</span>' +
                        '</div>' +
                        (links === 0 ? '<button class="btn btn-sm btn-ghost" data-delete-sentence="' + s.id + '" style="color:var(--red); font-size:10px;">\uD83D\uDDD1 Delete</button>' : '<span style="font-size:9px; color:var(--text-muted);">has links</span>') +
                      '</div>';
                    }).join('') +
                    '</div></div>';
                }).join('')}
                ${sentDupes.length > 20 ? '<div style="font-size:11px; color:var(--text-muted); text-align:center; padding:8px;">Showing first 20 of ' + sentDupes.length + ' duplicate groups</div>' : ''}
              </div>
            `}
          `;
        })()}
      `;
    }
    
    // ========== ORPHANED DATA CLEANUP TAB ==========
    function renderOrphansTab() {
      const wordIds = new Set(state.words.map(w => w.id));
      const sentIds = new Set(state.sentences.map(s => s.id));
      const groupIds = new Set((state.wordGroups || []).map(g => g.id));
      
      // Check for orphans
      const orphanedBookLinks = (state.wordBooks || []).filter(wb => !wordIds.has(wb.word_id));
      const orphanedSentLinks = (state.wordSentenceLinks || []).filter(l => !wordIds.has(l.word_id) || !sentIds.has(l.sentence_id));
      const orphanedGroupMembers = (state.wordGroupMembers || []).filter(m => !wordIds.has(m.word_id) || !groupIds.has(m.group_id));
      
      const totalOrphans = orphanedBookLinks.length + orphanedSentLinks.length + orphanedGroupMembers.length;
      
      return `
        <div style="margin-bottom:16px;">
          <h2 style="font-size:16px; font-weight:700; margin-bottom:4px;">🧹 Orphaned Data Cleanup</h2>
          <p style="font-size:12px; color:var(--text-muted);">Find broken links: word-book links pointing to deleted words, sentence links with missing data, group members referencing non-existent IDs.</p>
        </div>
        
        <div class="stats-row" style="margin-bottom:20px;">
          <div class="stat-card">
            <div class="stat-num" style="color:${orphanedBookLinks.length > 0 ? 'var(--amber)' : 'var(--emerald)'}">${orphanedBookLinks.length}</div>
            <div class="stat-label">Orphaned Book Links</div>
            <div style="font-size:10px; color:var(--text-muted); margin-top:2px;">word_books → deleted words</div>
          </div>
          <div class="stat-card">
            <div class="stat-num" style="color:${orphanedSentLinks.length > 0 ? 'var(--amber)' : 'var(--emerald)'}">${orphanedSentLinks.length}</div>
            <div class="stat-label">Orphaned Sentence Links</div>
            <div style="font-size:10px; color:var(--text-muted); margin-top:2px;">word_sentences → missing data</div>
          </div>
          <div class="stat-card">
            <div class="stat-num" style="color:${orphanedGroupMembers.length > 0 ? 'var(--amber)' : 'var(--emerald)'}">${orphanedGroupMembers.length}</div>
            <div class="stat-label">Orphaned Group Members</div>
            <div style="font-size:10px; color:var(--text-muted); margin-top:2px;">group_members → missing IDs</div>
          </div>
        </div>
        
        ${totalOrphans === 0 ? `
          <div style="text-align:center; padding:40px; color:var(--text-muted);">
            <div style="font-size:48px; margin-bottom:12px;">✨</div>
            <div style="font-size:16px; font-weight:600;">Database is clean!</div>
            <div style="font-size:12px; margin-top:4px;">No orphaned records found.</div>
          </div>
        ` : `
          <!-- Orphaned Book Links -->
          ${orphanedBookLinks.length > 0 ? `
            <div class="card" style="margin-bottom:16px;">
              <div class="card-header" style="padding:12px 16px;">
                <span style="font-size:13px; font-weight:700;">📚 Orphaned Book Links (${orphanedBookLinks.length})</span>
                <button class="btn btn-sm btn-ghost" data-clean-orphan="book" style="color:var(--red);">🗑 Clean All</button>
              </div>
              <div style="padding:8px 16px; max-height:200px; overflow-y:auto;">
                ${orphanedBookLinks.slice(0, 20).map(wb => `
                  <div style="font-size:11px; padding:4px 0; border-bottom:1px solid var(--border); color:var(--text-secondary);">
                    Link ID:${wb.id} → word_id:${wb.word_id} (missing) · book:${escapeHtml(wb.book_code || '')}
                  </div>
                `).join('')}
                ${orphanedBookLinks.length > 20 ? `<div style="font-size:11px; color:var(--text-muted); padding:4px 0;">... and ${orphanedBookLinks.length - 20} more</div>` : ''}
              </div>
            </div>
          ` : ''}
          
          <!-- Orphaned Sentence Links -->
          ${orphanedSentLinks.length > 0 ? `
            <div class="card" style="margin-bottom:16px;">
              <div class="card-header" style="padding:12px 16px;">
                <span style="font-size:13px; font-weight:700;">💬 Orphaned Sentence Links (${orphanedSentLinks.length})</span>
                <button class="btn btn-sm btn-ghost" data-clean-orphan="sentence" style="color:var(--red);">🗑 Clean All</button>
              </div>
              <div style="padding:8px 16px; max-height:200px; overflow-y:auto;">
                ${orphanedSentLinks.slice(0, 20).map(l => `
                  <div style="font-size:11px; padding:4px 0; border-bottom:1px solid var(--border); color:var(--text-secondary);">
                    Link ID:${l.id} → word:${l.word_id}${!wordIds.has(l.word_id) ? '(missing)' : ''} · sent:${l.sentence_id}${!sentIds.has(l.sentence_id) ? '(missing)' : ''}
                  </div>
                `).join('')}
                ${orphanedSentLinks.length > 20 ? `<div style="font-size:11px; color:var(--text-muted); padding:4px 0;">... and ${orphanedSentLinks.length - 20} more</div>` : ''}
              </div>
            </div>
          ` : ''}
          
          <!-- Orphaned Group Members -->
          ${orphanedGroupMembers.length > 0 ? `
            <div class="card" style="margin-bottom:16px;">
              <div class="card-header" style="padding:12px 16px;">
                <span style="font-size:13px; font-weight:700;">🔗 Orphaned Group Members (${orphanedGroupMembers.length})</span>
                <button class="btn btn-sm btn-ghost" data-clean-orphan="group" style="color:var(--red);">🗑 Clean All</button>
              </div>
              <div style="padding:8px 16px; max-height:200px; overflow-y:auto;">
                ${orphanedGroupMembers.slice(0, 20).map(m => `
                  <div style="font-size:11px; padding:4px 0; border-bottom:1px solid var(--border); color:var(--text-secondary);">
                    Member ID:${m.id} → word:${m.word_id}${!wordIds.has(m.word_id) ? '(missing)' : ''} · group:${m.group_id}${!groupIds.has(m.group_id) ? '(missing)' : ''}
                  </div>
                `).join('')}
                ${orphanedGroupMembers.length > 20 ? `<div style="font-size:11px; color:var(--text-muted); padding:4px 0;">... and ${orphanedGroupMembers.length - 20} more</div>` : ''}
              </div>
            </div>
          ` : ''}
        `}
      `;
    }
    
    // ========== EVENT LISTENERS ==========
    function attachListeners() {
      // Tabs
      document.querySelectorAll('[data-tab]').forEach(btn => {
        btn.addEventListener('click', () => { state.tab = btn.dataset.tab; state.flagPage = 0; state.flagFilter = 'open'; render(); });
      });
      
      // Admin sign out
      document.getElementById('adminSignOutBtn')?.addEventListener('click', async () => {
        await sb.auth.signOut();
        state.user = null;
        render();
      });
      
      // Sentence filters
      document.querySelectorAll('[data-sent-filter]').forEach(btn => {
        btn.addEventListener('click', () => { state.sentFilter = btn.dataset.sentFilter; state.sentPage = 0; render(); });
      });
      document.getElementById('sentSourceFilter')?.addEventListener('change', e => { state.sentSource = e.target.value; state.sentPage = 0; render(); });
      
      let searchTimer;
      document.getElementById('sentSearch')?.addEventListener('input', e => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => { state.sentSearch = e.target.value; state.sentPage = 0; render(); }, 300);
      });
      
      // Sentence pagination
      document.getElementById('sentPrev')?.addEventListener('click', () => { state.sentPage--; render(); });
      document.getElementById('sentNext')?.addEventListener('click', () => { state.sentPage++; render(); });
      
      // Verify / reject
      document.querySelectorAll('[data-verify]').forEach(btn => btn.addEventListener('click', async () => { if (await verifySentence(parseInt(btn.dataset.verify), 'verified')) { toast('✓ Verified'); render(); } }));
      document.querySelectorAll('[data-reject]').forEach(btn => btn.addEventListener('click', async () => { if (await verifySentence(parseInt(btn.dataset.reject), 'rejected')) { toast('✗ Rejected'); render(); } }));
      document.querySelectorAll('[data-unverify]').forEach(btn => btn.addEventListener('click', async () => { if (await verifySentence(parseInt(btn.dataset.unverify), 'unverified')) { toast('↩ Unverified'); render(); } }));
      
      // Delete sentence + its word links
      document.querySelectorAll('[data-delete-sentence]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = parseInt(btn.dataset.deleteSentence);
          const sent = state.sentences.find(s => s.id === id);
          if (!confirm(`Delete sentence?\n\n"${sent?.sentence || id}"`)) return;
          
          // Delete word-sentence links first
          const { error: linkErr } = await sb.from('japanese_unified_word_sentences').delete().eq('sentence_id', id);
          if (linkErr) console.warn('Link delete:', linkErr.message);
          
          // Delete the sentence
          const { error } = await sb.from('japanese_unified_sentences').delete().eq('id', id);
          if (error) { toast('Delete failed: ' + error.message, 'error'); return; }
          
          // Update local state
          state.sentences = state.sentences.filter(s => s.id !== id);
          state.wordSentenceLinks = (state.wordSentenceLinks || []).filter(l => l.sentence_id !== id);
          toast('Sentence deleted!');
          render();
        });
      });
      
      // Bulk delete all rejected
      document.getElementById('deleteAllRejectedBtn')?.addEventListener('click', async () => {
        const rejected = state.sentences.filter(s => s.verified === 'rejected');
        if (rejected.length === 0) { toast('No rejected sentences'); return; }
        if (!confirm(`Delete ${rejected.length} rejected sentences? This cannot be undone.`)) return;
        
        const ids = rejected.map(s => s.id);
        let deleted = 0;
        for (let i = 0; i < ids.length; i += 500) {
          const batch = ids.slice(i, i + 500);
          // Delete links
          await sb.from('japanese_unified_word_sentences').delete().in('sentence_id', batch);
          // Delete sentences
          const { error } = await sb.from('japanese_unified_sentences').delete().in('id', batch);
          if (!error) deleted += batch.length;
        }
        state.sentences = state.sentences.filter(s => s.verified !== 'rejected');
        state.wordSentenceLinks = (state.wordSentenceLinks || []).filter(l => !ids.includes(l.sentence_id));
        toast(`Deleted ${deleted} rejected sentences!`);
        render();
      });
      
      // ===== LINK / UNLINK WORDS TO SENTENCES =====
      document.querySelectorAll('[data-toggle-link-form]').forEach(btn => {
        btn.addEventListener('click', () => {
          const form = document.getElementById(`linkWordForm_${btn.dataset.toggleLinkForm}`);
          if (form) form.style.display = form.style.display === 'none' ? 'block' : 'none';
        });
      });
      
      document.querySelectorAll('[data-do-link-word]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const sentId = parseInt(btn.dataset.doLinkWord);
          const input = document.querySelector(`[data-link-word-input="${sentId}"]`);
          const kanji = input?.value?.trim();
          if (!kanji) return;
          
          // Find word by kanji
          const word = state.words.find(w => w.kanji === kanji);
          if (!word) { toast(`Word "${kanji}" not found in database`, 'error'); return; }
          
          // Check if already linked
          const existing = (state.wordSentenceLinks || []).some(l => l.word_id === word.id && l.sentence_id === sentId);
          if (existing) { toast('Already linked', 'warn'); return; }
          
          // Insert link
          const { data, error } = await sb.from('japanese_unified_word_sentences')
            .insert({ word_id: word.id, sentence_id: sentId, rating: null })
            .select();
          if (error) { toast('Link failed: ' + error.message, 'error'); return; }
          if (data?.[0]) state.wordSentenceLinks.push(data[0]);
          toast(`Linked "${kanji}" to sentence #${sentId}`);
          render();
        });
      });
      
      document.querySelectorAll('[data-unlink-word]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const linkId = parseInt(btn.dataset.unlinkWord);
          const { error } = await sb.from('japanese_unified_word_sentences').delete().eq('id', linkId);
          if (error) { toast('Unlink failed: ' + error.message, 'error'); return; }
          state.wordSentenceLinks = (state.wordSentenceLinks || []).filter(l => l.id !== linkId);
          toast('Word unlinked');
          render();
        });
      });
      
      // Tags
      document.querySelectorAll('[data-add-tag]').forEach(btn => {
        btn.addEventListener('click', () => {
          const input = document.querySelector(`[data-tag-in="${btn.dataset.addTag}"]`);
          if (input?.value?.trim()) addTag(parseInt(btn.dataset.addTag), input.value.trim());
        });
      });
      document.querySelectorAll('[data-rm-tag]').forEach(btn => {
        btn.addEventListener('click', () => removeTag(parseInt(btn.dataset.rmTag), btn.dataset.rmVal));
      });
      
      // Bulk
      document.getElementById('parseBulkBtn')?.addEventListener('click', parseBulk);
      document.getElementById('bulkSaveBtn')?.addEventListener('click', bulkSaveAll);
      
      // Bulk: Add new word per sentence
      document.querySelectorAll('[data-bulk-add-word]').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = btn.dataset.bulkAddWord;
          const form = document.getElementById(`bulkAddWordForm_${idx}`);
          if (form) form.style.display = form.style.display === 'none' ? 'block' : 'none';
        });
      });
      
      document.querySelectorAll('[data-baw-cancel]').forEach(btn => {
        btn.addEventListener('click', () => {
          const form = document.getElementById(`bulkAddWordForm_${btn.dataset.bawCancel}`);
          if (form) form.style.display = 'none';
        });
      });
      
      document.querySelectorAll('[data-baw-save]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const idx = parseInt(btn.dataset.bawSave);
          const kanji = document.querySelector(`[data-baw-kanji="${idx}"]`)?.value?.trim();
          if (!kanji) { toast('Please enter kanji', 'error'); return; }
          
          const hiragana = document.querySelector(`[data-baw-hiragana="${idx}"]`)?.value?.trim() || '';
          const meaning_en = document.querySelector(`[data-baw-meaning="${idx}"]`)?.value?.trim() || '';
          const jlpt_level = document.querySelector(`[data-baw-level="${idx}"]`)?.value || '';
          const hint = document.querySelector(`[data-baw-hint="${idx}"]`)?.value?.trim() || '';
          const word_type = document.querySelector(`[data-baw-type="${idx}"]`)?.value?.trim() || '';
          
          // Check if word already exists
          const existing = state.words.find(w => w.kanji === kanji);
          if (existing) {
            toast(`「${kanji}」already exists (ID: ${existing.id})`, 'warn');
            return;
          }
          
          // Insert new word — always include jlpt_level (NOT NULL constraint)
          const insertData = { kanji, hiragana, meaning_en, hint, word_type, jlpt_level: jlpt_level || '' };
          
          // Try with source column
          insertData.source = 'bulk_add';
          let { data, error } = await sb.from('japanese_unified_words').insert(insertData).select();
          if (error && (error.message?.includes('source') || error.code === 'PGRST204')) {
            const { source, ...withoutSource } = insertData;
            const retry = await sb.from('japanese_unified_words').insert(withoutSource).select();
            data = retry.data;
            error = retry.error;
          }
          
          if (error) {
            toast('Save failed: ' + error.message, 'error');
            return;
          }
          
          const newWord = data[0];
          state.words.push(newWord);
          
          // Add to this sentence's detected words so it gets linked on "Save All"
          const parsed = state.bulkParsed?.[idx];
          if (parsed) {
            parsed.detectedWords.push(newWord);
            if (!parsed.addedWords) parsed.addedWords = [];
            parsed.addedWords.push(newWord);
          }
          
          toast(`「${kanji}」added! Will be linked on Save All.`);
          render();
        });
      });
      
      // Flag filters
      document.querySelectorAll('[data-flag-filter]').forEach(btn => {
        btn.addEventListener('click', () => { state.flagFilter = btn.dataset.flagFilter; state.flagPage = 0; render(); });
      });
      document.getElementById('flagPrev')?.addEventListener('click', () => { state.flagPage--; render(); });
      document.getElementById('flagNext')?.addEventListener('click', () => { state.flagPage++; render(); });
      
      // Save story edits (now includes onyomi/kunyomi)
      document.querySelectorAll('[data-save-story]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const kanji = btn.dataset.saveStory;
          const alertId = parseInt(btn.dataset.alertId);
          const meaning = document.querySelector(`[data-story-edit-meaning="${kanji}"]`)?.value || '';
          const story = document.querySelector(`[data-story-edit-story="${kanji}"]`)?.value || '';
          const onyomi = document.querySelector(`[data-story-edit-onyomi="${kanji}"]`)?.value || '';
          const kunyomi = document.querySelector(`[data-story-edit-kunyomi="${kanji}"]`)?.value || '';
          
          const ok = await updateStory(kanji, { meaning, story, onyomi, kunyomi });
          if (ok && alertId) {
            await resolveAlert('japanese_story_alerts', alertId);
            const a = state.storyAlerts.find(a => a.id === alertId);
            if (a) a.resolved = true;
          }
          if (ok) { clearDrafts('data-story-edit'); toast('Story updated & resolved!'); render(); }
        });
      });
      
      // Resolve story without edit
      document.querySelectorAll('[data-resolve-story]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = parseInt(btn.dataset.resolveStory);
          const ok = await resolveAlert('japanese_story_alerts', id);
          if (ok) { const a = state.storyAlerts.find(a => a.id === id); if (a) a.resolved = true; toast('Resolved'); render(); }
        });
      });
      
      // Create new story record (when no story exists for kanji)
      document.querySelectorAll('[data-create-story]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const kanji = btn.dataset.createStory;
          const alertId = parseInt(btn.dataset.alertId);
          const groupKanji = btn.dataset.groupKanji || '';
          const meaning = document.querySelector(`[data-story-new-meaning="${kanji}"]`)?.value || '';
          const story = document.querySelector(`[data-story-new-story="${kanji}"]`)?.value || '';
          const onyomi = document.querySelector(`[data-story-new-onyomi="${kanji}"]`)?.value || '';
          const kunyomi = document.querySelector(`[data-story-new-kunyomi="${kanji}"]`)?.value || '';
          
          // Insert into japanese_kanji_stories
          const { data, error } = await sb.from('japanese_kanji_stories')
            .insert({ kanji, group_kanji: groupKanji, meaning, story, onyomi, kunyomi })
            .select();
          
          if (error) {
            toast('Create failed: ' + error.message, 'error');
            return;
          }
          
          // Add to local cache
          if (data?.[0]) state.stories.push(data[0]);
          
          // Resolve alert
          if (alertId) {
            await resolveAlert('japanese_story_alerts', alertId);
            const a = state.storyAlerts.find(a => a.id === alertId);
            if (a) a.resolved = true;
          }
          
          clearDrafts('data-story-new');
          toast('Story created & resolved!');
          render();
        });
      });
      
      // Assign group to a kanji story
      document.querySelectorAll('[data-do-assign-group]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const kanji = btn.dataset.doAssignGroup;
          const select = document.querySelector(`[data-assign-group-for="${kanji}"]`);
          const groupKanji = select?.value;
          if (!groupKanji) { toast('Select a group first', 'warn'); return; }
          
          // Check if story exists — update or create
          const existing = state.stories.find(s => s.kanji === kanji);
          if (existing) {
            const { error } = await sb.from('japanese_kanji_stories')
              .update({ group_kanji: groupKanji })
              .eq('kanji', kanji);
            if (error) { toast('Update failed: ' + error.message, 'error'); return; }
            existing.group_kanji = groupKanji;
          } else {
            // Create minimal story record with group assignment
            const { data, error } = await sb.from('japanese_kanji_stories')
              .insert({ kanji, group_kanji: groupKanji, meaning: '', story: '', onyomi: '', kunyomi: '' })
              .select();
            if (error) { toast('Create failed: ' + error.message, 'error'); return; }
            if (data?.[0]) state.stories.push(data[0]);
          }
          
          // Also update the alert's group_kanji for display
          const alert = state.storyAlerts.find(a => a.kanji === kanji && !a.resolved);
          if (alert) alert.group_kanji = groupKanji;

      });
      
      // Back from group detail
      document.getElementById('backToGroupListBtn')?.addEventListener('click', () => { state.editingGroup = null; render(); });
      
      // Save group metadata
      document.getElementById('saveGroupMetaBtn')?.addEventListener('click', async () => {
        const g = state.editingGroup;
        if (!g) return;
        const name = document.getElementById('editGroupName')?.value?.trim() || '';
        const key = document.getElementById('editGroupKey')?.value?.trim() || '';
        const desc = document.getElementById('editGroupDesc')?.value?.trim() || '';
        const { error } = await sb.from('japanese_word_groups').update({ group_name: name, group_key: key, description: desc }).eq('id', g.id);
        if (error) { toast('Save failed: ' + error.message, 'error'); return; }
        g.group_name = name; g.group_key = key; g.description = desc;
        toast('Group updated!'); render();
      });
      
      // Delete empty group
      document.getElementById('deleteGroupBtn')?.addEventListener('click', async () => {
        const g = state.editingGroup;
        if (!g) return;
        if (!confirm(`Delete group "${g.group_name || g.group_key}"?`)) return;
        const { error } = await sb.from('japanese_word_groups').delete().eq('id', g.id);
        if (error) { toast('Delete failed: ' + error.message, 'error'); return; }
        state.wordGroups = state.wordGroups.filter(gr => gr.id !== g.id);
        state.editingGroup = null;
        toast('Group deleted!'); render();
      });
      
      // Remove member from group
      document.querySelectorAll('[data-remove-member]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const memberId = parseInt(btn.dataset.removeMember);
          const { error } = await sb.from('japanese_word_group_members').delete().eq('id', memberId);
          if (error) { toast('Remove failed: ' + error.message, 'error'); return; }
          state.wordGroupMembers = state.wordGroupMembers.filter(m => m.id !== memberId);
          toast('Member removed'); render();
        });
      });
      
      // Add member to group
      document.getElementById('addMemberBtn')?.addEventListener('click', async () => {
        const g = state.editingGroup;
        if (!g) return;
        const kanji = document.getElementById('addMemberKanji')?.value?.trim();
        if (!kanji) return;
        
        let word = state.words.find(w => w.kanji === kanji);
        if (!word) {
          // Insert new word
          const insertData = { kanji, hiragana: '', meaning_en: '', hint: '', jlpt_level: '', source: 'group_add' };
          let { data, error } = await sb.from('japanese_unified_words').insert(insertData).select();
          if (error && (error.message?.includes('source') || error.code === 'PGRST204')) {
            const { source, ...ws } = insertData;
            const retry = await sb.from('japanese_unified_words').insert(ws).select();
            data = retry.data; error = retry.error;
          }
          if (error) { toast('Word insert failed: ' + error.message, 'error'); return; }
          word = data[0]; state.words.push(word);
        }
        
        // Check if already in group
        if (state.wordGroupMembers.some(m => m.group_id === g.id && m.word_id === word.id)) {
          toast('Already in this group', 'warn'); return;
        }
        
        const nextSort = state.wordGroupMembers.filter(m => m.group_id === g.id).length + 1;
        const { data, error } = await sb.from('japanese_word_group_members').insert({ group_id: g.id, word_id: word.id, sort_order: nextSort }).select();
        if (error) { toast('Link failed: ' + error.message, 'error'); return; }
        state.wordGroupMembers.push(data[0]);
        toast(`「${kanji}」added to group!`); render();
      });
      
      // Create new group
      document.getElementById('createGroupBtn')?.addEventListener('click', () => {
        const form = document.getElementById('createGroupForm');
        if (form) form.style.display = form.style.display === 'none' ? 'block' : 'none';
      });
      document.getElementById('cancelCreateGroup')?.addEventListener('click', () => {
        document.getElementById('createGroupForm').style.display = 'none';
      });
      document.getElementById('submitCreateGroup')?.addEventListener('click', async () => {
        const name = document.getElementById('newGroupName')?.value?.trim();
        const type = document.getElementById('newGroupType')?.value;
        const key = document.getElementById('newGroupKey')?.value?.trim() || name;
        const desc = document.getElementById('newGroupDesc')?.value?.trim() || '';
        if (!name || !type) { toast('Name and type required', 'error'); return; }
        
        const { data, error } = await sb.from('japanese_word_groups').insert({ group_name: name, group_type: type, group_key: key, description: desc, status: 'draft' }).select();
        if (error) { toast('Create failed: ' + error.message, 'error'); return; }
        state.wordGroups.push(data[0]);
        toast('Group created!'); render();
      });
      
      // ===== DUPLICATE TAB =====
      document.getElementById('dupePrev')?.addEventListener('click', () => { state.dupePage--; render(); });
      document.getElementById('dupeNext')?.addEventListener('click', () => { state.dupePage++; render(); });
      
      document.querySelectorAll('[data-delete-word]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const wordId = parseInt(btn.dataset.deleteWord);
          const word = state.words.find(w => w.id === wordId);
          if (!confirm(`Delete word "${word?.kanji}" (ID:${wordId})?`)) return;
          const { error } = await sb.from('japanese_unified_words').delete().eq('id', wordId);
          if (error) { toast('Delete failed: ' + error.message, 'error'); return; }
          state.words = state.words.filter(w => w.id !== wordId);
          toast('Word deleted!'); render();
        });
      });
      
      // ===== ORPHAN CLEANUP =====
      document.querySelectorAll('[data-clean-orphan]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const type = btn.dataset.cleanOrphan;
          const wordIds = new Set(state.words.map(w => w.id));
          const sentIds = new Set(state.sentences.map(s => s.id));
          const groupIds = new Set((state.wordGroups || []).map(g => g.id));
          
          let table, orphanIds;
          if (type === 'book') {
            table = 'japanese_unified_word_books';
            orphanIds = (state.wordBooks || []).filter(wb => !wordIds.has(wb.word_id)).map(wb => wb.id);
          } else if (type === 'sentence') {
            table = 'japanese_unified_word_sentences';
            orphanIds = (state.wordSentenceLinks || []).filter(l => !wordIds.has(l.word_id) || !sentIds.has(l.sentence_id)).map(l => l.id);
          } else if (type === 'group') {
            table = 'japanese_word_group_members';
            orphanIds = (state.wordGroupMembers || []).filter(m => !wordIds.has(m.word_id) || !groupIds.has(m.group_id)).map(m => m.id);
          }
          
          if (!orphanIds?.length) { toast('Nothing to clean'); return; }
          if (!confirm(`Delete ${orphanIds.length} orphaned rows from ${table}?`)) return;
          
          // Delete in batches of 500
          let deleted = 0;
          for (let i = 0; i < orphanIds.length; i += 500) {
            const batch = orphanIds.slice(i, i + 500);
            const { error } = await sb.from(table).delete().in('id', batch);
            if (error) { toast('Partial cleanup error: ' + error.message, 'error'); break; }
            deleted += batch.length;
          }
          
          // Update local state
          if (type === 'book') state.wordBooks = state.wordBooks.filter(wb => !orphanIds.includes(wb.id));
          else if (type === 'sentence') state.wordSentenceLinks = state.wordSentenceLinks.filter(l => !orphanIds.includes(l.id));
          else if (type === 'group') state.wordGroupMembers = state.wordGroupMembers.filter(m => !orphanIds.includes(m.id));
          
          toast(`Cleaned ${deleted} orphaned rows!`); render();
        });
      });
    }
    
    // ========== STATE PERSISTENCE (survives tab reload) ==========
    // ========== STATE PERSISTENCE (survives mobile tab kills) ==========
    const PERSIST_KEY = 'dm_state';
    const DRAFT_KEY = 'dm_drafts';
    
    function saveState() {
      try {
        // Save tab to URL hash (most reliable — survives everything)
        const hashState = [state.tab, state.flagFilter, state.verifySource].join('|');
        if (location.hash !== '#' + hashState) {
          history.replaceState(null, '', '#' + hashState);
        }
        // Also save full state to localStorage as backup
        localStorage.setItem(PERSIST_KEY, JSON.stringify({
          tab: state.tab, flagFilter: state.flagFilter, flagPage: state.flagPage,
          sentFilter: state.sentFilter, sentSource: state.sentSource, sentPage: state.sentPage,
          incompleteFilter: state.incompleteFilter, incompletePage: state.incompletePage,
          verifySource: state.verifySource, verifyIdx: state.verifyIdx,
          animeFilter: state.animeFilter, animePage: state.animePage,
          groupEditorType: state.groupEditorType, groupEditorPage: state.groupEditorPage,
          dupePage: state.dupePage, auditPage: state.auditPage, showBulkAI: state.showBulkAI,
        }));
      } catch(e) { console.warn('saveState:', e); }
    }
    
    function restoreState() {
      try {
        // Try URL hash first (most reliable)
        if (location.hash && location.hash.length > 1) {
          const parts = location.hash.slice(1).split('|');
          if (parts[0]) state.tab = parts[0];
          if (parts[1]) state.flagFilter = parts[1];
          if (parts[2]) state.verifySource = parts[2];
        }
        // Then overlay full state from localStorage
        const saved = localStorage.getItem(PERSIST_KEY);
        if (saved) {
          const p = JSON.parse(saved);
          // Only restore if tab matches hash (prevents stale localStorage overriding fresh hash)
          if (!location.hash || p.tab === state.tab) {
            Object.keys(p).forEach(k => { if (p[k] !== undefined && k in state) state[k] = p[k]; });
          }
        }
      } catch(e) { console.warn('restoreState:', e); }
    }
    
    function saveDraft(key, value) {
      try {
        const d = JSON.parse(localStorage.getItem(DRAFT_KEY) || '{}');
        d[key] = value;
        localStorage.setItem(DRAFT_KEY, JSON.stringify(d));
      } catch { }
    }
    
    function getDraft(key) {
      try { return (JSON.parse(localStorage.getItem(DRAFT_KEY) || '{}'))[key] || ''; } catch { return ''; }
    }
    
    function clearDrafts(prefix) {
      try {
        const d = JSON.parse(localStorage.getItem(DRAFT_KEY) || '{}');
        Object.keys(d).forEach(k => { if (k.startsWith(prefix)) delete d[k]; });
        localStorage.setItem(DRAFT_KEY, JSON.stringify(d));
      } catch { }
    }
    
    // ========== INIT ==========
    async function init() {
      // Restore tab/filter state (URL hash + localStorage)
      restoreState();
      
      render(); // show "checking auth..."
      
      // Check existing session
      const { data: { session } } = await sb.auth.getSession();
      if (session) {
        state.user = session.user;
      }
      state.authChecked = true;
      
      // Listen for auth changes (handles OAuth redirect)
      sb.auth.onAuthStateChange((event, session) => {
        if (event === 'INITIAL_SESSION') return;
        state.user = session?.user || null;
        state.authChecked = true;
        if (state.user?.id === ADMIN_USER_ID && state.words.length === 0) {
          loadAll();
        }
        render();
      });
      
      // If already admin, load data
      if (state.user?.id === ADMIN_USER_ID) {
        await loadAll();
      }
      
      render();
    }
    
    init();
  </script>
  
  <!-- ===== FLOATING DICTIONARY ===== -->
  <style>
    .dict-fab {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      border: none;
      font-size: 22px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      z-index: 9000;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s;
    }
    .dict-fab:hover { transform: scale(1.1); }
    
    .dict-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg-card);
      border-top: 2px solid var(--accent);
      padding: 10px 14px;
      z-index: 9001;
      transform: translateY(100%);
      transition: transform 0.2s ease-out;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.4);
    }
    .dict-bar.open { transform: translateY(0); }
    
    .dict-bar-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .dict-bar input {
      flex: 1;
      font-size: 16px;
      padding: 10px 12px;
      border-radius: 8px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-family: inherit;
      min-width: 0;
    }
    .dict-bar-btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .dict-bar-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .dict-bar-ghost.active { background: var(--accent); color: white; border-color: var(--accent); }
    .dict-bar-close {
      background: transparent;
      color: var(--text-muted);
      border: none;
      font-size: 22px;
      cursor: pointer;
      padding: 4px 8px;
      flex-shrink: 0;
    }
    .dict-tabs {
      display: flex;
      gap: 4px;
      margin-top: 8px;
    }
    .dict-tabs button {
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
      font-family: inherit;
    }
    .dict-tabs button.active { background: var(--accent); color: white; border-color: var(--accent); }
    .dict-hint { font-size: 10px; color: var(--text-muted); margin-top: 6px; }
  </style>
  
  <button class="dict-fab" id="dictFab" title="Dictionary">📖</button>
  
  <div class="dict-bar" id="dictBar">
    <div class="dict-bar-row">
      <input type="text" id="dictInput" placeholder="Type kanji or word..." autocomplete="off">
      <button class="dict-bar-btn" id="dictSearchBtn">🔍 Search</button>
      <button class="dict-bar-close" id="dictCloseBtn">✕</button>
    </div>
    <div class="dict-tabs">
      <button class="active" data-dict-src="jisho">Jisho</button>
      <button data-dict-src="jpdb">jpdb</button>
      <button data-dict-src="takoboto">Takoboto</button>
    </div>
    <div class="dict-hint">Opens dictionary in a popup window. Your form stays safe here.</div>
  </div>
  
  <script>
    (function() {
      const fab = document.getElementById('dictFab');
      const bar = document.getElementById('dictBar');
      const input = document.getElementById('dictInput');
      let currentSrc = 'jisho';
      let dictWindow = null;
      
      const DICT_URLS = {
        jisho: q => `https://jisho.org/search/${encodeURIComponent(q)}`,
        jpdb: q => `https://jpdb.io/search?q=${encodeURIComponent(q)}`,
        takoboto: q => `https://takoboto.jp/search/${encodeURIComponent(q)}`,
      };
      
      fab.addEventListener('click', () => {
        bar.classList.add('open');
        input.focus();
      });
      
      document.getElementById('dictCloseBtn').addEventListener('click', () => {
        bar.classList.remove('open');
      });
      
      function doSearch() {
        const q = input.value.trim();
        if (!q) return;
        const url = DICT_URLS[currentSrc](q);
        
        // Open in popup window (reuse same window if still open)
        if (dictWindow && !dictWindow.closed) {
          dictWindow.location.href = url;
          dictWindow.focus();
        } else {
          // Mobile: opens as new tab. Desktop: opens as popup window.
          dictWindow = window.open(url, 'jlpt_dict', 'width=420,height=700,left=100,top=100');
        }
      }
      
      document.getElementById('dictSearchBtn').addEventListener('click', doSearch);
      input.addEventListener('keydown', (e) => { if (e.key === 'Enter') doSearch(); });
      
      // Dictionary source tabs
      document.querySelectorAll('[data-dict-src]').forEach(btn => {
        btn.addEventListener('click', () => {
          currentSrc = btn.dataset.dictSrc;
          document.querySelectorAll('[data-dict-src]').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          if (input.value.trim()) doSearch();
        });
      });
      
      // Click any alert-kanji to auto-fill search
      document.addEventListener('click', (e) => {
        const ak = e.target.closest('.alert-kanji');
        if (ak) {
          const text = ak.textContent.trim();
          input.value = text;
          bar.classList.add('open');
        }
      });
    })();
  </script>
