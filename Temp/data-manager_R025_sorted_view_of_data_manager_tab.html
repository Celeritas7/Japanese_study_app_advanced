<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JLPT Data Manager</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0c0e14;
      --bg-card: #141620;
      --bg-input: #1a1d2e;
      --bg-hover: #1e2235;
      --border: #252840;
      --border-focus: #6366f1;
      --text-primary: #e2e4ed;
      --text-secondary: #8b8fa3;
      --text-muted: #5c5f73;
      --accent: #6366f1;
      --accent-hover: #7577f5;
      --emerald: #10b981;
      --amber: #f59e0b;
      --red: #ef4444;
      --rose: #f43f5e;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Noto Sans JP', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }
    
    .mono { font-family: 'JetBrains Mono', monospace; }
    
    /* Layout */
    .app-header {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .app-header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    
    .app-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .app-title .icon { font-size: 20px; }
    .app-title .sub { color: var(--text-muted); font-weight: 400; font-size: 12px; }
    
    .tab-bar {
      display: flex;
      gap: 4px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-bottom: 2px;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    
    .tab-btn {
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-secondary);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
      white-space: nowrap;
      flex-shrink: 0;
    }
    
    .tab-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
    .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
    
    .main-content {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px;
    }
    
    /* Cards */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 16px;
    }
    
    .card-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .card-body { padding: 20px; }
    
    .card-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.3px;
      color: var(--text-secondary);
    }
    
    /* Buttons */
    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.15s;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-emerald { background: rgba(16,185,129,0.15); color: var(--emerald); border-color: rgba(16,185,129,0.3); }
    .btn-emerald:hover { background: rgba(16,185,129,0.25); }
    .btn-amber { background: rgba(245,158,11,0.15); color: var(--amber); border-color: rgba(245,158,11,0.3); }
    .btn-amber:hover { background: rgba(245,158,11,0.25); }
    .btn-red { background: rgba(239,68,68,0.15); color: var(--red); border-color: rgba(239,68,68,0.3); }
    .btn-red:hover { background: rgba(239,68,68,0.25); }
    .btn-ghost { background: transparent; color: var(--text-secondary); border-color: var(--border); }
    .btn-ghost:hover { background: var(--bg-hover); color: var(--text-primary); }
    .btn-sm { padding: 4px 10px; font-size: 11px; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    
    /* Inputs */
    input, textarea, select {
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      width: 100%;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--border-focus);
    }
    
    textarea { resize: vertical; }
    
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    /* Tags */
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 500;
      border: 1px solid;
    }
    
    .tag-grammar { background: rgba(245,158,11,0.1); color: var(--amber); border-color: rgba(245,158,11,0.2); }
    .tag-vocab { background: rgba(99,102,241,0.1); color: var(--accent); border-color: rgba(99,102,241,0.2); }
    .tag-default { background: rgba(139,143,163,0.1); color: var(--text-secondary); border-color: var(--border); }
    
    .tag .remove {
      cursor: pointer;
      opacity: 0.5;
      font-size: 13px;
      line-height: 1;
    }
    .tag .remove:hover { opacity: 1; }
    
    /* Badge */
    .badge {
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.3px;
      border: 1px solid;
    }
    
    .badge-unverified { background: rgba(245,158,11,0.1); color: var(--amber); border-color: rgba(245,158,11,0.2); }
    .badge-verified { background: rgba(16,185,129,0.1); color: var(--emerald); border-color: rgba(16,185,129,0.2); }
    .badge-rejected { background: rgba(239,68,68,0.1); color: var(--red); border-color: rgba(239,68,68,0.2); }
    
    /* Sentence item */
    .sent-item {
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 10px;
      transition: border-color 0.15s;
    }
    
    .sent-item:hover { border-color: rgba(99,102,241,0.3); }
    .sent-item.resolved { opacity: 0.5; border-color: rgba(16,185,129,0.2); }
    
    .sent-text { font-size: 15px; line-height: 1.7; margin-bottom: 6px; }
    .sent-text .hl { color: var(--accent); font-weight: 700; background: rgba(99,102,241,0.1); padding: 0 2px; border-radius: 3px; }
    .sent-meaning { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
    .sent-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-size: 11px; color: var(--text-muted); }
    
    /* Alert item */
    .alert-item {
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 10px;
      border-left: 3px solid var(--amber);
    }
    
    .alert-item.resolved { border-left-color: var(--emerald); opacity: 0.6; }
    
    .alert-kanji {
      font-size: 28px;
      font-weight: 700;
      margin-right: 16px;
    }
    
    /* Filters bar */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      align-items: center;
    }
    
    .filter-bar select, .filter-bar input {
      width: auto;
      min-width: 120px;
    }
    
    /* Stats row */
    .stats-row {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .stat-card {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      text-align: center;
    }
    
    .stat-num { font-size: 24px; font-weight: 700; }
    .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    
    /* Pagination */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px 0;
    }
    
    /* Word edit row */
    .edit-row {
      display: grid;
      grid-template-columns: 100px 150px 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    
    .edit-row:last-child { border-bottom: none; }
    
    /* Loading */
    .loading { text-align: center; padding: 40px; color: var(--text-muted); }
    
    /* Flex utilities */
    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .items-center { align-items: center; }
    .items-start { align-items: flex-start; }
    .justify-between { justify-content: space-between; }
    .gap-2 { gap: 8px; }
    .gap-3 { gap: 12px; }
    .gap-4 { gap: 16px; }
    .flex-1 { flex: 1; }
    .flex-wrap { flex-wrap: wrap; }
    .mt-2 { margin-top: 8px; }
    .mt-3 { margin-top: 12px; }
    .mb-2 { margin-bottom: 8px; }
    .mb-3 { margin-bottom: 12px; }
    .hidden { display: none !important; }
    
    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      z-index: 9999;
      animation: fadeInUp 0.25s ease-out;
    }
    
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .toast-success { background: rgba(16,185,129,0.15); color: var(--emerald); border: 1px solid rgba(16,185,129,0.3); }
    .toast-error { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
    .toast-warn { background: rgba(245,158,11,0.15); color: var(--amber); border: 1px solid rgba(245,158,11,0.3); }
    
    /* ===== MOBILE RESPONSIVE ===== */
    @media (max-width: 768px) {
      .app-header { padding: 8px 12px; }
      .app-header-top { margin-bottom: 6px; }
      .app-title { font-size: 12px; gap: 6px; }
      .app-title .sub { display: none; }
      .app-title .icon { font-size: 16px; }
      
      .tab-bar { gap: 3px; }
      .tab-btn { padding: 5px 8px; font-size: 10px; border-radius: 6px; }
      
      .main-content { padding: 12px; }
      
      .stats-row { flex-wrap: wrap; gap: 8px; }
      .stat-card { min-width: calc(50% - 6px); padding: 10px 12px; }
      .stat-num { font-size: 20px; }
      .stat-label { font-size: 10px; }
      
      .filter-bar { overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; flex-wrap: nowrap; }
      .filter-bar::-webkit-scrollbar { display: none; }
      .filter-bar .btn { white-space: nowrap; flex-shrink: 0; }
      
      .alert-item { padding: 10px; }
      .alert-kanji { font-size: 28px; min-width: 50px; }
      
      .edit-row { grid-template-columns: 1fr; gap: 6px; }
      
      .card-header { padding: 10px 14px; flex-wrap: wrap; gap: 6px; }
      .card-body { padding: 10px 14px; }
      
      .sent-item { padding: 10px; }
      .sent-text { font-size: 14px; }
      
      /* Stack flex items that use inline gap styling */
      .card [style*="display:flex"][style*="gap"] { flex-wrap: wrap; }
      
      label { font-size: 10px; }
      input, textarea, select { font-size: 13px; padding: 6px 8px; }
    }
    
    @media (max-width: 480px) {
      .stat-card { min-width: calc(50% - 4px); padding: 8px 10px; }
      .stat-num { font-size: 18px; }
      .tab-btn { padding: 4px 6px; font-size: 9px; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    // ========== CONFIG ==========
    const SUPABASE_URL = 'https://ulgrfumbwjovbjzjiems.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVsZ3JmdW1id2pvdmJqemppZW1zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjczNzIyNjcsImV4cCI6MjA4Mjk0ODI2N30.ix5Vh4Y3GXNbQbzVtTD_WSko0L3cr5q_eCnTuDEMh7M';
    const ADMIN_USER_ID = 'd469efb7-f9e1-4b49-8b14-75a42b4d22e0';
    
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    // ========== STATE ==========
    const state = {
      user: null,
      authChecked: false,
      tab: 'stats',    // stats, sentences, bulk, story-flags, word-flags, incomplete
      loading: true,
      
      // Data pools
      sentences: [],
      words: [],       // from japanese_unified_words (includes all Goi + Kanji words)
      wordBooks: [],   // from japanese_unified_word_books
      wordGroups: [],  // from japanese_word_groups
      wordGroupMembers: [], // from japanese_word_group_members
      wordSentenceLinks: [], // from japanese_unified_word_sentences
      storyAlerts: [],
      wordAlerts: [],
      stories: [],
      storyGroups: [],
      
      // Sentence tab
      sentFilter: 'unverified',
      sentSource: 'all',
      sentSearch: '',
      sentPage: 0,
      
      // AI Review
      aiEnabled: false,
      aiReviewing: false,
      aiResults: null,
      
      // Bulk tab
      bulkInput: '',
      bulkSource: 'manual',
      bulkLevel: '',
      bulkParsed: null,
      bulkSaving: false,
      bulkMsg: '',
      
      // Flags
      flagFilter: 'open', // open, resolved, all
      flagPage: 0,
      
      // Incomplete words tab
      incompleteFilter: 'all', // all, sentence_tap, textbook, other
      incompletePage: 0,
      
      // Verification queue
      verifySource: 'all',
      verifyIdx: 0, // current card index in filtered list
      showBulkAI: false,
      
      // Anime word review
      animeWords: [],
      animeFilter: 'pending', // pending, promoted, dismissed
      animePage: 0,
      
      // Word group editor
      groupEditorType: 'all', // all, synonym, near_synonym, alt_kanji, alt_reading, context_variant
      groupEditorSearch: '',
      groupEditorPage: 0,
      editingGroup: null, // group object being edited
      
      // Duplicates
      dupePage: 0,
      
      // Orphans
      orphanResults: null, // { wordBookOrphans, sentenceLinkOrphans, groupMemberOrphans }
      
      // Group Audit
      auditPage: 0,
    };
    
    // ========== HELPERS ==========
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    
    function isKanji(c) {
      const code = c.codePointAt(0);
      return (code >= 0x4E00 && code <= 0x9FFF) || (code >= 0x3400 && code <= 0x4DBF);
    }
    
    function extractKanjiStem(word) {
      if (!word) return '';
      const chars = [...word];
      if (!chars.some(isKanji)) return word;
      let stem = '';
      for (const c of chars) { if (isKanji(c)) stem += c; else break; }
      return stem || word;
    }
    
    function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
    
    function tagClass(tag) {
      if (tag.startsWith('grammar')) return 'tag-grammar';
      if (tag.startsWith('vocab')) return 'tag-vocab';
      return 'tag-default';
    }
    
    function toast(msg, type = 'success') {
      const el = document.createElement('div');
      el.className = `toast toast-${type}`;
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }
    
    // Build word lookup for detection (full word + compound stems, skip single-char stems)
    function buildStemMap() {
      const map = {};
      state.words.forEach(w => {
        const kanji = w.kanji || '';
        if (!kanji) return;
        
        // Always try full word match
        if (!map[kanji]) map[kanji] = [];
        if (!map[kanji].some(e => e.id === w.id)) map[kanji].push(w);
        
        // For compound kanji (2+ chars), also add the stem
        const stem = extractKanjiStem(kanji);
        if (stem && stem.length >= 2 && stem !== kanji) {
          if (!map[stem]) map[stem] = [];
          if (!map[stem].some(e => e.id === w.id)) map[stem].push(w);
        }
      });
      return map;
    }
    
    function detectWords(sentence, stemMap, sortedStems) {
      const found = [];
      const seen = new Set();
      for (const stem of sortedStems) {
        if (sentence.includes(stem)) {
          // For single-char stems that got in via full word match,
          // verify it's not part of a larger compound in the sentence
          if ([...stem].length === 1) {
            const idx = sentence.indexOf(stem);
            const charBefore = idx > 0 ? sentence[idx - 1] : '';
            const charAfter = idx + stem.length < sentence.length ? sentence[idx + stem.length] : '';
            // Skip if surrounded by other kanji (it's part of a compound)
            if (isKanji(charBefore) || isKanji(charAfter)) continue;
          }
          for (const w of stemMap[stem]) {
            if (!seen.has(w.id)) { seen.add(w.id); found.push(w); }
          }
        }
      }
      return found;
    }
    
    function highlightWords(sentence, detectedWords) {
      if (!detectedWords?.length) return escapeHtml(sentence);
      const stems = [...new Set(detectedWords.map(w => extractKanjiStem(w.kanji)).filter(Boolean))].sort((a,b) => b.length - a.length);
      if (!stems.length) return escapeHtml(sentence);
      const pattern = new RegExp(`(${stems.map(escapeRegex).join('|')})`, 'g');
      return sentence.split(pattern).map(part =>
        stems.includes(part) ? `<span class="hl">${escapeHtml(part)}</span>` : escapeHtml(part)
      ).join('');
    }
    
    // ========== DATA LOADING ==========
    async function loadPaginated(table, select = '*', orderCol = 'id') {
      let all = [], page = 0;
      while (true) {
        const { data, error } = await sb.from(table).select(select).order(orderCol).range(page * 1000, (page + 1) * 1000 - 1);
        if (error) { console.error(`Load ${table}:`, error); break; }
        if (!data?.length) break;
        all = all.concat(data);
        if (data.length < 1000) break;
        page++;
      }
      return all;
    }
    
    async function loadAll() {
      state.loading = true; render();
      const [sentences, words, wordBooks, wordGroups, wordGroupMembers, storyAlerts, wordAlerts, stories, storyGroups, wordSentenceLinks, animeWords] = await Promise.all([
        loadPaginated('japanese_unified_sentences'),
        loadPaginated('japanese_unified_words'),
        loadPaginated('japanese_unified_word_books'),
        loadPaginated('japanese_word_groups'),
        loadPaginated('japanese_word_group_members'),
        loadPaginated('japanese_story_alerts'),
        loadPaginated('japanese_word_alerts'),
        loadPaginated('japanese_kanji_stories'),
        loadPaginated('japanese_kanji_story_groups'),
        loadPaginated('japanese_unified_word_sentences', 'id,word_id,sentence_id,rating'),
        loadPaginated('japanese_anime_words').catch(() => []),
      ]);
      state.sentences = sentences;
      state.words = words;
      state.wordBooks = wordBooks;
      state.wordGroups = wordGroups;
      state.wordGroupMembers = wordGroupMembers;
      state.storyAlerts = storyAlerts;
      state.wordAlerts = wordAlerts;
      state.stories = stories;
      state.storyGroups = storyGroups;
      state.wordSentenceLinks = wordSentenceLinks;
      state.animeWords = animeWords;
      state.loading = false;
      render();
    }
    
    // ========== DATA OPERATIONS ==========
    // Reassign a kanji to a different story group
    async function reassignGroup(kanji, newGroupKanji) {
      if (!kanji || !newGroupKanji) return;
      
      const existing = state.stories.find(s => s.kanji === kanji);
      if (existing) {
        const { error } = await sb.from('japanese_kanji_stories')
          .update({ group_kanji: newGroupKanji })
          .eq('kanji', kanji);
        if (error) { toast('Reassign failed: ' + error.message, 'error'); return; }
        existing.group_kanji = newGroupKanji;
      } else {
        const { data, error } = await sb.from('japanese_kanji_stories')
          .insert({ kanji, group_kanji: newGroupKanji, meaning: '', story: '', onyomi: '', kunyomi: '' })
          .select();
        if (error) { toast('Create failed: ' + error.message, 'error'); return; }
        if (data?.[0]) state.stories.push(data[0]);
      }
      
      // Update alert's group_kanji
      const alert = state.storyAlerts.find(a => a.kanji === kanji && !a.resolved);
      if (alert) alert.group_kanji = newGroupKanji;
      
      toast(`「${kanji}」reassigned to group「${newGroupKanji}」`);
      render();
    }
    
    function getVerifyQueue() {
      let queue = state.sentences.filter(s => (s.verified || 'unverified') === 'unverified');
      if (state.verifySource !== 'all') queue = queue.filter(s => s.source === state.verifySource);
      return queue.sort((a, b) => (b.id || 0) - (a.id || 0));
    }
    
    async function updateSentence(id, updates) {
      const { error } = await sb.from('japanese_unified_sentences').update(updates).eq('id', id);
      if (error) { toast('Update failed: ' + error.message, 'error'); return false; }
      const s = state.sentences.find(s => s.id === id);
      if (s) Object.assign(s, updates);
      return true;
    }
    
    async function updateWord(id, updates) {
      const { error } = await sb.from('japanese_unified_words').update(updates).eq('id', id);
      if (error) { toast('Update failed: ' + error.message, 'error'); return false; }
      const w = state.words.find(w => w.id === id);
      if (w) Object.assign(w, updates);

    // Import AI review results (JSON) — three-status logic + sentence splits
    async function importAIReview() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json';
      input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        try {
          const text = await file.text();
          const results = JSON.parse(text);
          if (!Array.isArray(results)) { toast('Invalid JSON: expected array', 'error'); return; }
          
          let verified = 0, corrected = 0, rejected = 0, split = 0, skipped = 0;
          for (const r of results) {
            if (!r.id) { skipped++; continue; }
            const updates = {};
            
            // Three-status logic:
            // 1. verified="verified" → sentence is good as-is
            // 2. verified="rejected" + corrected_sentence → overwrite sentence, mark "corrected"
            // 3. verified="rejected" + no correction → mark "rejected" (garbage/unfixable)
            if (r.verified === 'rejected' && r.corrected_sentence) {
              updates.sentence = r.corrected_sentence;
              updates.verified = 'corrected';
              corrected++;
            } else if (r.verified === 'rejected') {
              updates.verified = 'rejected';
              rejected++;
            } else if (r.verified === 'verified' || r.verified === 'corrected') {
              updates.verified = r.verified;
              verified++;
            }
            
            // Always update these if provided
            if (r.meaning_en) updates.meaning_en = r.meaning_en;
            if (r.tags && r.tags.length > 0) updates.tags = r.tags;
            if (r.notes) updates.notes = r.notes;
            
            if (Object.keys(updates).length > 0) {
              await updateSentence(r.id, updates);
            }
            
            // Handle extra_sentences — split entries that had ①② packed together
            if (r.extra_sentences && Array.isArray(r.extra_sentences)) {
              // Find word links for the original sentence so we can copy them
              const originalLinks = (state.wordSentenceLinks || []).filter(l => l.sentence_id === r.id);
              const origSent = state.sentences.find(s => s.id === r.id);
              
              for (const extra of r.extra_sentences) {
                if (!extra.sentence) continue;
                
                // DEDUP: Check if this sentence already exists (normalized comparison)
                const normalized = extra.sentence.replace(/\s+/g, '').trim();
                const existing = state.sentences.find(s => 
                  s.id !== r.id && (s.sentence || '').replace(/\s+/g, '').trim() === normalized
                );
                
                if (existing) {
                  // Sentence already exists — just ensure word links exist, skip insert
                  if (originalLinks.length > 0) {
                    for (const ol of originalLinks) {
                      const alreadyLinked = (state.wordSentenceLinks || []).some(
                        l => l.word_id === ol.word_id && l.sentence_id === existing.id
                      );
                      if (!alreadyLinked) {
                        const { data: ld, error: le } = await sb
                          .from('japanese_unified_word_sentences')
                          .insert({ word_id: ol.word_id, sentence_id: existing.id, rating: null })
                          .select();
                        if (!le && ld?.[0]) state.wordSentenceLinks.push(ld[0]);
                      }
                    }
                  }
                  // Update meaning if the existing one is empty
                  if (extra.meaning_en && !existing.meaning_en) {
                    await updateSentence(existing.id, { meaning_en: extra.meaning_en });
                  }
                  continue; // skip insert — already exists
                }
                
                // Insert new sentence
                const newSent = {
                  sentence: extra.sentence,
                  meaning_en: extra.meaning_en || '',
                  source: origSent?.source || 'split',
                  jlpt_level: origSent?.jlpt_level || '',
                  verified: 'corrected',
                  tags: extra.tags || r.tags || [],
                };
                
                const { data: insData, error: insErr } = await sb
                  .from('japanese_unified_sentences')
                  .insert(newSent)
                  .select();
                
                if (insErr) {
                  console.error('Insert extra sentence failed:', insErr);
                  continue;
                }
                
                if (insData?.[0]) {
                  const newSentRecord = insData[0];
                  state.sentences.push(newSentRecord);
                  split++;
                  
                  // Copy word links from original sentence to the new one (with dedup)
                  if (originalLinks.length > 0) {
                    for (const ol of originalLinks) {
                      const alreadyLinked = (state.wordSentenceLinks || []).some(
                        l => l.word_id === ol.word_id && l.sentence_id === newSentRecord.id
                      );
                      if (!alreadyLinked) {
                        const { data: ld, error: le } = await sb
                          .from('japanese_unified_word_sentences')
                          .insert({ word_id: ol.word_id, sentence_id: newSentRecord.id, rating: null })
                          .select();
                        if (!le && ld?.[0]) state.wordSentenceLinks.push(ld[0]);
                      }
                    }
                  }
                }
              }
            }
          }
          
          const parts = [];
          if (verified) parts.push(`\u2713${verified} verified`);
          if (corrected) parts.push(`\uD83D\uDD27${corrected} corrected`);
          if (rejected) parts.push(`\u2715${rejected} rejected`);
          if (split) parts.push(`\u2702${split} split`);
          if (skipped) parts.push(`${skipped} skipped`);
          toast(`Done! ${parts.join(', ')}`);
          render();
        } catch (err) {
          toast('Import error: ' + err.message, 'error');
        }
      };
      input.click();
    }
    
    // AI Review via Anthropic API (Option B)
    async function aiReviewBatch() {
      const unverified = state.sentences
        .filter(s => (s.verified || 'unverified') === 'unverified')
        .slice(0, 15); // batch of 15
      
      if (unverified.length === 0) { toast('No unverified sentences', 'error'); return; }
      
      state.aiReviewing = true;
      state.aiResults = null;
      render();
      
      const sentenceList = unverified.map(s => 
        `ID:${s.id} | ${s.sentence} | ${s.meaning_en || '(no translation)'}`
      ).join('\n');
      
      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 4000,
            system: `You are a Japanese language expert reviewing sentences for a JLPT study app. For each sentence, evaluate:
1. Grammar correctness (is it natural Japanese?)
2. Suggest tags (grammar:てform, grammar:passive, vocab, etc.)
3. If meaning_en is wrong or missing, provide correct translation
4. Rate difficulty 1-3 (1=easy, 3=hard)
5. verdict: "verified", "rejected", or "needs_edit"
6. If needs_edit, provide corrected_sentence

Respond ONLY with a JSON array, no markdown. Each element: {"id": number, "verdict": string, "tags": string[], "meaning_en": string, "difficulty": number, "corrected_sentence": string|null, "notes": string}`,
            messages: [{ role: 'user', content: `Review these Japanese sentences:\n\n${sentenceList}` }]
          })
        });
        
        const data = await response.json();
        const text = data.content?.map(c => c.text || '').join('') || '';
        const clean = text.replace(/```json|```/g, '').trim();
        state.aiResults = JSON.parse(clean);
        state.aiReviewing = false;
        render();
        toast(`AI reviewed ${state.aiResults.length} sentences`);
      } catch (err) {
        state.aiReviewing = false;
        render();
        toast('AI review failed: ' + err.message, 'error');
      }
    }

    function parseBulk() {

      if (!text) { toast('Paste sentences first', 'error'); return; }
      state.bulkInput = text;
      state.bulkSource = document.getElementById('bulkSource')?.value || 'manual';
      state.bulkLevel = document.getElementById('bulkLevel')?.value || '';
      
      const stemMap = buildStemMap();
      const sortedStems = Object.keys(stemMap).sort((a,b) => b.length - a.length);
      const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
      
      state.bulkParsed = lines.map(line => ({
        sentence: line,
        detectedWords: detectWords(line, stemMap, sortedStems),
        linked: false,
      }));
      state.bulkMsg = '';
      render();
      toast(`Parsed ${lines.length} sentences`);
    }
    
    async function bulkSaveAll() {
      if (!state.bulkParsed?.length) return;
      state.bulkSaving = true; render();
      
      const source = state.bulkSource || 'manual';
      const level = state.bulkLevel || null;
      const rows = state.bulkParsed.map(p => ({
        sentence: p.sentence,
        source,
        jlpt_level: level,
        verified: 'unverified',
        difficulty: 1,
      }));
      
      const { data: inserted, error } = await sb.from('japanese_unified_sentences').insert(rows).select();
      if (error) { toast('Insert failed: ' + error.message, 'error'); state.bulkSaving = false; render(); return; }
      
      // Build links
      const links = [];
      inserted.forEach((s, i) => {
        const parsed = state.bulkParsed[i];
        if (!parsed) return;
        parsed.detectedWords.forEach(w => {
          if (w.id) links.push({ word_id: w.id, sentence_id: s.id, rating: null });
        });
        parsed.linked = true;
        state.sentences.push(s);
      });
      
      let linkedCount = 0;
      if (links.length > 0) {
        const { data: linkData, error: linkErr } = await sb.from('japanese_unified_word_sentences').insert(links).select();
        if (!linkErr && linkData) linkedCount = linkData.length;
      }
      
      state.bulkSaving = false;
      state.bulkMsg = `✅ ${inserted.length} sentences saved, ${linkedCount} word links created`;
      render();
      toast(state.bulkMsg);
    }

          if (val !== null) {
            const draftKey = attr + ':' + val;
            const draft = getDraft(draftKey);
            if (draft && !input.value) input.value = draft;
            input.addEventListener('input', () => saveDraft(draftKey, input.value));
            break;
          }
        }
      });
    }

IMPORTANT about ①② pattern: Some entries look like "②市の行政サービス①精神旺盛 ②サービスは効率的です" — these are TWO sentences crammed together. ① is usually a short phrase/example, ② is a full sentence. Split and clean both. Put the best one as corrected_sentence, extras in extra_sentences.

              ${current.meaning_en ? `<div style="font-size:13px; color:var(--text-secondary); margin-bottom:12px; padding:8px 12px; background:var(--bg-input); border-radius:8px;">${escapeHtml(current.meaning_en)}</div>` : ''}
              
              <!-- Metadata -->
              <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:12px; font-size:11px;">
                ${current.source ? `<span style="padding:3px 8px; background:var(--bg-input); border:1px solid var(--border); border-radius:6px; color:var(--accent);">${escapeHtml(current.source)}</span>` : ''}
                ${current.jlpt_level ? `<span style="padding:3px 8px; background:var(--bg-input); border:1px solid var(--border); border-radius:6px; color:var(--text-secondary);">${current.jlpt_level}</span>` : ''}
                <span style="color:var(--text-muted);">ID: ${current.id}</span>
                ${(current.tags || []).map(t => `<span class="tag ${tagClass(t)}">${escapeHtml(t)}</span>`).join('')}
              </div>
              
              <!-- Linked words -->
              ${linkedWords.length > 0 ? `
                <div style="margin-bottom:12px;">
                  <div style="font-size:10px; color:var(--text-muted); margin-bottom:6px; font-weight:600;">LINKED WORDS:</div>
                  <div style="display:flex; gap:6px; flex-wrap:wrap; align-items:center;">
                    ${linkedWords.map(w => {
                      const lnk = (state.wordSentenceLinks || []).find(l => l.sentence_id === current.id && l.word_id === w.id);
                      return `
                        <span style="font-size:12px; padding:4px 10px; background:rgba(99,102,241,0.1); color:var(--accent); border-radius:6px; border:1px solid rgba(99,102,241,0.2); display:inline-flex; align-items:center; gap:4px;">
                          ${escapeHtml(w.kanji)} <span style="opacity:0.5; font-size:10px;">${escapeHtml(w.hiragana || '')}</span>
                          ${lnk ? `<button data-unlink-word="${lnk.id}" style="background:none; border:none; color:var(--red); cursor:pointer; font-size:10px; padding:0 2px;" title="Unlink">\u00D7</button>` : ''}
                        </span>`;
                    }).join('')}
                    <button class="btn btn-sm btn-ghost" id="verifyToggleLinkForm" style="font-size:10px; padding:2px 8px;">+ Link Word</button>
                  </div>
                </div>
              ` : `
                <div style="font-size:11px; color:var(--text-muted); margin-bottom:8px; display:flex; align-items:center; gap:8px;">
                  No linked words
                  <button class="btn btn-sm btn-ghost" id="verifyToggleLinkForm" style="font-size:10px; padding:2px 8px;">+ Link Word</button>
                </div>
              `}
              <!-- Quick link form -->
              <div id="verifyLinkForm" style="display:none; margin-bottom:12px;">
                <div style="display:flex; gap:4px; align-items:center;">
                  <input type="text" id="verifyLinkInput" placeholder="Type kanji to link..." style="flex:1; font-size:12px; padding:6px 8px;">
                  <button class="btn btn-sm btn-primary" id="verifyDoLinkBtn">Link</button>
                </div>
              </div>
              
              <!-- Action buttons -->
              <div style="display:flex; gap:10px; justify-content:center;">
                <button class="btn btn-primary" id="verifyAcceptBtn" style="flex:1; padding:14px; font-size:14px; font-weight:700; background:var(--emerald);">✓ Verify</button>
                <button class="btn btn-ghost" id="verifyRejectBtn" style="flex:1; padding:14px; font-size:14px; font-weight:700; color:var(--red); border-color:var(--red);">✕ Reject</button>
                <button class="btn btn-ghost" id="verifySkipBtn" style="padding:14px 20px; font-size:14px;">Skip →</button>
              </div>
            </div>
          </div>
          
          <!-- Navigation -->
          <div style="display:flex; justify-content:center; gap:12px; align-items:center;">
            <button class="btn btn-sm btn-ghost" id="verifyPrevBtn" ${idx <= 0 ? 'disabled' : ''}>← Prev</button>
            <span style="font-size:11px; color:var(--text-muted);">Card ${idx + 1} of ${total}</span>
            <button class="btn btn-sm btn-ghost" id="verifyNextBtn" ${idx >= total - 1 ? 'disabled' : ''}>Next →</button>
          </div>
        `}
      `;
    }
    
    // ========== ANIME WORD REVIEW TAB ==========
    function renderAnimeReviewTab() {
      const knownKanji = new Set(state.words.map(w => w.kanji));
      
      // Categorize anime words
      let items = state.animeWords || [];
      const pendingCount = items.filter(a => !a.promoted && !a.dismissed).length;
      const promotedCount = items.filter(a => a.promoted).length;
      const dismissedCount = items.filter(a => a.dismissed).length;
      
      // Filter
      if (state.animeFilter === 'pending') items = items.filter(a => !a.promoted && !a.dismissed);
      else if (state.animeFilter === 'promoted') items = items.filter(a => a.promoted);
      else if (state.animeFilter === 'dismissed') items = items.filter(a => a.dismissed);
      
      // Mark which are already in unified words
      items = items.map(a => ({
        ...a,
        alreadyInDB: knownKanji.has(a.word || a.kanji || a.base_form || a.surface_form),
      }));
      
      const page = state.animePage || 0;
      const pageSize = 20;
      const totalPages = Math.ceil(items.length / pageSize);
      const pageItems = items.slice(page * pageSize, (page + 1) * pageSize);
      
      return `
        <div style="margin-bottom:16px;">
          <h2 style="font-size:16px; font-weight:700; margin-bottom:4px;">📺 Anime Word Review</h2>
          <p style="font-size:12px; color:var(--text-muted); margin-bottom:8px;">Words discovered from anime subtitles. Promote to unified words DB or dismiss.</p>
          ${renderExportImportBar('animeExportBtn', 'animeImportBtn', 'animePromptBtn')}
        </div>
        
        <div class="stats-row" style="margin-bottom:16px;">
          <div class="stat-card"><div class="stat-num" style="color:var(--amber)">${pendingCount}</div><div class="stat-label">Pending</div></div>
          <div class="stat-card"><div class="stat-num" style="color:var(--emerald)">${promotedCount}</div><div class="stat-label">Promoted</div></div>
          <div class="stat-card"><div class="stat-num" style="color:var(--text-muted)">${dismissedCount}</div><div class="stat-label">Dismissed</div></div>
          <div class="stat-card"><div class="stat-num">${state.animeWords.length}</div><div class="stat-label">Total</div></div>
        </div>
        
        <div class="filter-bar" style="margin-bottom:16px;">
          ${['pending', 'promoted', 'dismissed', 'all'].map(f => `
            <button class="btn btn-sm ${state.animeFilter === f ? 'btn-primary' : 'btn-ghost'}" data-anime-filter="${f}">${f.charAt(0).toUpperCase() + f.slice(1)}</button>
          `).join('')}
        </div>
        
        ${items.length === 0 ? `
          <div style="text-align:center; padding:40px; color:var(--text-muted);">
            <div style="font-size:32px; margin-bottom:8px;">📺</div>
            <div>${state.animeFilter === 'pending' ? 'No pending anime words to review!' : 'No anime words in this filter.'}</div>
            ${state.animeWords.length === 0 ? '<div style="font-size:11px; margin-top:8px;">The japanese_anime_words table may be empty or not yet created.</div>' : ''}
          </div>
        ` : `
          <div style="display:flex; flex-direction:column; gap:8px;">
            ${pageItems.map(a => {
              const wordText = a.word || a.kanji || a.base_form || a.surface_form || '';
              const surfaceText = a.surface_form || '';
              const showSurface = surfaceText && surfaceText !== wordText;
              return `
                <div class="card" style="padding:12px 16px; ${a.alreadyInDB ? 'border-left:3px solid var(--emerald);' : ''} ${a.dismissed ? 'opacity:0.5;' : ''}">
                  <div style="display:flex; align-items:center; gap:10px; margin-bottom:6px; flex-wrap:wrap;">
                    <span style="font-size:22px; font-weight:700; color:var(--text-primary);">${escapeHtml(wordText)}</span>
                    ${showSurface ? `<span style="font-size:13px; color:var(--text-muted);">(${escapeHtml(surfaceText)})</span>` : ''}
                    ${a.reading || a.hiragana ? `<span style="font-size:13px; color:#60a5fa;">${escapeHtml(a.reading || a.hiragana || '')}</span>` : ''}
                    ${a.pos ? `<span style="font-size:10px; padding:2px 6px; background:var(--bg-input); border:1px solid var(--border); border-radius:4px; color:var(--text-muted);">${escapeHtml(a.pos)}</span>` : ''}
                    ${a.alreadyInDB ? '<span style="font-size:10px; padding:2px 6px; background:rgba(16,185,129,0.15); color:var(--emerald); border-radius:4px;">In DB</span>' : ''}
                    ${a.promoted ? '<span style="font-size:10px; padding:2px 6px; background:rgba(16,185,129,0.15); color:var(--emerald); border-radius:4px;">\u2713 Promoted</span>' : ''}
                    ${a.dismissed ? '<span style="font-size:10px; padding:2px 6px; background:var(--bg-input); color:var(--text-muted); border-radius:4px;">Dismissed</span>' : ''}
                  </div>
                  ${a.episode || a.anime_source ? `<div style="font-size:10px; color:var(--text-muted); margin-bottom:6px;">\uD83D\uDCFA ${escapeHtml(a.anime_source || '')} ${a.episode ? 'Ep.' + escapeHtml(String(a.episode)) : ''} ${a.context ? '\u00B7 "' + escapeHtml(a.context) + '"' : ''}</div>` : ''}
                  ${!a.promoted && !a.dismissed ? `
                    <div style="display:flex; gap:8px; margin-top:8px; flex-wrap:wrap;">
                      ${!a.alreadyInDB ? `
                        <div style="flex:1; display:flex; gap:4px; align-items:center; min-width:200px;">
                          <input type="text" data-anime-hiragana="${a.id}" placeholder="hiragana" value="${escapeHtml(a.reading || a.hiragana || '')}" style="width:100px; font-size:11px; padding:4px 8px;">
                          <input type="text" data-anime-meaning="${a.id}" placeholder="meaning" value="${escapeHtml(a.meaning || a.meaning_en || '')}" style="flex:1; font-size:11px; padding:4px 8px;">
                          <button class="btn btn-sm btn-primary" data-anime-promote="${a.id}" data-anime-word="${escapeHtml(wordText)}">Promote \u2191</button>
                        </div>
                      ` : `
                        <button class="btn btn-sm btn-ghost" data-anime-promote="${a.id}" data-anime-word="${escapeHtml(wordText)}" style="color:var(--emerald);">Mark Promoted</button>
                      `}
                      <button class="btn btn-sm btn-ghost" data-anime-dismiss="${a.id}" style="color:var(--text-muted);">Dismiss</button>
                    </div>
                  ` : ''}
                </div>
              `;
            }).join('')}
          </div>
          
          ${totalPages > 1 ? `
            <div class="pagination" style="margin-top:16px;">
              <button class="btn btn-sm btn-ghost" id="animePrev" ${page === 0 ? 'disabled' : ''}>← Prev</button>
              <span style="font-size:12px; color:var(--text-muted);">${page + 1} / ${totalPages}</span>
              <button class="btn btn-sm btn-ghost" id="animeNext" ${page >= totalPages - 1 ? 'disabled' : ''}>Next →</button>
            </div>
          ` : ''}
        `}
      `;
    }
    
    // ========== SENTENCES TAB ==========
    function renderSentencesTab() {
      const stats = { unverified: 0, verified: 0, corrected: 0, rejected: 0 };
      state.sentences.forEach(s => { const v = s.verified || 'unverified'; if (stats[v] !== undefined) stats[v]++; else stats.unverified++; });
      
      let filtered = state.sentences.filter(s => {
        const v = s.verified || 'unverified';
        if (state.sentFilter !== 'all' && v !== state.sentFilter) return false;
        if (state.sentSource !== 'all' && s.source !== state.sentSource) return false;
        if (state.sentSearch) {
          const q = state.sentSearch.toLowerCase();
          if (!(s.sentence || '').includes(state.sentSearch) && !(s.meaning_en || '').toLowerCase().includes(q) && !(s.tags || []).some(t => t.includes(q))) return false;
        }
        return true;
      }).sort((a, b) => (b.id || 0) - (a.id || 0));
      
      const sources = [...new Set(state.sentences.map(s => s.source).filter(Boolean))].sort();
      const page = state.sentPage;
      const pageSize = 25;
      const totalPages = Math.ceil(filtered.length / pageSize);
      const items = filtered.slice(page * pageSize, (page + 1) * pageSize);
      
      const stemMap = buildStemMap();
      const sortedStems = Object.keys(stemMap).sort((a,b) => b.length - a.length);
      
      return `
        <div class="stats-row">
          <div class="stat-card"><div class="stat-num" style="color:var(--amber)">${stats.unverified}</div><div class="stat-label">Unverified</div></div>
          <div class="stat-card"><div class="stat-num" style="color:var(--emerald)">${stats.verified}</div><div class="stat-label">Verified</div></div>
          <div class="stat-card"><div class="stat-num" style="color:#60a5fa">${stats.corrected}</div><div class="stat-label">Corrected</div></div>
          <div class="stat-card"><div class="stat-num" style="color:var(--red)">${stats.rejected}</div><div class="stat-label">Rejected</div></div>
          <div class="stat-card"><div class="stat-num">${state.sentences.length}</div><div class="stat-label">Total</div></div>
        </div>
        
        <!-- Review Tools -->
        <div class="card mb-3">
          <div class="card-body" style="padding:14px 20px;">
            <div class="flex gap-2 items-center flex-wrap">
              <span style="font-size:12px; font-weight:700; color:var(--text-muted); margin-right:8px;">REVIEW TOOLS</span>
              <button class="btn btn-sm btn-ghost" id="exportSentencesBtn">📤 Export Unverified (JSON)</button>
              <button class="btn btn-sm btn-ghost" id="importReviewBtn">📥 Import AI Results</button>
              <span style="border-left:1px solid var(--border); height:20px; margin:0 4px;"></span>
              <label style="display:flex; align-items:center; gap:6px; cursor:pointer; margin:0;">
                <input type="checkbox" id="aiToggle" ${state.aiEnabled ? 'checked' : ''} style="width:auto; accent-color:var(--accent);">
                <span style="font-size:11px; color:${state.aiEnabled ? 'var(--accent)' : 'var(--text-muted)'};">AI Review (API)</span>
              </label>
              ${state.aiEnabled ? `
                <button class="btn btn-sm btn-primary" id="aiReviewBtn" ${state.aiReviewing ? 'disabled' : ''}>
                  ${state.aiReviewing ? '⏳ Reviewing...' : '🤖 AI Review (15 sentences)'}
                </button>
              ` : ''}
            </div>
          </div>
        </div>
        
        <!-- AI Results -->
        ${state.aiResults ? `
          <div class="card mb-3">
            <div class="card-header">
              <span class="card-title">🤖 AI REVIEW RESULTS (${state.aiResults.length} sentences)</span>
              <button class="btn btn-sm btn-ghost" id="clearAIResultsBtn">Clear</button>
            </div>
            <div class="card-body" style="max-height:400px; overflow-y:auto;">
              ${state.aiResults.map((r, idx) => {
                const sent = state.sentences.find(s => s.id === r.id);
                const verdictCls = r.verdict === 'verified' ? 'badge-verified' : r.verdict === 'rejected' ? 'badge-rejected' : 'badge-unverified';
                return `
                  <div style="padding:10px; border:1px solid var(--border); border-radius:8px; margin-bottom:8px; ${r._applied ? 'opacity:0.4;' : ''}">
                    <div style="font-size:14px; margin-bottom:4px;">${escapeHtml(sent?.sentence || '?')}</div>
                    <div class="flex gap-2 items-center flex-wrap mb-2" style="font-size:11px;">
                      <span class="badge ${verdictCls}">${r.verdict}</span>
                      ${r.tags?.map(t => `<span class="tag ${tagClass(t)}">${escapeHtml(t)}</span>`).join('') || ''}
                      ${r.difficulty ? `<span style="color:var(--text-muted);">Diff: ${r.difficulty}</span>` : ''}
                    </div>
                    ${r.meaning_en ? `<div style="font-size:11px; color:var(--text-secondary);">EN: ${escapeHtml(r.meaning_en)}</div>` : ''}
                    ${r.corrected_sentence ? `<div style="font-size:11px; color:var(--amber);">Fix: ${escapeHtml(r.corrected_sentence)}</div>` : ''}
                    ${r.notes ? `<div style="font-size:11px; color:var(--text-muted);">${escapeHtml(r.notes)}</div>` : ''}
                    ${!r._applied ? `<button class="btn btn-sm btn-emerald mt-2" data-apply-ai="${idx}">✓ Apply</button>` : '<span style="font-size:11px; color:var(--emerald);">✓ Applied</span>'}
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        ` : ''}
        
        <div class="filter-bar">
          ${['unverified', 'verified', 'corrected', 'rejected', 'all'].map(f => `
            <button class="btn btn-sm ${state.sentFilter === f ? 'btn-primary' : 'btn-ghost'}" data-sent-filter="${f}">
              ${f === 'all' ? 'All' : f.charAt(0).toUpperCase() + f.slice(1)}
            </button>
          `).join('')}
          <select id="sentSourceFilter" style="width: 140px;">
            <option value="all">All Sources</option>
            ${sources.map(s => `<option value="${escapeHtml(s)}" ${state.sentSource === s ? 'selected' : ''}>${escapeHtml(s)}</option>`).join('')}
          </select>
          <input type="text" id="sentSearch" placeholder="Search sentences, tags..." value="${escapeHtml(state.sentSearch)}" style="width: 200px;">
          <span style="color:var(--text-muted); font-size: 12px;">${filtered.length} results</span>
          ${state.sentFilter === 'rejected' && stats.rejected > 0 ? `<button class="btn btn-sm btn-ghost" id="deleteAllRejectedBtn" style="color:var(--red); margin-left:auto;">🗑 Delete All Rejected (${stats.rejected})</button>` : ''}
        </div>
        
        ${items.map(s => {
          const v = s.verified || 'unverified';
          const words = detectWords(s.sentence || '', stemMap, sortedStems);
          // Find linked words for this sentence
          const sentLinks = (state.wordSentenceLinks || []).filter(l => l.sentence_id === s.id);
          const linkedWords = sentLinks.map(l => {
            const w = state.words.find(w => w.id === l.word_id);
            return w ? { ...w, linkId: l.id } : null;
          }).filter(Boolean);
          return `
            <div class="sent-item">
              <div class="sent-text">${highlightWords(s.sentence || '', words)}</div>
              ${s.meaning_en ? `<div class="sent-meaning">${escapeHtml(s.meaning_en)}</div>` : ''}
              
              <div class="sent-meta mb-2">
                <span>${escapeHtml(s.source || 'unknown')}</span>
                ${s.jlpt_level ? `<span>• ${s.jlpt_level}</span>` : ''}
                <span class="badge badge-${v}">${v}</span>
                <span class="mono" style="font-size:10px; color:var(--text-muted);">#${s.id}</span>
              </div>
              
              <!-- Linked Words -->
              <div class="flex gap-2 flex-wrap items-center mb-2">
                ${linkedWords.map(w => `
                  <span style="font-size:11px; padding:2px 8px; background:rgba(99,102,241,0.1); color:var(--accent); border-radius:4px; border:1px solid rgba(99,102,241,0.2); display:inline-flex; align-items:center; gap:4px;">
                    ${escapeHtml(w.kanji)} <span style="opacity:0.5; font-size:9px;">${escapeHtml(w.hiragana || '')}</span>
                    <button data-unlink-word="${w.linkId}" style="background:none; border:none; color:var(--red); cursor:pointer; font-size:10px; padding:0 2px;" title="Unlink">\u00D7</button>
                  </span>
                `).join('')}
                <button class="btn btn-sm btn-ghost" data-toggle-link-form="${s.id}" style="font-size:10px; padding:2px 8px;">+ Link Word</button>
              </div>
              <div id="linkWordForm_${s.id}" style="display:none; margin-bottom:8px;">
                <div style="display:flex; gap:4px; align-items:center;">
                  <input type="text" data-link-word-input="${s.id}" placeholder="Type kanji to link..." style="flex:1; font-size:12px; padding:4px 8px;">
                  <button class="btn btn-sm btn-primary" data-do-link-word="${s.id}">Link</button>
                </div>
              </div>
              
              <!-- Tags -->
              <div class="flex gap-2 flex-wrap items-center mb-2">
                ${(s.tags || []).map(t => `
                  <span class="tag ${tagClass(t)}">${escapeHtml(t)} <span class="remove" data-rm-tag="${s.id}" data-rm-val="${escapeHtml(t)}">×</span></span>
                `).join('')}
                <span class="flex gap-2 items-center">
                  <input type="text" data-tag-in="${s.id}" placeholder="+ tag" style="width: 140px; padding: 4px 8px; font-size: 11px;">
                  <button class="btn btn-sm btn-ghost" data-add-tag="${s.id}">Add</button>
                </span>
              </div>
              
              <!-- Actions -->
              <div class="flex gap-2">
                ${v === 'unverified' ? `
                  <button class="btn btn-sm btn-emerald" data-verify="${s.id}">✓ Verify</button>
                  <button class="btn btn-sm btn-red" data-reject="${s.id}">✗ Reject</button>
                ` : v === 'verified' || v === 'corrected' ? `
                  <button class="btn btn-sm btn-ghost" data-unverify="${s.id}">↩ Unverify</button>
                  <button class="btn btn-sm btn-red" data-reject="${s.id}">✗ Reject</button>
                ` : `
                  <button class="btn btn-sm btn-emerald" data-verify="${s.id}">✓ Restore</button>
                  <button class="btn btn-sm btn-ghost" data-delete-sentence="${s.id}" style="color:var(--red);">🗑 Delete</button>
                `}
              </div>
            </div>
          `;
        }).join('')}
        
        ${totalPages > 1 ? `
          <div class="pagination">
            <button class="btn btn-sm btn-ghost" id="sentPrev" ${page === 0 ? 'disabled' : ''}>← Prev</button>
            <span style="font-size:12px; color:var(--text-muted);">${page + 1} / ${totalPages}</span>
            <button class="btn btn-sm btn-ghost" id="sentNext" ${page >= totalPages - 1 ? 'disabled' : ''}>Next →</button>
          </div>
        ` : ''}
      `;
    }
    
    // ========== BULK TAB ==========
    function renderBulkTab() {
      return `
        <div class="card">
          <div class="card-header"><span class="card-title">📝 PASTE SENTENCES</span></div>
          <div class="card-body">
            <label>Sentences (one per line)</label>
            <textarea id="bulkInput" rows="8" placeholder="私は毎朝6時に起きます。&#10;駅前は駐車禁止です。&#10;彼女は嬉しそうに喜んでいた。">${escapeHtml(state.bulkInput)}</textarea>
            
            <div class="flex gap-3 mt-3">
              <div class="flex-1">
                <label>Source</label>
                <input type="text" id="bulkSource" value="${escapeHtml(state.bulkSource)}" placeholder="manual">
              </div>
              <div style="width:100px;">
                <label>Level</label>
                <select id="bulkLevel">
                  <option value="">Auto</option>
                  <option value="N1">N1</option>
                  <option value="N2">N2</option>
                  <option value="N3">N3</option>
                </select>
              </div>
            </div>
            
            <button class="btn btn-primary mt-3" id="parseBulkBtn">🔍 Detect Words</button>
          </div>
        </div>
        
        ${state.bulkParsed ? `
          <div class="card">
            <div class="card-header">
              <span class="card-title">DETECTED (${state.bulkParsed.reduce((a, r) => a + r.detectedWords.length, 0)} word matches in ${state.bulkParsed.length} sentences)</span>
              <button class="btn btn-emerald" id="bulkSaveBtn" ${state.bulkSaving ? 'disabled' : ''}>
                ${state.bulkSaving ? 'Saving...' : '✅ Save All & Link'}
              </button>
            </div>
            <div class="card-body">
              ${state.bulkParsed.map((p, i) => `

                      <span style="font-weight:600; font-size:14px; color:var(--text-primary);">${escapeHtml(g.group_name || g.group_key)}</span>

                    <div style="display:flex; align-items:center; gap:8px;">
                      <span style="font-size:11px; color:var(--text-muted);">${memberWords.length} words</span>

        <!-- Create group form (hidden) -->
        <div id="createGroupForm" style="display:none; margin-top:16px;">
          <div class="card" style="padding:16px;">
            <div style="font-size:12px; font-weight:700; color:var(--accent); margin-bottom:10px;">CREATE NEW GROUP</div>
            <div class="flex gap-2 mb-2">
              <div style="flex:1;"><label>Name *</label><input type="text" id="newGroupName" placeholder="e.g. bothersome"></div>
              <div style="width:150px;"><label>Type *</label>

                  ${types.filter(t => t !== 'all').map(t => `<option value="${t}">${typeLabels[t]}</option>`).join('')}
